[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
# Repo-local secrets files. Loaded by mise on shell activation. Keep out
# of git (.gitignored below). Expected contents:
#   cloudflare-mcp.env:  export CLOUDFLARE_API_TOKEN=...  # Phase 4.3 runbook
#   github-personal.env: export GH_TOKEN=... / GITHUB_TOKEN=...  # j0sh3rs PAT
# github-personal.env overrides the global work GITHUB_TOKEN so `gh`, github
# MCP tools, and Claude sessions act as the personal account in this dir only.
_.file = [
  { path = "{{config_root}}/cloudflare-mcp.env", redact = true },
  { path = "{{config_root}}/github-personal.env", redact = true },
  { path = "{{config_root}}/.env.local", redact = true }
]
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
BOOTSTRAP_DIR = "{{config_root}}/bootstrap"
KUBERNETES_DIR = "{{config_root}}/kubernetes"
ROOT_DIR = "{{config_root}}"
SCRIPTS_DIR = "{{config_root}}/scripts"
TALOS_DIR = "{{config_root}}/talos"

# Route bd at the local shared Dolt server (spawned by bd at
# ~/.beads/shared-server/ on 127.0.0.1:3306). Overrides any stale
# BEADS_DOLT_SERVER_* env vars that point at dolt.68cc.io.
# Requires `eval "$(mise env)"` in shell; mise activation in ~/.zshrc
# makes this automatic when cd'ing into the repo.
BEADS_DOLT_SERVER_HOST = "127.0.0.1"
BEADS_DOLT_SERVER_PORT = "3306"
BEADS_DOLT_SERVER_USER = "root"
BEADS_DOLT_PASSWORD = ""
BEADS_DOLT_SHARED_SERVER = "1"

[tools]
"python" = "3.14.6"
"pipx:makejinja" = "2.8.2"
"aqua:budimanjojo/talhelper" = "3.1.12"
"aqua:cilium/cilium-cli" = "0.19.5"
"aqua:cli/cli" = "2.96.0"
"aqua:cloudflare/cloudflared" = "2026.6.1"
# kubectl-cnpg CLI plugin: invokes via `kubectl cnpg <subcmd>` for
# on-demand backups, version checks, major-upgrade verification.
# Version tracks cnpg operator chart in databases/cloudnative-pg/.
#
# Renovate caveat: the customManagers regex extracts depName as the
# 3-segment aqua identifier `cloudnative-pg/cloudnative-pg/kubectl-cnpg`,
# but GitHub releases live at the 2-segment repo path. Auto-bump will
# silently no-op for this entry. Bump manually when the cnpg operator
# HelmRelease (kubernetes/apps/databases/cloudnative-pg/app/) gets bumped.
"aqua:cloudnative-pg/cloudnative-pg/kubectl-cnpg" = "1.30.0"
"aqua:cue-lang/cue" = "0.17.0"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.9.0"
"aqua:getsops/sops" = "3.13.2"
"aqua:go-task/task" = "3.52.0"
"aqua:helm/helm" = "4.2.2"
"aqua:helmfile/helmfile" = "1.7.0"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.8.1"
"aqua:kubernetes/kubectl" = "1.36.1"
"aqua:mikefarah/yq" = "4.53.3"
"aqua:siderolabs/talos" = "1.13.5"
"aqua:yannh/kubeconform" = "0.8.0"
