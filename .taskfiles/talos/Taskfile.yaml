---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

tasks:
  generate-config:
    desc: Generate Talos configuration
    dir: '{{.TALOS_DIR}}'
    cmd: talhelper genconfig
    preconditions:
      - test -f {{.TALOS_DIR}}/talconfig.yaml
      - test -f {{.ROOT_DIR}}/.sops.yaml
      - test -f {{.SOPS_AGE_KEY_FILE}}
      - which talhelper

  apply-node:
    desc: Apply Talos config to a node [IP=required]
    dir: '{{.TALOS_DIR}}'
    cmd: talhelper gencommand apply --node {{.IP}} --extra-flags '--mode={{.MODE}}' | bash
    vars:
      MODE: '{{.MODE | default "auto"}}'
    requires:
      vars: [IP]
    preconditions:
      - talosctl --nodes {{.IP}} get machineconfig
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which talhelper talosctl yq
    # Quorum safety: all 3 bee-jms nodes are control-plane members. Rebooting
    # one drops etcd 3->2. A second failure during the maintenance window is
    # cluster-down. Verify every OTHER control-plane node is healthy before
    # touching this one. Runs as a task dep so it fails loudly before apply.
    deps:
      - task: etcd-quorum-precheck
        vars: { IP: "{{.IP}}" }

  upgrade-node:
    desc: Upgrade Talos on a single node [IP=required]
    dir: '{{.TALOS_DIR}}'
    cmd: talhelper gencommand upgrade --node {{.IP}} --extra-flags "--image='{{.TALOS_IMAGE}}:{{.TALOS_VERSION}}' --timeout=10m --preserve" | bash
    vars:
      TALOS_IMAGE:
        sh: yq '.nodes[] | select(.ipAddress == "{{.IP}}") | .talosImageURL' {{.TALOS_DIR}}/talconfig.yaml
      TALOS_VERSION:
        sh: yq '.talosVersion' {{.TALOS_DIR}}/talenv.yaml
    requires:
      vars: [IP]
    preconditions:
      - talosctl --nodes {{.IP}} get machineconfig
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which kubectl talhelper talosctl yq
    deps:
      - task: etcd-quorum-precheck
        vars: { IP: "{{.IP}}" }

  etcd-quorum-precheck:
    desc: Verify all OTHER control-plane peers are healthy before rebooting [IP=required]
    internal: true
    dir: '{{.TALOS_DIR}}'
    requires:
      vars: [IP]
    cmds:
      # List every control-plane IP except the target, then query etcd status
      # against each peer in a single talosctl call. talosctl etcd status
      # exits non-zero if any member is unhealthy or behind the leader.
      - |
        PEERS=$(yq '.nodes[] | select(.controlPlane == true) | .ipAddress' talconfig.yaml | grep -v '^{{.IP}}$' | tr '\n' ',' | sed 's/,$//')
        if [ -z "$PEERS" ]; then
          echo "ERROR: no control-plane peers found in talconfig.yaml for IP={{.IP}}" >&2
          exit 1
        fi
        echo "Checking etcd quorum on peers: $PEERS"
        talosctl --nodes "$PEERS" etcd status

  upgrade-k8s:
    desc: Upgrade Kubernetes
    dir: '{{.TALOS_DIR}}'
    cmd: talhelper gencommand upgrade-k8s --extra-flags "--to '{{.KUBERNETES_VERSION}}'" | bash
    vars:
      KUBERNETES_VERSION:
        sh: yq '.kubernetesVersion' {{.TALOS_DIR}}/talenv.yaml
    preconditions:
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which talhelper talosctl yq

  reset:
    desc: Resets nodes back to maintenance mode
    dir: '{{.TALOS_DIR}}'
    prompt: This will destroy your cluster and reset the nodes back to maintenance mode... continue?
    cmd: talhelper gencommand reset --extra-flags="--reboot {{- if eq .CLI_FORCE false }} --system-labels-to-wipe STATE --system-labels-to-wipe EPHEMERAL{{ end }} --graceful=false --wait=false" | bash
    preconditions:
      - which talhelper
