machine:
  features:
    # NOTE: kubernetesTalosAPIAccess is control-plane-only. Talos rejects it
    # on worker machines. It now lives in
    # patches/controller/machine-features.yaml so it applies only to
    # control-plane nodes, not workers like bigboi-jms-01.
    rbac: true
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true # Requires Cilium socketLB features
      resolveMemberNames: true
    # Enable XFS project quota support on EPHEMERAL partition so kubelet can
    # track/enforce ephemeral-storage usage.
    diskQuotaSupport: true
