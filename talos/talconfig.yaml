# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://192.168.35.2:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "192.168.35.2"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "bee-jms-02"
    ipAddress: "192.168.35.6"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/9cc3b6b49c5bdf86905d1999fc8c2ec28aa03b3422377f4e86cb7ed5635b910b
    controlPlane: true
    nodeLabels:
      node.kubernetes.io/cpu-tier: zen3
      node.kubernetes.io/memory-tier: standard
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "b0:41:6f:0c:6f:5b"
        dhcp: false
        addresses:
          - "192.168.35.6/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.35.1"
        mtu: 9000
        vip:
          ip: "192.168.35.2"
  - hostname: "bee-jms-01"
    ipAddress: "192.168.35.3"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/9cc3b6b49c5bdf86905d1999fc8c2ec28aa03b3422377f4e86cb7ed5635b910b
    controlPlane: true
    nodeLabels:
      node.kubernetes.io/cpu-tier: zen2
      node.kubernetes.io/memory-tier: standard
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "b0:41:6f:08:36:c6"
        dhcp: false
        addresses:
          - "192.168.35.3/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.35.1"
        mtu: 9000
        vip:
          ip: "192.168.35.2"
  - hostname: "bee-jms-03"
    ipAddress: "192.168.35.10"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/9cc3b6b49c5bdf86905d1999fc8c2ec28aa03b3422377f4e86cb7ed5635b910b
    controlPlane: true
    nodeLabels:
      node.kubernetes.io/cpu-tier: zen3
      node.kubernetes.io/memory-tier: high
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "b0:41:6f:0c:78:28"
        dhcp: false
        addresses:
          - "192.168.35.10/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.35.1"
        mtu: 9000
        vip:
          ip: "192.168.35.2"
  - hostname: "bigboi-jms-01"
    ipAddress: "192.168.35.4"
    # Samsung SSD 980 Pro 1TB (nvme0n1) — fastest drive, Talos OS/boot disk.
    # Two extra disks become Talos UserVolumes (auto-formatted XFS, mounted at
    # /var/mnt/<name>) selected by CEL transport expression — robust against
    # the sdX rename that happens when the USB install stick is removed:
    #   Samsung 860 1TB SATA  -> local-hostpath (backs shared openebs-hostpath)
    #   WD SN810 500GB NVMe   -> local-fast      (backs openebs-hostpath-fast)
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/9cc3b6b49c5bdf86905d1999fc8c2ec28aa03b3422377f4e86cb7ed5635b910b
    controlPlane: false
    nodeLabels:
      node.kubernetes.io/cpu-tier: zen3
      node.kubernetes.io/memory-tier: high
      # Discrete AMD Navi 48 (RX 9070 XT, device-id 7550, RDNA4/gfx1201). Disambiguates from
      # APU nodes that also report amd.com/gpu.vram=16G. See dGPU playbook.
      node.kubernetes.io/gpu-tier: dgpu
      # Pins the openebs-hostpath-fast StorageClass (allowedTopologies) to this
      # node so "fast" PVCs cannot silently land on a node without NVMe backing.
      node.68cc.io/storage-tier: fast-local
    # Extra local disks for OpenEBS LocalPV. volumeType omitted == partition
    # grown to fill the matched disk (Talos default). Only the Samsung SATA is
    # transport=sata; only the WD is nvme AND not the system disk.
    userVolumes:
      - name: local-hostpath
        provisioning:
          diskSelector:
            match: disk.transport == "sata"
          minSize: 10GiB  # required by talhelper; grow expands to fill disk
          grow: true
        filesystem:
          type: xfs
      - name: local-fast
        provisioning:
          diskSelector:
            match: disk.transport == "nvme" && !system_disk
          minSize: 10GiB  # required by talhelper; grow expands to fill disk
          grow: true
        filesystem:
          type: xfs
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "f0:2f:74:cb:dd:b4"
        dhcp: false
        addresses:
          - "192.168.35.4/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.35.1"
        mtu: 9000

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kernel.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-nvme-power.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"
  - "@./patches/global/machine-features.yaml"
  - "@./patches/global/machine-registries.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"
    - "@./patches/controller/machine-features.yaml"
