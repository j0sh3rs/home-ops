---
# Auth0 OIDC middleware (plugin: github.com/lukaszraczylo/traefikoidc v0.8.1).
# Materialized per-namespace via Kustomize Component so HTTPRoute filters
# can ExtensionRef it in-namespace. ${AUTH0_CLIENT_ID} / ${AUTH0_CLIENT_SECRET}
# / ${SESSION_ENCRYPTION_KEY} are substituted at plugin runtime from the
# Traefik pod's env (traefik-secrets in network ns, injected via Traefik
# HelmRelease envFrom).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oidc-auth0-secure
spec:
  plugin:
    traefikoidc:
      providerURL: https://68ccio.us.auth0.com
      clientID: "${AUTH0_CLIENT_ID}"
      clientSecret: "${AUTH0_CLIENT_SECRET}"
      sessionEncryptionKey: "${SESSION_ENCRYPTION_KEY}"
      sessionMaxAge: 28800

      callbackURL: /oauth2/callback
      logoutURL: /oauth2/logout
      postLogoutRedirectURI: /

      forceHTTPS: true

      scopes:
        - openid
        - profile
        - email

      strictAudienceValidation: true

      allowedUsers:
        - j0sh3rs@gmail.com

      logLevel: info

      redis:
        enabled: true
        address: dragonflydb.databases.svc.cluster.local:6379
        db: 1
        keyPrefix: "traefikoidc:auth0:"
        cacheMode: hybrid
        poolSize: 20
        connectTimeout: 5
        readTimeout: 3
        writeTimeout: 3
        enableCircuitBreaker: true
        circuitBreakerThreshold: 5
        circuitBreakerTimeout: 60
        enableHealthCheck: true
        healthCheckInterval: 30
