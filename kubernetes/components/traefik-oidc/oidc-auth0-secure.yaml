---
# Auth0 OIDC middleware (plugin: github.com/lukaszraczylo/traefikoidc v0.8.1).
# Materialized per-namespace via Kustomize Component so HTTPRoute filters
# can ExtensionRef it in-namespace.
#
# clientID / clientSecret / sessionEncryptionKey use the plugin's
# urn:k8s:secret:<name>:<key> syntax to read credentials from a
# per-namespace Secret. The source Secret `traefik-secrets` lives in the
# `network` namespace and is mirrored by Reflector into every namespace
# that opts into this Component (see annotations on the source Secret).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oidc-auth0-secure
spec:
  plugin:
    traefikoidc:
      providerURL: https://auth.68cc.io
      clientID: urn:k8s:secret:traefik-secrets:AUTH0_CLIENT_ID
      clientSecret: urn:k8s:secret:traefik-secrets:AUTH0_CLIENT_SECRET
      sessionEncryptionKey: urn:k8s:secret:traefik-secrets:SESSION_ENCRYPTION_KEY
      sessionMaxAge: 28800

      callbackURL: /oauth2/callback
      logoutURL: /oauth2/logout
      postLogoutRedirectURI: /

      # Back-Channel Logout (home-ops-a95): Auth0 POSTs a signed logout_token
      # JWT to backchannelLogoutURL when the user logs out of Auth0 directly.
      # Plugin verifies the token via OIDC discovery and invalidates the
      # associated session in DragonflyDB. Requires a matching Back-Channel
      # Logout URI configured on the Auth0 application side (per host).
      enableBackchannelLogout: true
      backchannelLogoutURL: /oauth2/backchannel-logout

      forceHTTPS: true

      scopes:
        - openid
        - profile
        - email

      # Forward the Auth0 display name to backends as X-Forwarded-Name so
      # Grafana (and any other proxy-auth consumer) can populate Profile
      # Name automatically. The `profile` scope above already guarantees
      # the `name` claim is present in the ID token. Standard Go template
      # form — the README's quadruple-brace example was Helm-escape
      # context, not a plugin requirement (traefikoidc parses the value
      # directly at startup and fails the middleware on parse error).
      headers:
        - name: X-Forwarded-Name
          value: "{{ .Claims.name }}"

      strictAudienceValidation: true

      allowedUsers:
        - j0sh3rs@gmail.com

      logLevel: info

      redis:
        enabled: true
        address: dragonflydb.databases.svc.cluster.local:6379
        password: urn:k8s:secret:dragonflydb-auth:password
        db: 1
        # Single shared keyPrefix across all opted-in namespaces is intentional:
        # sessions are user-scoped (single user: j0sh3rs@gmail.com) and the
        # plugin uses per-user session IDs, so no cross-site collision. Sharing
        # also provides implicit SSO across sites without re-authentication
        # (same session cookie recognised by any Middleware copy).
        keyPrefix: "traefikoidc:auth0:"
        cacheMode: hybrid
        poolSize: 20
        connectTimeout: 5
        readTimeout: 3
        writeTimeout: 3
        enableCircuitBreaker: true
        circuitBreakerThreshold: 5
        circuitBreakerTimeout: 60
        enableHealthCheck: true
        healthCheckInterval: 30
