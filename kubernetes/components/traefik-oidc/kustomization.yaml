---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
# Opts the including namespace into the Auth0 OIDC Traefik middleware.
# Gateway API ExtensionRef filters require the Middleware to live in the
# same namespace as the HTTPRoute (Gateway API + Traefik both reject
# cross-namespace extensionRef — see traefik/traefik#11126,
# gateway-api#3903). This Component materializes the Middleware into
# whichever namespace imports it.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - ./oidc-auth0-secure.yaml
