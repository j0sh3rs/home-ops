---
# Google OIDC middleware (plugin: github.com/lukaszraczylo/traefikoidc v1.0.10).
# Materialized per-namespace via Kustomize Component so HTTPRoute filters
# can ExtensionRef it in-namespace.
#
# clientID / clientSecret / sessionEncryptionKey use the plugin's
# urn:k8s:secret:<name>:<key> syntax to read credentials from a
# per-namespace Secret. The source Secret `traefik-secrets` lives in the
# `network` namespace and is mirrored by Reflector into every namespace
# that opts into this Component (see annotations on the source Secret).
#
# callbackURL is a PATH (not a full URL). The plugin uses the host of the
# incoming request as the callback host, so every protected hostname needs
# `https://<host>/oauth2/callback` registered as an authorized redirect
# URI on the Google OAuth client. Cookie domain `.68cc.io` still provides
# SSO across protected hosts — authenticate once, session reused by all.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: google-oidc-secure
spec:
  plugin:
    traefikoidc:
      providerURL: https://accounts.google.com
      clientID: urn:k8s:secret:traefik-secrets:GOOGLE_CLIENT_ID
      clientSecret: urn:k8s:secret:traefik-secrets:GOOGLE_CLIENT_SECRET
      sessionEncryptionKey: urn:k8s:secret:traefik-secrets:SESSION_ENCRYPTION_KEY
      # 8h session matches the old oauth2-proxy cookie-expire (4h) x2 — the
      # plugin refreshes opportunistically via Google's refresh token while
      # the session is active, so a longer outer lifetime is fine.
      sessionMaxAge: 28800

      callbackURL: /oauth2/callback
      logoutURL: /oauth2/logout
      postLogoutRedirectURI: /

      forceHTTPS: true
      enablePKCE: true

      scopes:
        - openid
        - profile
        - email

      # Forward identity headers to backends. X-Forwarded-User (email) is
      # what Grafana's auth.proxy consumes (header_name=X-Forwarded-User
      # in grafana.yaml) — do NOT remove without updating Grafana in
      # lockstep. Custom X-Forwarded-Name sources the Google `name` claim
      # (guaranteed by the `profile` scope) for display-name population.
      headers:
        - name: X-Forwarded-Name
          value: "{{ .Claims.name }}"

      # Google tokens use the OAuth client ID as audience. Strict
      # validation rejects tokens issued to any other client.
      strictAudienceValidation: true

      allowedUsers:
        - j0sh3rs@gmail.com

      logLevel: info

      redis:
        enabled: true
        address: dragonflydb.databases.svc.cluster.local:6379
        password: urn:k8s:secret:traefik-secrets:DRAGONFLYDB_PASSWORD
        # DB 5 was previously used by oauth2-proxy. Nothing else consumes
        # it — single-user cluster, single plugin tenant — so reuse.
        db: 5
        # Single shared keyPrefix across all opted-in namespaces is
        # intentional: sessions are user-scoped (single user:
        # j0sh3rs@gmail.com) and the plugin uses per-user session IDs, so
        # no cross-site collision. Sharing also provides implicit SSO
        # across sites without re-authentication (same session cookie
        # recognised by any Middleware copy).
        keyPrefix: "traefikoidc:google:"
        cacheMode: hybrid
        poolSize: 20
        connectTimeout: 5
        readTimeout: 3
        writeTimeout: 3
        enableCircuitBreaker: true
        circuitBreakerThreshold: 5
        circuitBreakerTimeout: 60
        enableHealthCheck: true
        healthCheckInterval: 30
