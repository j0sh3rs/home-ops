---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app owui-pipelines
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    controllers:
      owui-pipelines:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/pipelines
              # renovate: datasource=docker depName=ghcr.io/open-webui/pipelines
              # NOTE: pipelines has no semver tags; pinned to latest git-<sha> tag.
              # Update by checking ghcr.io/v2/open-webui/pipelines/tags/list.
              tag: git-2bd3ba3
              pullPolicy: IfNotPresent
            env:
              PIPELINES_DIR: /pipelines
            envFrom:
              - secretRef:
                  name: owui-pipelines-secrets
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: "500m"
                memory: 512Mi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 9099
    persistence:
      pipelines:
        type: configMap
        name: owui-pipelines-scripts
        globalMounts:
          - path: /pipelines
