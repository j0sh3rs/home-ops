---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app langfuse
spec:
  interval: 1h
  # EXCEPTION: langfuse chart OCI (ghcr.io/langfuse/helm-charts/langfuse) returns
  # 403 Forbidden — requires auth not available in cluster. Using HelmRepository
  # sourceRef as permitted fallback per CLAUDE.md: "Only fall back to HelmRepository
  # + sourceRef when the upstream has no OCI artifact available."
  chart:
    spec:
      chart: langfuse
      version: 1.5.33
      sourceRef:
        kind: HelmRepository
        name: langfuse
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    langfuse:
      nextauth:
        url: https://langfuse.68cc.io
        secret:
          secretKeyRef:
            name: langfuse-secrets
            key: NEXTAUTH_SECRET
      salt:
        secretKeyRef:
          name: langfuse-secrets
          key: SALT
      # REDIS_CONNECTION_STRING is set here so the chart's _helpers.tpl
      # langfuse.getEnvVar guard skips building its own connection string
      # from the structured redis.auth.* fields (which would require a bare
      # password key, not a full DSN). The full DSN (with URL-encoded password)
      # lives in langfuse-secrets.REDIS_URL — the same secret mounted via
      # additionalEnvFrom below.
      additionalEnv:
        - name: REDIS_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: langfuse-secrets
              key: REDIS_URL
      additionalEnvFrom:
        - secretRef:
            name: langfuse-secrets

    postgresql:
      deploy: false
      host: postgres-rw.databases.svc.cluster.local
      port: 5432
      auth:
        username: langfuse
        existingSecret: langfuse-secrets
        secretKeys:
          userPasswordKey: INIT_POSTGRES_PASS
        database: langfuse
      migration:
        autoMigrate: true

    redis:
      deploy: false
      host: dragonflydb.databases.svc.cluster.local
      port: 6379
      auth:
        username: ""
        # No existingSecret/password here — auth is handled via
        # REDIS_CONNECTION_STRING in additionalEnv above. Setting
        # existingSecret without a valid existingSecretPasswordKey
        # would trip the chart's required guard in _helpers.tpl:311.
        database: 6
