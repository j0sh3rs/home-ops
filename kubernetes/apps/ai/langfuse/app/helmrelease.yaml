---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app langfuse
spec:
  interval: 1h
  # EXCEPTION: langfuse chart OCI (ghcr.io/langfuse/helm-charts/langfuse) returns
  # 403 Forbidden — requires auth not available in cluster. Using HelmRepository
  # sourceRef as permitted fallback per CLAUDE.md: "Only fall back to HelmRepository
  # + sourceRef when the upstream has no OCI artifact available."
  chart:
    spec:
      chart: langfuse
      version: 1.5.33
      sourceRef:
        kind: HelmRepository
        name: langfuse
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    langfuse:
      nextauth:
        url: https://langfuse.68cc.io
        secret:
          secretKeyRef:
            name: langfuse-secrets
            key: NEXTAUTH_SECRET
      salt:
        secretKeyRef:
          name: langfuse-secrets
          key: SALT
      # SSO-only lockdown via chart-structured fields (NOT additionalEnv —
      # the chart already emits AUTH_DISABLE_SIGNUP / AUTH_DISABLE_USERNAME_PASSWORD
      # from these, so duplicating them in additionalEnv breaks server-side apply).
      features:
        signUpDisabled: true
      auth:
        disableUsernamePassword: true
        # Authentik via the generic CUSTOM OIDC provider (the chart's provider
        # whitelist has no "authentik" entry — only CUSTOM/GOOGLE/OKTA/etc.).
        # Renders AUTH_CUSTOM_* env vars.
        # Redirect URI in Authentik: https://langfuse.68cc.io/api/auth/callback/custom
        providers:
          custom:
            name: "Authentik"
            clientId:
              secretKeyRef:
                name: langfuse-secrets
                key: AUTH_AUTHENTIK_CLIENT_ID
            clientSecret:
              secretKeyRef:
                name: langfuse-secrets
                key: AUTH_AUTHENTIK_CLIENT_SECRET
            issuer: "https://auth.68cc.io/application/o/langfuse/"
            allowAccountLinking: "true"
            scope: "openid email profile"
      # REDIS_CONNECTION_STRING is set here so the chart's _helpers.tpl
      # langfuse.getEnvVar guard skips building its own connection string
      # from the structured redis.auth.* fields (which would require a bare
      # password key, not a full DSN). The full DSN (with URL-encoded password)
      # lives in langfuse-secrets.REDIS_URL — the same secret mounted via
      # additionalEnvFrom below.
      additionalEnv:
        - name: REDIS_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: langfuse-secrets
              key: REDIS_URL
        # ---- Headless init: seed org + project + OWNER user on first boot ----
        # The init user becomes OWNER of the org. On first SSO login with the
        # matching email, account linking attaches the Authentik identity to
        # this OWNER membership → admin access. Idempotent: only creates if
        # the org/project/user do not already exist.
        - name: LANGFUSE_INIT_ORG_ID
          value: "home-ops"
        - name: LANGFUSE_INIT_ORG_NAME
          value: "home-ops"
        - name: LANGFUSE_INIT_PROJECT_ID
          value: "home-ops"
        - name: LANGFUSE_INIT_PROJECT_NAME
          value: "home-ops"
        - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: langfuse-secrets
              key: LANGFUSE_PUBLIC_KEY
        - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: langfuse-secrets
              key: LANGFUSE_SECRET_KEY
        - name: LANGFUSE_INIT_USER_EMAIL
          value: "j0sh3rs@gmail.com"
        - name: LANGFUSE_INIT_USER_NAME
          value: "Josh"
        - name: LANGFUSE_INIT_USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: langfuse-secrets
              key: LANGFUSE_INIT_USER_PASSWORD
      additionalEnvFrom:
        - secretRef:
            name: langfuse-secrets

    postgresql:
      deploy: false
      host: postgres-rw.databases.svc.cluster.local
      port: 5432
      auth:
        username: langfuse
        existingSecret: langfuse-secrets
        secretKeys:
          userPasswordKey: INIT_POSTGRES_PASS
        database: langfuse
      migration:
        autoMigrate: true

    # ClickHouse runs as a standalone HelmRelease in the databases namespace.
    # See kubernetes/apps/databases/clickhouse/. Password sourced from
    # clickhouse-secret (databases ns); mirrored into langfuse-secrets via
    # the CLICKHOUSE_PASSWORD key so LangFuse can authenticate.
    clickhouse:
      deploy: false
      clusterEnabled: false   # single-node — no Keeper, plain MergeTree
      host: clickhouse.databases.svc.cluster.local
      httpPort: 8123
      nativePort: 9000
      auth:
        username: langfuse
        existingSecret: langfuse-secrets
        existingSecretKey: CLICKHOUSE_PASSWORD

    extraManifests:
      - apiVersion: batch/v1
        kind: Job
        metadata:
          name: langfuse-init-db
          annotations:
            "helm.sh/hook": pre-install,pre-upgrade
            "helm.sh/hook-weight": "-5"
            "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
        spec:
          backoffLimit: 6
          ttlSecondsAfterFinished: 300
          template:
            spec:
              restartPolicy: OnFailure
              containers:
                - name: init-db
                  image: ghcr.io/home-operations/postgres-init:18
                  envFrom:
                    - secretRef:
                        name: langfuse-secrets
