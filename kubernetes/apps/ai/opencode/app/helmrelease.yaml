---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app opencode
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    controllers:
      opencode:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/anomalyco/opencode
              # renovate: datasource=docker depName=ghcr.io/anomalyco/opencode
              tag: "1.17.20"
            args:
              - web
              - --hostname
              - "0.0.0.0"
              - --port
              - "4096"
              - --cors
              - "https://opencode.68cc.io"
            # No OPENCODE_SERVER_PASSWORD — Authentik forwardAuth at the
            # gateway is the only auth layer.
            env:
              # Git identity for commits made via the web UI
              GIT_AUTHOR_NAME: "OpenCode"
              GIT_AUTHOR_EMAIL: "opencode@68cc.io"
              GIT_COMMITTER_NAME: "OpenCode"
              GIT_COMMITTER_EMAIL: "opencode@68cc.io"
              # OpenCode resolves session storage (SQLite opencode.db +
              # storage/) to ${XDG_DATA_HOME}/opencode, defaulting to
              # /root/.local/share which lives on the pod's ephemeral
              # rootfs. Redirect it onto the workspace PVC so sessions
              # survive pod restarts — issue #489. OpenCode creates the
              # dir itself on startup (fs.mkdir recursive), no init
              # container needed.
              XDG_DATA_HOME: /workspace/.local/share
            envFrom:
              - secretRef:
                  name: opencode-secrets
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            probes:
              # TCP readiness on the web server port so a wedged process is
              # marked NotReady instead of silently serving nothing. Custom
              # spec (not the chart's HTTP default) — OpenCode has no documented
              # health path, so a TCP connect check is the safe signal.
              liveness:
                enabled: false
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 4096
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: false
        initContainers:
          # Copy config.json from ConfigMap into the writable config dir.
          # OpenCode reads from /root/.config/opencode/config.json at startup.
          # app-template v4+: volumeMounts go in persistence, not here.
          config-init:
            image:
              repository: busybox
              tag: 1.38.0
            command:
              - sh
              - -c
              - cp /configmap/config.json /root/.config/opencode/config.json
          # Clone home-ops into /workspace/home-ops for interactive editing.
          # Idempotent: skips clone if .git already exists (pod restart safe).
          # GITHUB_TOKEN from opencode-secrets — allows push/pull.
          repo-init:
            image:
              repository: alpine/git
              tag: v2.54.0
            command:
              - sh
              - -c
              - |
                REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/j0sh3rs/home-ops.git"
                if [ ! -d /workspace/home-ops/.git ]; then
                  git clone "$REMOTE" /workspace/home-ops
                  git -C /workspace/home-ops config user.name "OpenCode"
                  git -C /workspace/home-ops config user.email "opencode@68cc.io"
                else
                  # Refresh remote URL so token is current after pod restart.
                  git -C /workspace/home-ops remote set-url origin "$REMOTE"
                  git -C /workspace/home-ops fetch --quiet
                fi
            envFrom:
              - secretRef:
                  name: opencode-secrets
          # Install external skill bundles into the (ephemeral) config skills
          # dir on every boot — issue #486. Source of truth is the
          # opencode-skills-manifest ConfigMap (skills-install.yaml). OpenCode
          # reads skills from ~/.config/opencode/skills/<name>/SKILL.md. This
          # runs after config-init populates the dir and is idempotent: each
          # bundle is shallow-cloned at its pinned ref and the skill subtree is
          # copied in. A clone failure for one bundle is logged and skipped so
          # a single bad ref does not wedge pod startup.
          skills-init:
            # Explicit ordering — runs after config-init creates the config
            # dir. Without this the chart orders init containers alphabetically,
            # which only happens to be correct today.
            dependsOn: config-init
            image:
              repository: alpine/git
              tag: v2.54.0
            command:
              - sh
              - -c
              - |
                set -u
                SKILLS_DIR=/root/.config/opencode/skills
                mkdir -p "$SKILLS_DIR"
                # Strip comments/blanks, then read: name url ref subdir [allow]
                # `allow` is an optional comma-separated skill allowlist. When
                # set, ONLY those skill dirs are installed from the bundle; when
                # empty/absent, every skill in <subdir> is installed. This caps
                # the per-request skill-discovery payload OpenCode injects into
                # the system prompt (name+description of every SKILL.md). Large
                # bundles (ECC: 277 skills, ~217K of frontmatter ≈ 54k tokens)
                # otherwise overflow even a 32k context window on every request,
                # wedging the client in an unrecoverable compaction loop.
                grep -vE '^\s*(#|$)' /manifest/bundles.txt | while read -r name url ref subdir allow; do
                  [ -z "$name" ] && continue
                  tmp=$(mktemp -d)
                  echo "[skills-init] $name @ $ref"
                  if ! git clone --depth 1 --branch "$ref" --quiet "$url" "$tmp"; then
                    echo "[skills-init] WARN: clone failed for $name ($url@$ref), skipping" >&2
                    rm -rf "$tmp"; continue
                  fi
                  if [ ! -d "$tmp/$subdir" ]; then
                    echo "[skills-init] WARN: $subdir/ missing in $name, skipping" >&2
                    rm -rf "$tmp"; continue
                  fi
                  count=0
                  for skill in "$tmp/$subdir"/*/; do
                    [ -d "$skill" ] || continue
                    [ -f "$skill/SKILL.md" ] || continue
                    sname=$(basename "$skill")
                    # Honor allowlist when present: skip any skill not named.
                    if [ -n "${allow:-}" ]; then
                      case ",$allow," in
                        *",$sname,"*) : ;;
                        *) continue ;;
                      esac
                    fi
                    rm -rf "$SKILLS_DIR/$sname"
                    cp -a "$skill" "$SKILLS_DIR/$sname"
                    count=$((count + 1))
                  done
                  echo "[skills-init] $name: installed $count skills"
                  rm -rf "$tmp"
                done
                echo "[skills-init] total in $SKILLS_DIR: $(ls -1 "$SKILLS_DIR" | wc -l)"

    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 4096

    route:
      app:
        annotations:
          # external-dns: Cloudflare CNAME → tunnel for remote access
          external-dns.alpha.kubernetes.io/target: 3ecf7dee-f421-46df-bcc1-1ea7ff24155c.cfargotunnel.com
        hostnames:
          - opencode.68cc.io
        parentRefs:
          - name: traefik-external-gateway
            namespace: network
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: authentik-forwardauth
            backendRefs:
              - name: *app
                port: *port

    persistence:
      # Writable config dir — init container populates config.json here
      opencode-config:
        type: emptyDir
        globalMounts:
          - path: /root/.config/opencode
      # ConfigMap source (read-only)
      config-source:
        type: configMap
        name: opencode-config
        globalMounts:
          - path: /configmap
      # Skill-bundle manifest (read-only) — consumed by skills-init.
      manifest:
        type: configMap
        name: opencode-skills-manifest
        globalMounts:
          - path: /manifest
      # Workspace PVC — OpenCode writes session data and tool outputs here
      workspace:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: openebs-hostpath
        globalMounts:
          - path: /workspace
