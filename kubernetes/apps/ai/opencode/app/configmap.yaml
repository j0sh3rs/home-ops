---
# OpenCode config — mounted at /root/.config/opencode/config.json
# Provider "litellm" is a custom openai-compatible entry pointing at the
# in-cluster LiteLLM gateway. Model format is "litellm/<alias>" where the
# alias must match a model_name in LiteLLM's model_list configmap.
# {env:VAR} substitution applied by OpenCode at startup.
# models block required — without it OpenCode throws ProviderModelNotFoundError
# even though the provider loads (learned from Kelos task debugging).
#
# Per-model `limit.context` mirrors the llama-swap --ctx-size for each slot
# (source of truth: kubernetes/apps/ai/llama-swap/app/configmap.yaml) so
# OpenCode truncates history correctly instead of guessing. `limit.output`
# is a conservative per-turn cap.
#
# `mcp` points OpenCode at the in-cluster LiteLLM MCP aggregator (mcpjungle:
# context7/exa/github/playwright/etc.) — same gateway + virtual key as chat.
#
# `permission` is a guardrail: this agent is network-exposed (opencode.68cc.io)
# and holds a GitHub token on the workspace PVC, so it can run arbitrary shell.
# bash defaults to "ask"; read/edit/git/task-runner ops are allowed.
#
# `plugin` lists npm-published OpenCode plugins. OpenCode's bundled Bun fetches
# them at startup into the (ephemeral) config node_modules — no extra runtime in
# the image. Only zero-dependency plugins belong here: ones needing a system
# binary (git, firecrawl-cli), Bun-native bindings (bun-pty), or external
# accounts (supermemory) cannot run in this single-binary image and are tracked
# as deferred in issue #486. File-based SKILL.md bundles install separately via
# the skills-init container (see skills-install.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: opencode-config
data:
  config.json: |
    {
      "$schema": "https://opencode.ai/config.json",
      "provider": {
        "litellm": {
          "npm": "@ai-sdk/openai-compatible",
          "options": {
            "baseURL": "http://litellm.ai.svc.cluster.local:4000/v1",
            "apiKey": "{env:LITELLM_API_KEY}"
          },
          "models": {
            "local-fast": {
              "id": "local-fast",
              "limit": {"context": 8192, "output": 4096}
            },
            "local-balanced": {
              "id": "local-balanced",
              "limit": {"context": 32768, "output": 8192}
            },
            "local-coder": {
              "id": "local-coder",
              "limit": {"context": 16384, "output": 4096}
            },
            "local-coder-small": {
              "id": "local-coder-small",
              "limit": {"context": 32768, "output": 4096}
            },
            "local-large": {
              "id": "local-large",
              "limit": {"context": 24576, "output": 8192}
            },
            "local-reason": {
              "id": "local-reason",
              "limit": {"context": 16384, "output": 8192}
            },
            "local-reason-agent": {
              "id": "local-reason-agent",
              "limit": {"context": 32768, "output": 8192}
            }
          }
        }
      },
      "model": "litellm/local-balanced",
      "small_model": "litellm/local-fast",
      "plugin": [
        "@franlol/opencode-md-table-formatter@0.0.6"
      ],
      "mcp": {
        "litellm": {
          "type": "remote",
          "url": "http://litellm.ai.svc.cluster.local:4000/mcp",
          "enabled": true,
          "headers": {
            "Authorization": "Bearer {env:LITELLM_API_KEY}"
          }
        }
      },
      "permission": {
        "bash": {
          "*": "ask",
          "git *": "allow",
          "grep *": "allow",
          "ls *": "allow",
          "cat *": "allow",
          "task *": "allow",
          "kustomize *": "allow",
          "flux *": "allow"
        },
        "edit": "allow",
        "webfetch": "allow"
      },
      "autoshare": false,
      "autoupdate": false
    }
