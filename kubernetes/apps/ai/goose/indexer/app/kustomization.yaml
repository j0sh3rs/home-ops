---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./secret.sops.yaml
  - ./cronjob.yaml

configMapGenerator:
  - name: goose-indexer-app
    namespace: ai
    options:
      disableNameSuffixHash: true
    files:
      - indexer.py=./indexer.py
      - schema.sql=./schema.sql
