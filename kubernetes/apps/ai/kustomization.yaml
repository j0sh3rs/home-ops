---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
# AI workloads namespace: LiteLLM gateway + local inference (llama-swap),
# workflow automation (n8n), OpenCode. LiteLLM fronts llama-swap and
# (eventually) cloud providers behind a single OpenAI-compatible API.
#
# Components:
#   - common                 — namespace + cluster-secrets + sops-age
#   - repos/app-template     — bjw-s app-template OCIRepository in this ns
#                              (llama-swap, n8n use it)
#   - authentik-forwardauth  — authentik-forwardauth Middleware materialized
#                              in-namespace; HTTPRoutes ExtensionRef it
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
components:
  - ../../components/common
  - ../../components/repos/app-template
  - ../../components/authentik-forwardauth
resources:
  - ./faster-whisper/ks.yaml
  - ./litellm/ks.yaml
  - ./llama-swap/ks.yaml
  - ./n8n/ks.yaml
  - ./omniroute/ks.yaml
  - ./piper/ks.yaml
  # claude-code daemon (remote-control) DISABLED 2026-06-16. Auth/persistence
  # finally resolved (CLAUDE_CONFIG_DIR + uid 1024:100), but remote-control
  # still did not work usefully in-cluster — not worth further effort. The
  # autonomous loop does NOT need this daemon; it uses headless `claude -p`
  # Jobs (runner/job-template.yaml). Manifests retained for reference.
  # - ./claude-code/ks.yaml
  - ./mcpjungle/ks.yaml
  - ./omega-mcp/ks.yaml
  - ./opencode/ks.yaml
