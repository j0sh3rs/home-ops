---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app faster-whisper
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      faster-whisper:
        containers:
          app:
            # Wyoming-protocol STT server (rhasspy/wyoming-whisper). This is
            # the TCP Wyoming server HA's Wyoming integration speaks to — NOT
            # the fedirz/faster-whisper-server OpenAI-HTTP image, which does
            # not implement the Wyoming protocol and silently served nothing
            # on :10300.
            image:
              repository: rhasspy/wyoming-whisper
              # renovate: datasource=docker depName=rhasspy/wyoming-whisper
              tag: "3.5.0"
              pullPolicy: IfNotPresent
            args:
              - "--uri"
              - "tcp://0.0.0.0:10300"
              - "--model"
              - "tiny-int8"
              - "--language"
              - "en"
              - "--data-dir"
              - "/data"
              - "--download-dir"
              - "/data"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: "1"
                memory: 1Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    service:
      app:
        controller: *app
        type: ClusterIP
        ports:
          wyoming:
            port: 10300
            protocol: TCP
    persistence:
      models:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 2Gi
        retain: true
        globalMounts:
          - path: /data
