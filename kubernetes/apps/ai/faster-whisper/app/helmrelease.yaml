---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app faster-whisper
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      faster-whisper:
        containers:
          app:
            image:
              repository: fedirz/faster-whisper-server
              # renovate: datasource=docker depName=fedirz/faster-whisper-server
              tag: latest-cpu
              pullPolicy: IfNotPresent
            env:
              WHISPER__MODEL: tiny.en
              WHISPER__INFERENCE_DEVICE: cpu
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: "1"
                memory: 1Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    service:
      app:
        controller: *app
        type: ClusterIP
        ports:
          wyoming:
            port: 10300
            protocol: TCP
          http:
            port: 8000
            protocol: TCP
    persistence:
      models:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 2Gi
        retain: true
        globalMounts:
          - path: /root/.cache/huggingface
