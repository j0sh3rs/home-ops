---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app omega-mcp
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      omega-mcp:
        # Recreate: the daemon holds an exclusive SQLite WAL handle on the
        # PVC and an in-memory Streamable HTTP session table. A rolling
        # update would run two writers against one openebs-hostpath volume.
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        initContainers:
          # Builds the venv ON the PVC, installs OSS offline, runs
          # `omega activate` (downloads the licensed Pro wheel from the
          # vendor into that venv), installs the capability shim, writes
          # config.json (entity scoping on), and verifies the pro_tools
          # gate opened before exiting 0. Runs every boot; idempotent.
          init-omega:
            image:
              repository: ghcr.io/j0sh3rs/omega-mcp
              # Immutable tag, NOT :latest. Spegel (the P2P image cache)
              # resolves mutable tags from a peer's cached digest, so :latest
              # served a stale pre-fix image even with imagePullPolicy: Always.
              # A pinned tag forces the new digest; renovate bumps it each
              # release.
              #
              # Tag carries an `-rN` rebuild suffix (1.5.4-r4) holding the
              # pro/license fixes. Under default semver, Renovate ranks the
              # bare release `1.5.4` ABOVE its prerelease `1.5.4-rN` and
              # reverts the pin every run (see PRs df9800d1/81172a44/bbf11c88),
              # reintroducing the license init crash. The regex versioning
              # captures `-rN` as `build` so `-r4` > `-r3` > ... > bare 1.5.4,
              # and the bare tag no longer matches as a candidate.
              # renovate: datasource=docker depName=ghcr.io/j0sh3rs/omega-mcp versioning=regex:^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)-r(?<build>\d+)$
              tag: 1.5.4-r4
            command: ["/usr/local/bin/omega-init.sh"]
            envFrom:
              - secretRef:
                  name: omega-mcp-secrets
        containers:
          app:
            image:
              repository: ghcr.io/j0sh3rs/omega-mcp
              # Keep in lockstep with init-omega above; renovate bumps both.
              # renovate: datasource=docker depName=ghcr.io/j0sh3rs/omega-mcp versioning=regex:^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)-r(?<build>\d+)$
              tag: 1.5.4-r4
            envFrom:
              - secretRef:
                  name: omega-mcp-secrets
            resources:
              requests:
                cpu: 100m
                # bge-small ONNX model (~130Mi) + sqlite-vec + base runtime.
                memory: 512Mi
              limits:
                memory: 2Gi
                cpu: 2
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8377
                  initialDelaySeconds: 20
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8377
                  initialDelaySeconds: 20
                  periodSeconds: 15
                  failureThreshold: 3
    defaultPodOptions:
      # OMEGA Pro license is machine-fingerprint bound. The vendor wheel's
      # _device_fingerprint_hash() = sha256(device_id + system + machine +
      # node + uuid.getnode()). The last input, uuid.getnode(), is the pod's
      # eth0 MAC — and Cilium assigns a RANDOM (locally-administered) MAC to
      # every new pod, so the fingerprint changed on every rollout and the
      # pro_tools init gate failed (init-omega exit 1 -> CrashLoopBackOff)
      # even after a successful `omega activate`. Cilium 1.19 has no per-pod
      # static-MAC annotation, so we run on the host network: uuid.getnode()
      # then resolves the NODE's stable, universally-administered NIC MAC. The
      # PVC is openebs-hostpath RWO so the pod is already node-pinned to
      # bee-jms-01, making that node MAC effectively permanent for this pod.
      #
      # STOPGAP (fix A): the clean fix (B) is a sitecustomize.py in the
      # j0sh3rs/containers omega-mcp image that pins uuid.getnode() to a value
      # derived from device_id, removing the host-network requirement. Tracked
      # for a future -r5 image bump; revert hostNetwork once that ships.
      hostNetwork: true
      # hostNetwork pods don't get cluster DNS by default; this keeps in-cluster
      # service resolution working alongside egress to admin.omegamax.co.
      dnsPolicy: ClusterFirstWithHostNet
      # Pin a stable hostname too (covers platform.node(), another fingerprint
      # input). Belt and suspenders with hostNetwork.
      hostname: omega-mcp
      securityContext:
        # Matches the image (uid 1024, gid 100) and openebs-hostpath
        # ownership. fsGroup 100 keeps freshly created PVC dirs
        # group-writable so the venv/db/model writes don't EACCES.
        runAsUser: 1024
        runAsGroup: 100
        fsGroup: 100
    service:
      app:
        controller: *app
        ports:
          http:
            port: 8377
    persistence:
      # venv + .omega (db, license.json, config.json) + ONNX model cache.
      data:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 10Gi
        retain: true
        globalMounts:
          - path: /data
