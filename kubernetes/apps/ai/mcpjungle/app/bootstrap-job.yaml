---
# Idempotent bootstrap: writes ~/.mcpjungle.conf for auth, inits
# enterprise mode, then registers each upstream MCP server via
# `mcpjungle register -c <file>`. Already-present servers are skipped.
#
# Auth pattern: init-server writes ~/.mcpjungle.conf (registry_url +
# access_token). Subsequent commands pick it up automatically — no
# --api-key flag needed (undocumented/unsupported per CLI reference).
#
# ${VAR_NAME} substitution in JSON config files is a documented
# MCPJungle CLI feature; tokens are injected from env, never in ConfigMap.
apiVersion: batch/v1
kind: Job
metadata:
  name: mcpjungle-bootstrap
  annotations:
    kustomize.toolkit.fluxcd.io/force: "true"
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      volumes:
        - name: upstream-config
          configMap:
            name: mcpjungle-upstream-config
      initContainers:
        - name: wait-for-mcpjungle
          image: curlimages/curl:8.20.0
          command:
            - sh
            - -c
            - |
              until curl -sf http://mcpjungle:8080/health; do
                echo "waiting for mcpjungle..."; sleep 5
              done
      containers:
        - name: bootstrap
          image: ghcr.io/mcpjungle/mcpjungle:latest-stdio
          env:
            - name: MCPJUNGLE_URL
              value: "http://mcpjungle:8080"
          envFrom:
            - secretRef:
                name: mcpjungle-secrets
          volumeMounts:
            - name: upstream-config
              mountPath: /config
          command:
            - sh
            - -c
            - |
              set -e

              # init-server is idempotent (|| true) and writes
              # ~/.mcpjungle.conf with registry_url + access_token.
              # All subsequent CLI calls read that file automatically.
              mcpjungle init-server \
                --registry "${MCPJUNGLE_URL}" \
                --admin-email "${MCPJUNGLE_ADMIN_EMAIL}" \
                --admin-password "${MCPJUNGLE_ADMIN_PASSWORD}" \
                || true

              # List existing servers; skip registration if already present.
              EXISTING=$(mcpjungle list \
                --registry "${MCPJUNGLE_URL}" 2>/dev/null \
                || echo "")

              reg() {
                NAME=$1
                CONFIG=$2
                if echo "${EXISTING}" | grep -q "\"${NAME}\""; then
                  echo "skip ${NAME} (exists)"; return 0
                fi
                echo "registering ${NAME}..."
                mcpjungle register \
                  --registry "${MCPJUNGLE_URL}" \
                  -c "${CONFIG}"
              }

              # Remote HTTP upstreams — bearer_token in JSON config file.
              reg context7   /config/context7.json
              reg exa        /config/exa.json

              # stdio upstreams — command/args/env in JSON config file.
              reg github /config/github.json
              reg memory /config/memory.json
              reg playwright /config/playwright.json
              reg cloudflare /config/cloudflare.json
              reg perplexity /config/perplexity.json

              echo "bootstrap complete"
