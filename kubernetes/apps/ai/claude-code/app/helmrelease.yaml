---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app claude-code
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # The nfs-client mount owns files as admin:users = uid 1024, gid 100.
    # Running as any other uid/gid means the process cannot read its own
    # NFS-owned 0600 state files (e.g. ~/.claude/.claude.json), which breaks
    # remote-control's org/eligibility lookup. So we run AS 1024:100 to match
    # the NFS ownership exactly. fsGroup 100 covers freshly created dirs.
    defaultPodOptions:
      securityContext:
        runAsUser: 1024
        runAsGroup: 100
        runAsNonRoot: true
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      claude-code:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          bootstrap:
            image:
              repository: ghcr.io/j0sh3rs/claude-code
              tag: latest
            securityContext:
              runAsUser: 1024
              runAsGroup: 100
              runAsNonRoot: true
            envFrom:
              - secretRef:
                  name: claude-code-secrets
            env:
              HOME: /home/claude
              CLAUDE_CONFIG_DIR: /home/claude/.claude
            command:
              - /bin/sh
              - -c
              - |
                set -eu

                # Put global git config on the PVC (writable by uid 1024)
                export GIT_CONFIG_GLOBAL=/home/claude/.claude/.gitconfig

                # Write settings.json from template only if template is newer
                SETTINGS_DEST=/home/claude/.claude/settings.json
                SETTINGS_TPL=/config/settings.json.tpl
                mkdir -p /home/claude/.claude
                if [ ! -f "${SETTINGS_DEST}" ] \
                    || [ "${SETTINGS_TPL}" -nt "${SETTINGS_DEST}" ]; then
                  sed "s|\$MCPJUNGLE_API_KEY|${MCPJUNGLE_API_KEY}|g" \
                    "${SETTINGS_TPL}" > "${SETTINGS_DEST}"
                  echo "Wrote ${SETTINGS_DEST}"
                else
                  echo "Settings up-to-date, skipping"
                fi

                # Clone or update home-ops repo
                REPO_DIR=/workspace/home-ops
                git config --global --add safe.directory "${REPO_DIR}"
                git config --global --add safe.directory /workspace/home-ops
                if [ -d "${REPO_DIR}/.git" ]; then
                  git -C "${REPO_DIR}" remote set-url origin \
                    "https://${GITHUB_TOKEN}@github.com/j0sh3rs/home-ops.git"
                  git -C "${REPO_DIR}" fetch --prune
                  git -C "${REPO_DIR}" reset --hard origin/main
                else
                  mkdir -p /workspace
                  git clone \
                    "https://${GITHUB_TOKEN}@github.com/j0sh3rs/home-ops.git" \
                    "${REPO_DIR}"
                fi

                git -C "${REPO_DIR}" config user.name  "j0sh3rs"
                git -C "${REPO_DIR}" config user.email "j0sh3rs@gmail.com"

        containers:
          app:
            image:
              repository: ghcr.io/j0sh3rs/claude-code
              tag: latest
            # `claude remote-control` prompts "Enable Remote Control? (y/n)"
            # with no documented --yes flag. A pod has no stdin, so the prompt
            # hangs and the container crashes. Feed `y` via a pipe. `stdin:
            # true` keeps stdin open so the pipe is readable.
            command:
              - /bin/sh
              - -c
              - |
                exec sh -c 'yes | claude remote-control \
                  --name home-ops \
                  --permission-mode bypassPermissions \
                  --spawn worktree'
            stdin: true
            workingDir: /workspace/home-ops
            env:
              HOME: /home/claude
              DISABLE_AUTOUPDATER: "1"
              # Force ALL Claude config (credentials AND account/org state)
              # into the single PVC-mounted dir. Default behaviour splits
              # config between $HOME/.claude.json (HOME root, EPHEMERAL here —
              # only .claude is the PVC) and $HOME/.claude/, so account/org
              # state was lost on pod restart → remote-control "Unable to
              # determine your organization". Pinning the config dir keeps
              # everything on the persistent volume.
              CLAUDE_CONFIG_DIR: /home/claude/.claude
              # AUTH (P1a) — Remote Control is subscription-OAuth-ONLY.
              # It hard-refuses if ANTHROPIC_API_KEY is set, so the daemon
              # carries NO API key and NO ANTHROPIC_BASE_URL: it authenticates
              # with the claude.ai OAuth token persisted on the claude-home PVC
              # (run `claude login` once inside the pod) and calls Anthropic
              # directly. claude-code-secrets intentionally has NO
              # ANTHROPIC_API_KEY — that key lives in claude-code-runner-secrets
              # for the headless Jobs (vkey path), which is a separate shape.
              # Routing the daemon through LiteLLM /anthropic for observability
              # is deferred to P1.5 (dual-auth-header mechanic unverified).
            envFrom:
              - secretRef:
                  name: claude-code-secrets
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                cpu: "2"
                memory: 4Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - pgrep
                      - -f
                      - claude
                  initialDelaySeconds: 30
                  periodSeconds: 30
            securityContext:
              runAsUser: 1024
              runAsGroup: 100
              runAsNonRoot: true

    persistence:
      claude-home:
        type: persistentVolumeClaim
        storageClass: nfs-client
        accessMode: ReadWriteOnce
        size: 5Gi
        retain: true
        advancedMounts:
          claude-code:
            bootstrap:
              - path: /home/claude/.claude
            app:
              - path: /home/claude/.claude

      workspace:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 20Gi
        retain: true
        advancedMounts:
          claude-code:
            bootstrap:
              - path: /workspace
            app:
              - path: /workspace

      settings-template:
        type: configMap
        name: claude-code-settings-template
        defaultMode: 0444
        advancedMounts:
          claude-code:
            bootstrap:
              - path: /config
                readOnly: true
