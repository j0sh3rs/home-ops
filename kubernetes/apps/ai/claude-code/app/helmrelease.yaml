---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app claude-code
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      claude-code:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          bootstrap:
            image:
              repository: debian
              tag: bookworm-slim
            securityContext:
              runAsUser: 0
            envFrom:
              - secretRef:
                  name: claude-code-secrets
            command:
              - /bin/bash
              - -c
              - |
                set -euo pipefail

                apt-get update -qq && apt-get install -y -qq \
                  gettext-base git 2>&1 | tail -5

                # Write settings.json from template only if template is newer
                SETTINGS_DEST=/home/claude/.claude/settings.json
                SETTINGS_TPL=/config/settings.json.tpl
                mkdir -p /home/claude/.claude
                if [ ! -f "${SETTINGS_DEST}" ] \
                    || [ "${SETTINGS_TPL}" -nt "${SETTINGS_DEST}" ]; then
                  envsubst '$MCPJUNGLE_API_KEY' \
                    < "${SETTINGS_TPL}" > "${SETTINGS_DEST}"
                  echo "Wrote ${SETTINGS_DEST}"
                else
                  echo "Settings up-to-date, skipping"
                fi

                # Clone or update home-ops repo
                REPO_DIR=/workspace/home-ops
                if [ -d "${REPO_DIR}/.git" ]; then
                  git -C "${REPO_DIR}" remote set-url origin \
                    "https://${GITHUB_TOKEN}@github.com/j0sh3rs/home-ops.git"
                  git -C "${REPO_DIR}" fetch --prune
                  git -C "${REPO_DIR}" reset --hard origin/main
                else
                  mkdir -p /workspace
                  git clone \
                    "https://${GITHUB_TOKEN}@github.com/j0sh3rs/home-ops.git" \
                    "${REPO_DIR}"
                fi

                git -C "${REPO_DIR}" config user.name  "j0sh3rs"
                git -C "${REPO_DIR}" config user.email "j0sh3rs@gmail.com"

                chown -R 1001:1001 /home/claude /workspace

        containers:
          app:
            image:
              repository: ghcr.io/j0sh3rs/claude-code
              tag: latest
            command: ["claude"]
            args:
              - "agents"
              - "--dangerously-skip-permissions"
              - "--cwd"
              - "/workspace/home-ops"
            env:
              HOME: /home/claude
              DISABLE_AUTOUPDATER: "1"
            envFrom:
              - secretRef:
                  name: claude-code-secrets
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                cpu: "2"
                memory: 4Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - pgrep
                      - -f
                      - claude
                  initialDelaySeconds: 30
                  periodSeconds: 30
            securityContext:
              runAsUser: 1001
              runAsGroup: 1001
              runAsNonRoot: true

    persistence:
      claude-home:
        type: persistentVolumeClaim
        storageClass: nfs-client
        accessMode: ReadWriteOnce
        size: 5Gi
        retain: true
        advancedMounts:
          claude-code:
            bootstrap:
              - path: /home/claude/.claude
            app:
              - path: /home/claude/.claude

      workspace:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 20Gi
        retain: true
        advancedMounts:
          claude-code:
            bootstrap:
              - path: /workspace
            app:
              - path: /workspace

      settings-template:
        type: configMap
        name: claude-code-settings-template
        defaultMode: 0444
        advancedMounts:
          claude-code:
            bootstrap:
              - path: /config
                readOnly: true
