---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app claude-code
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # The nfs-client PVC squashes all writes to uid/gid 1024 regardless of the
    # pod's runAsUser. Running as anything else means the process cannot read
    # its own NFS-owned 0600 state files (e.g. ~/.claude/.claude.json), which
    # breaks remote-control's org/eligibility lookup. So we run AS 1024 to
    # match what NFS actually stores. fsGroup 1024 covers freshly created dirs.
    defaultPodOptions:
      securityContext:
        runAsUser: 1024
        runAsGroup: 1024
        runAsNonRoot: true
        fsGroup: 1024
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      claude-code:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          bootstrap:
            image:
              repository: ghcr.io/j0sh3rs/claude-code
              tag: latest
            securityContext:
              runAsUser: 1024
              runAsGroup: 1024
              runAsNonRoot: true
            envFrom:
              - secretRef:
                  name: claude-code-secrets
            env:
              HOME: /home/claude
            command:
              - /bin/sh
              - -c
              - |
                set -eu

                # Put global git config on the PVC (writable by uid 1001)
                export GIT_CONFIG_GLOBAL=/home/claude/.claude/.gitconfig

                # Write settings.json from template only if template is newer
                SETTINGS_DEST=/home/claude/.claude/settings.json
                SETTINGS_TPL=/config/settings.json.tpl
                mkdir -p /home/claude/.claude
                if [ ! -f "${SETTINGS_DEST}" ] \
                    || [ "${SETTINGS_TPL}" -nt "${SETTINGS_DEST}" ]; then
                  sed "s|\$MCPJUNGLE_API_KEY|${MCPJUNGLE_API_KEY}|g" \
                    "${SETTINGS_TPL}" > "${SETTINGS_DEST}"
                  echo "Wrote ${SETTINGS_DEST}"
                else
                  echo "Settings up-to-date, skipping"
                fi

                # Clone or update home-ops repo
                REPO_DIR=/workspace/home-ops
                git config --global --add safe.directory "${REPO_DIR}"
                if [ -d "${REPO_DIR}/.git" ]; then
                  git -C "${REPO_DIR}" remote set-url origin \
                    "https://${GITHUB_TOKEN}@github.com/j0sh3rs/home-ops.git"
                  git -C "${REPO_DIR}" fetch --prune
                  git -C "${REPO_DIR}" reset --hard origin/main
                else
                  mkdir -p /workspace
                  git clone \
                    "https://${GITHUB_TOKEN}@github.com/j0sh3rs/home-ops.git" \
                    "${REPO_DIR}"
                fi

                git -C "${REPO_DIR}" config user.name  "j0sh3rs"
                git -C "${REPO_DIR}" config user.email "j0sh3rs@gmail.com"

        containers:
          app:
            image:
              repository: ghcr.io/j0sh3rs/claude-code
              tag: latest
            command: ["claude"]
            args:
              - "remote-control"
              - "--name"
              - "home-ops"
              - "--permission-mode"
              - "bypassPermissions"
              - "--spawn"
              - "worktree"
            workingDir: /workspace/home-ops
            env:
              HOME: /home/claude
              DISABLE_AUTOUPDATER: "1"
              # AUTH (P1a) — Remote Control is subscription-OAuth-ONLY.
              # It hard-refuses if ANTHROPIC_API_KEY is set, so the daemon
              # carries NO API key and NO ANTHROPIC_BASE_URL: it authenticates
              # with the claude.ai OAuth token persisted on the claude-home PVC
              # (run `claude login` once inside the pod) and calls Anthropic
              # directly. claude-code-secrets intentionally has NO
              # ANTHROPIC_API_KEY — that key lives in claude-code-runner-secrets
              # for the headless Jobs (vkey path), which is a separate shape.
              # Routing the daemon through LiteLLM /anthropic for observability
              # is deferred to P1.5 (dual-auth-header mechanic unverified).
            envFrom:
              - secretRef:
                  name: claude-code-secrets
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                cpu: "2"
                memory: 4Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - pgrep
                      - -f
                      - claude
                  initialDelaySeconds: 30
                  periodSeconds: 30
            securityContext:
              runAsUser: 1024
              runAsGroup: 1024
              runAsNonRoot: true

    persistence:
      claude-home:
        type: persistentVolumeClaim
        storageClass: nfs-client
        accessMode: ReadWriteOnce
        size: 5Gi
        retain: true
        advancedMounts:
          claude-code:
            bootstrap:
              - path: /home/claude/.claude
            app:
              - path: /home/claude/.claude

      workspace:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 20Gi
        retain: true
        advancedMounts:
          claude-code:
            bootstrap:
              - path: /workspace
            app:
              - path: /workspace

      settings-template:
        type: configMap
        name: claude-code-settings-template
        defaultMode: 0444
        advancedMounts:
          claude-code:
            bootstrap:
              - path: /config
                readOnly: true
