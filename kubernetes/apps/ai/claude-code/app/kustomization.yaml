---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./secret.sops.yaml
  - ./configmap.yaml
  # Runner-only secret (vkey + github token) for the headless Job engine.
  # The Job template in ../runner/ stays unwired (applied per-task), but its
  # secret must be Flux-managed so it exists when a Job runs. Kept in app/
  # because kustomize forbids referencing files above the build dir.
  - ./runner-secret.sops.yaml
components:
  - ../../../../components/repos/app-template
