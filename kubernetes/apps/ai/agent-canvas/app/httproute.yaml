---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agent-canvas
  annotations:
    # unifi-dns writes a LAN A record; traefik-external-gateway VIP is
    # also LAN-reachable, and any route on this gateway gets a Cloudflare
    # tunnel CNAME automatically via cloudflare-dns (see CLAUDE.md
    # "External-DNS split-horizon"). Matches the omniroute/authentik
    # pattern for LAN+public exposure.
    external-dns.alpha.kubernetes.io/target: 192.168.35.15
spec:
  hostnames:
    - agent-canvas.68cc.io
  parentRefs:
    - name: traefik-external-gateway
      namespace: network
  rules:
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: authentik-forwardauth
      backendRefs:
        - name: agent-canvas
          port: 8000
