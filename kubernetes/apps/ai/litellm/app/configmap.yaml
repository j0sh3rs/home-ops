---
# LiteLLM proxy_config rendered as a ConfigMap and mounted by the chart at
# /app/config.yaml. The chart can also build this ConfigMap inline from
# `proxy_config:` Helm values; we keep it separate so renovate-tracked
# upstream model identifiers can be diffed cleanly without re-rendering
# the whole HelmRelease.
#
# Three logical tiers:
#   1. local-*       — llama-swap-backed local GGUFs (always-on, $0)
#   2. cloud-*       — Anthropic/OpenAI hosted models (commented OFF;
#                      enable per-model after wiring API keys via secret)
#   3. router_settings.fallbacks — cloud → cloud chains (also OFF until
#                                  a multi-cloud key set exists)
#
# The local-* aliases are stable identifiers you wire into n8n credentials
# and homepage tiles. Renaming a llama-swap model below requires a
# corresponding edit here, NOT a credential rotation in consumers.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-proxy-config
data:
  config.yaml: |
    # ------------------------------------------------------------------
    # Models exposed by /v1/models. Each entry maps a public alias
    # (model_name) to a backend (litellm_params.model + api_base).
    # ------------------------------------------------------------------
    # NOTE: `model:` value MUST match a llama-swap model key OR alias from
    # kubernetes/apps/ai/llama-swap/app/configmap.yaml. Don't use the GGUF
    # filename — llama-swap exposes its own model identifiers, not the file.
    model_list:
      # ---- Local (llama-swap, port 8080) ----
      # Always-on group (resident, zero swap latency):
      - model_name: local-fast
        litellm_params:
          model: openai/qwen3-1.7b
          api_base: http://llama-swap:8080/v1
          api_key: sk-local-llama-swap
          max_input_tokens: 8192
          # Single 16 GiB GPU — cap in-flight per local deployment so a
          # burst can't pile requests onto a model mid-swap. Resident
          # embed/rerank stay uncapped (batch RAG, no swap contention).
          max_parallel_requests: 2

      - model_name: local-embed
        litellm_params:
          model: openai/qwen3-embed
          api_base: http://llama-swap:8080/v1
          api_key: sk-local-llama-swap

      - model_name: local-rerank
        litellm_params:
          model: openai/qwen3-rerank
          api_base: http://llama-swap:8080/v1
          api_key: sk-local-llama-swap

      # Chat group (exclusive hot-swap):
      - model_name: local-balanced
        litellm_params:
          model: openai/qwen3-4b
          api_base: http://llama-swap:8080/v1
          api_key: sk-local-llama-swap
          max_parallel_requests: 2

      # FIM autocomplete (Qwen2.5-Coder-3B BASE — raw infill, no chat template)
      - model_name: local-coder-small
        litellm_params:
          model: openai/coder-fim
          api_base: http://llama-swap:8080/v1
          api_key: sk-local-llama-swap
          max_parallel_requests: 2

      # Agentic coder flagship (Qwen3-Coder-30B-A3B Q3_K_S MoE, 16k ctx).
      # Default for OpenCode/Kelos: fast MoE decode, reliable tool-calls.
      - model_name: local-coder
        litellm_params:
          model: openai/agentic-coder
          api_base: http://llama-swap:8080/v1
          api_key: sk-local-llama-swap
          max_input_tokens: 16384
          max_parallel_requests: 2

      # Heavy coder escalation (Qwen3.6-27B GatedDeltaNet, 8k ctx, RDNA4-only).
      # Higher coding quality (SWE-bench Verified 77.2) but dense 27B = slower
      # decode (~20-30 tok/s vs MoE ~150). Use for hard one-shot/visual tasks,
      # NOT the default agent loop. llama.cpp #22384 checkpoint fix confirmed in
      # image b9803 — smoke-test multi-turn before relying on it.
      - model_name: local-coder-heavy
        litellm_params:
          model: openai/qwen3.6-27b
          api_base: http://llama-swap:8080/v1
          api_key: sk-local-llama-swap
          max_input_tokens: 8192
          max_parallel_requests: 2

      # Deep reasoning (Qwen3-30B-A3B-Thinking-2507 Q3_K_M, 16k ctx)
      - model_name: local-reason
        litellm_params:
          model: openai/reasoner
          api_base: http://llama-swap:8080/v1
          api_key: sk-local-llama-swap
          max_input_tokens: 16384
          max_parallel_requests: 2

      # Agentic reasoning + tool-calling (GPT-OSS-20B MXFP4, best n8n/MCP)
      - model_name: local-reason-agent
        litellm_params:
          model: openai/reasoner-agentic
          api_base: http://llama-swap:8080/v1
          api_key: sk-local-llama-swap
          max_parallel_requests: 2

      # Dense safety floor (Qwen3-14B Q5_K_M — fallback if MoE Vulkan unstable)
      - model_name: local-large
        litellm_params:
          model: openai/qwen3-14b
          api_base: http://llama-swap:8080/v1
          api_key: sk-local-llama-swap
          max_input_tokens: 24576
          max_parallel_requests: 2

      # ---- Cloud providers (ENABLED 2026-06-15 — keys in litellm-secrets) ----
      # LiteLLM resolves os.environ/<KEY> at request time — a missing key
      # returns a clean 5xx, not a startup crash.
      # NOTE: Anthropic API uses bearer tokens, not OAuth.
      # Spend is capped on the minted virtual key, not here ($20/mo to start).
      - model_name: cloud-haiku
        litellm_params:
          model: anthropic/claude-haiku-4-5
          api_key: os.environ/ANTHROPIC_API_KEY

      - model_name: cloud-sonnet
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY

      # cloud-gpt-mini: OPENAI_API_KEY is present in litellm-secrets, but the
      # loop targets Anthropic only — leave disabled until an OpenAI use case
      # exists.
      # - model_name: cloud-gpt-mini
      #   litellm_params:
      #     model: openai/gpt-4o-mini
      #     api_key: os.environ/OPENAI_API_KEY

      # ---- GitHub Models (free Marketplace tier) ----
      # Degradation target for local-model HARD failures (Vulkan segfault,
      # OOM, swap deadlock) — keeps coding agents alive WITHOUT spending
      # Anthropic credit. Auth: GITHUB_TOKEN env (injected from
      # litellm-secrets via environmentSecrets) — LiteLLM's github/ provider
      # honors an explicit api_key, so we point it at GITHUB_TOKEN rather
      # than the provider-default GITHUB_API_KEY.
      #
      # VERIFY: GITHUB_TOKEN must carry the `models:read` scope, else these
      # return 403. The token was minted for repo/MCP use; confirm scope.
      #
      # Free-tier limits are tight (Low models: 15 rpm / 150 rpd / 8k input /
      # 4k output / 5 concurrent). This is a LAST-RESORT crash cushion, not a
      # routine route — do NOT use for context-window overflow (8k input cap
      # is below local-coder's 16k ceiling; overflow routes to local-large).
      - model_name: github-fallback
        litellm_params:
          model: github/gpt-4o-mini
          api_key: os.environ/GITHUB_TOKEN
          max_input_tokens: 8000
          max_parallel_requests: 5

    # ------------------------------------------------------------------
    # General proxy settings: master-key auth, DB-backed key/team store,
    # and "store_model_in_db" lets the admin UI hot-add models without
    # editing this ConfigMap (overrides merge in-memory at request time).
    # ------------------------------------------------------------------
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      store_model_in_db: true
      # Disable the budget-tracker prompt-DB writes in the request hot
      # path; we don't bill internally and the writes contend with the
      # CNPG primary on every completion. Re-enable when reporting is
      # actually consumed.
      disable_spend_logs: true
      # Admin UI restricted to admin role — SSO via Authentik OIDC.
      # Ensure it is the sole admin (set via PROXY_ADMIN_ID env).
      ui_access_mode: "admin_only"

    # ------------------------------------------------------------------
    # Default LiteLLM routing/cache behaviour applied to all requests.
    # `drop_params: true` strips OpenAI-only kwargs that local backends
    # reject (e.g. `parallel_tool_calls`). The redis cache is keyed on
    # request hash + model + temperature; identical retried prompts
    # short-circuit before hitting the upstream.
    # ------------------------------------------------------------------
    litellm_settings:
      success_callback: ["langfuse"]
      failure_callback: ["langfuse"]
      langfuse_public_key: os.environ/LANGFUSE_PUBLIC_KEY
      langfuse_secret_key: os.environ/LANGFUSE_SECRET_KEY
      langfuse_host: os.environ/LANGFUSE_HOST
      drop_params: true
      set_verbose: false
      # Client-facing request ceiling. Must be >= router_settings.timeout
      # or the proxy cuts the connection before the router retry/fallback
      # fires. Matched to 300s for llama-swap cold-fetch + first-token.
      request_timeout: 300
      cache: true
      cache_params:
        type: redis
        # REDIS_URL is the only env LiteLLM honors for the redis client;
        # do NOT split into REDIS_HOST/PORT/PASSWORD or both will be set.
        # REDIS_URL ends in /4 — DB 4 is LiteLLM's isolated cache namespace
        # (verified via keyspace; see runbooks/dragonflydb-db-alloc.md).
        redis_url: os.environ/REDIS_URL
        ttl: 600
        # Cache ONLY deterministic embedding/rerank calls. Caching chat
        # completions served a 600s-stale answer to coding agents — a
        # 0.9-similar prompt with a 1-line diff returns the wrong cached
        # output. Restrict to (a)embedding + (a)rerank; never chat.
        supported_call_types:
          - aembedding
          - embedding
          - arerank
          - rerank

    # ------------------------------------------------------------------
    # Router (multi-deployment routing across model_name aliases).
    # `simple-shuffle` is the default — random pick across deployments
    # of the same alias. Fallbacks are commented OFF until at least two
    # cloud providers have keys wired (otherwise a fallback to a missing
    # key just produces a different 5xx).
    # ------------------------------------------------------------------
    router_settings:
      routing_strategy: simple-shuffle
      # One retry on transient upstream failure (llama-swap cold-swap
      # 5xx, brief Vulkan stall). Without this a single swap blip surfaces
      # as a hard error to the coding agent.
      num_retries: 1
      # Hard ceiling per request. llama-swap cold model fetch + first-token
      # on the 30B MoE can take >2 min; cap at 300s so a wedged swap becomes
      # a clean timeout instead of an indefinite client hang.
      timeout: 300
      # Hard-failure degradation: when a local model errors out (Vulkan
      # segfault, OOM, swap deadlock) route to github-fallback (free GitHub
      # Models tier) so coding agents keep working WITHOUT spending Anthropic
      # credit. Free-tier 150 req/day cap makes this a crash cushion, not a
      # routine route — accept that a sustained local outage will exhaust it.
      fallbacks:
        - local-coder: ["github-fallback"]
        - local-coder-heavy: ["github-fallback"]
        - local-balanced: ["github-fallback"]
        - local-reason: ["github-fallback"]
        - local-large: ["github-fallback"]
      # Context-overflow degradation (distinct from hard failure): a prompt
      # exceeding a local model's ctx window routes to a bigger LOCAL window.
      # github-fallback is NOT eligible — its 8k input cap is below the 16k
      # ceiling we're escaping. local-coder/local-reason overflow to
      # local-large (24k); prompts beyond 24k hard-fail 400 by design (no
      # cloud spend on oversized repo dumps).
      context_window_fallbacks:
        - local-fast: ["local-balanced"]
        - local-coder: ["local-large"]
        - local-reason: ["local-large"]

    # ------------------------------------------------------------------
    # MCP gateway. LiteLLM proxies all registered MCP servers at /mcp
    # (OSS feature, v1.55+). mcpjungle aggregates all upstream MCP tools
    # (context7, exa, github, memory, playwright, cloudflare, perplexity,
    # n8n) behind a single streamable-HTTP endpoint — one entry here
    # covers the full tool catalogue.
    #
    # Clients wishing to invoke MCP tools via LiteLLM:
    #   - MCP endpoint: http://litellm:4000/mcp  (cluster-internal)
    #   - Auth: same LiteLLM virtual key used for /v1/chat/completions
    #
    # Open WebUI and n8n also connect to mcpjungle DIRECTLY for native
    # MCP UI/node support (mcpjungle:8080/mcp, api key from their secrets).
    # LiteLLM /mcp is for LLM tool-injection during chat completions.
    # ------------------------------------------------------------------
    mcp_servers:
      mcpjungle:
        server_type: streamable_http
        server_url: http://mcpjungle:8080/mcp
