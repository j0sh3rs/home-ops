---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app litellm
  namespace: &namespace ai
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 1h
  dependsOn:
    # Postgres for state (model/key/team tables, spend logs).
    - name: cloudnative-pg
      namespace: &cnpg-ns databases
    - name: cloudnative-pg-cluster
      namespace: *cnpg-ns
    # DragonflyDB (Redis-compatible) for proxy response cache.
    - name: dragonflydb-instance
      namespace: *cnpg-ns
    # llama-swap is the local upstream that LiteLLM proxies to. Wait for
    # it so the model_list endpoints don't 502 on first reconcile.
    - name: llama-swap
      namespace: *namespace
  path: ./kubernetes/apps/ai/litellm/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 10m
  wait: false
