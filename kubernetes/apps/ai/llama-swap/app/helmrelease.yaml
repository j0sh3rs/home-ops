---
# yamllint disable rule:line-length
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app llama-swap
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      llama-swap:
        # Recreate: init container downloads up to ~60 GiB of GGUFs. Rolling
        # update would spawn a second pod competing for the same PVC (RWO) and
        # then time out. Recreate ensures old pod is gone before init runs.
        strategy: Recreate
        annotations:
          # Reload pod when the config ConfigMap changes.
          reloader.stakater.com/auto: "true"
        initContainers:
          model-fetch:
            # One-shot GGUF downloader. Idempotent — skips files that
            # already exist and match the expected size. Uses the same
            # /models PVC as the main container so weights persist across
            # restarts. curlimages/curl is 12 MiB and pins to a known
            # digest pattern (see renovate annotation).
            image:
              repository: curlimages/curl
              # renovate: datasource=docker depName=curlimages/curl
              tag: 8.21.0
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                cd /models
                human() {
                  # Pretty-print bytes in SI (MiB/GiB) without bc.
                  awk -v b="$1" 'BEGIN{
                    split("B KiB MiB GiB TiB",u," ");
                    i=1; while (b>=1024 && i<5) { b=b/1024; i++ }
                    printf "%.2f %s", b, u[i]
                  }'
                }
                fetch() {
                  url="$1"; out="$2"; min_bytes="$3"
                  if [ -f "$out" ]; then
                    have=$(stat -c %s "$out" 2>/dev/null || echo 0)
                    if [ "$have" -ge "$min_bytes" ]; then
                      echo "[skip] $out exists ($(human $have))"
                      return 0
                    fi
                    echo "[retry] $out too small ($have < $min_bytes), re-fetching"
                    rm -f "$out"
                  fi
                  echo "[fetch] $out"
                  # Background curl; tail size every 5s until it exits.
                  # --no-progress-meter keeps stderr clean; we do our own reporting.
                  curl --no-progress-meter -Lf -o "$out.part" "$url" &
                  cpid=$!
                  while kill -0 "$cpid" 2>/dev/null; do
                    sleep 5
                    if [ -f "$out.part" ]; then
                      cur=$(stat -c %s "$out.part" 2>/dev/null || echo 0)
                      echo "[progress] $out: $(human $cur)"
                    fi
                  done
                  # Propagate curl exit status.
                  wait "$cpid"
                  final=$(stat -c %s "$out.part" 2>/dev/null || echo 0)
                  mv "$out.part" "$out"
                  echo "[done]  $out: $(human $final)"
                }
                # ── Always-on group (fetched first; llama-swap won't start without these) ──

                # Qwen3-1.7B Q5_K_M (~1.17 GiB) — router, always-on
                fetch \
                  "https://huggingface.co/unsloth/Qwen3-1.7B-GGUF/resolve/main/Qwen3-1.7B-Q5_K_M.gguf?download=true" \
                  "Qwen3-1.7B-Q5_K_M.gguf" \
                  1200000000
                # Qwen3-Embedding-0.6B Q8_0 (~640 MB) — RAG embeddings, always-on
                # --pooling last required; dims 1024 (was nomic 768 — re-index pgvector)
                fetch \
                  "https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/Qwen3-Embedding-0.6B-Q8_0.gguf?download=true" \
                  "Qwen3-Embedding-0.6B-Q8_0.gguf" \
                  600000000
                # Qwen3-Reranker-0.6B Q8_0 (~640 MB) — RAG reranker, always-on
                # filename is lowercase in ggml-org repo
                fetch \
                  "https://huggingface.co/ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF/resolve/main/qwen3-reranker-0.6b-q8_0.gguf?download=true" \
                  "qwen3-reranker-0.6b-q8_0.gguf" \
                  600000000

                # ── Chat group (hot-swap) ──

                # Qwen3-4B-Instruct-2507 Q4_K_M (~2.33 GiB) — local-balanced
                fetch \
                  "https://huggingface.co/unsloth/Qwen3-4B-Instruct-2507-GGUF/resolve/main/Qwen3-4B-Instruct-2507-Q4_K_M.gguf?download=true" \
                  "Qwen3-4B-Instruct-2507-Q4_K_M.gguf" \
                  2300000000
                # Qwen2.5-Coder-3B BASE Q5_K_M (~2.2 GiB) — FIM autocomplete
                # BASE not Instruct: pretrained with FIM tokens, no chat template
                fetch \
                  "https://huggingface.co/bartowski/Qwen2.5-Coder-3B-GGUF/resolve/main/Qwen2.5-Coder-3B-Q5_K_M.gguf?download=true" \
                  "Qwen2.5-Coder-3B-Q5_K_M.gguf" \
                  2100000000
                # Qwen3-Coder-30B-A3B-Instruct Q3_K_S (~13.3 GiB) — agentic coder
                # Pure-attention qwen3_moe; verified ~120 tok/s on gfx1030.
                # Q3_K_S required: Q3_K_M too large; IQ3_K does not load here.
                fetch \
                  "https://huggingface.co/unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF/resolve/main/Qwen3-Coder-30B-A3B-Instruct-Q3_K_S.gguf?download=true" \
                  "Qwen3-Coder-30B-A3B-Instruct-Q3_K_S.gguf" \
                  13000000000
                # Qwen3-30B-A3B-Thinking-2507 Q3_K_S (~12.85 GiB) — deep reasoner
                fetch \
                  "https://huggingface.co/bartowski/Qwen_Qwen3-30B-A3B-Thinking-2507-GGUF/resolve/main/Qwen_Qwen3-30B-A3B-Thinking-2507-Q3_K_S.gguf?download=true" \
                  "Qwen3-30B-A3B-Thinking-2507-Q3_K_S.gguf" \
                  12500000000
                # GPT-OSS-20B MXFP4 (~11.27 GiB) — agentic reasoning + tool-calling
                # flash-attn MUST be off; no KV quant (-ctk/-ctv segfaults)
                fetch \
                  "https://huggingface.co/ggml-org/gpt-oss-20b-GGUF/resolve/main/gpt-oss-20b-mxfp4.gguf?download=true" \
                  "gpt-oss-20b-mxfp4.gguf" \
                  11000000000
                # Qwen3-14B Q4_K_M (~8.4 GiB) — dense safety floor
                # ctx bumped to 24576; keep until MoE Vulkan confirmed stable
                fetch \
                  "https://huggingface.co/unsloth/Qwen3-14B-GGUF/resolve/main/Qwen3-14B-Q4_K_M.gguf?download=true" \
                  "Qwen3-14B-Q4_K_M.gguf" \
                  8400000000
                echo "[finished] model staging complete"
                ls -lh /models
            env:
              # Override HF_HUB_OFFLINE from main container — init must
              # reach HuggingFace.
              HF_HUB_OFFLINE: "0"
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
        containers:
          app:
            image:
              repository: ghcr.io/mostlygeek/llama-swap
              # Vulkan build ships /app/llama-server with Vulkan enabled.
              # renovate: datasource=docker depName=ghcr.io/mostlygeek/llama-swap
              tag: v179-vulkan-b7565
            args:
              - --config
              - /app/config.yaml
              - --listen
              - 0.0.0.0:8080
            env:
              # Pin Vulkan to the one iGPU exposed by amd-gpu device plugin.
              GGML_VK_VISIBLE_DEVICES: "0"
              # Prevent accidental outbound HF fetches from llama-server;
              # GGUF files are pre-staged by the model-init Job.
              HF_HUB_OFFLINE: "1"
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                # 12 GiB covers the largest model + KV cache.
                memory: 12Gi
                amd.com/gpu: "1"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
              startup:
                enabled: false
            securityContext:
              # llama-swap image runs as root; /dev/kfd + /dev/dri access
              # is mediated by the AMD device plugin, not privileged mode.
              runAsNonRoot: false
              runAsUser: 0
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 8080
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: 192.168.35.17
        hostnames: ["llm.68cc.io"]
        parentRefs:
          - name: traefik-internal-gateway
            namespace: network
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: authentik-forwardauth
            backendRefs:
              - name: *app
                port: *port
    persistence:
      # Persistent GGUF cache. bjw-s auto-names the PVC "llama-swap-models"
      # from the release name + volume key. Shared with the init container.
      models:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath-fast
        accessMode: ReadWriteOnce
        size: 50Gi
        retain: true
        globalMounts:
          - path: /models
      # llama-swap config.yaml from ConfigMap in this kustomization.
      config:
        type: configMap
        name: llama-swap-config
        globalMounts:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
    defaultPodOptions:
      # Prefer bigboi-jms-01 dGPU (Navi 48/9070 XT, 64CU, 16G VRAM, weight 100).
      # Falls back to bee-jms-03 APU (Cezanne 8CU, 16G UMA, weight 50).
      # `amd.com/gpu.vram In ["16G"]` is REQUIRED — bee-jms-01/02 have 3G UMA
      # which OOMs on Qwen3-14B / Coder-7B.
      # Note: amd.com/gpu.family NOT required — Navi 48 (device-id 7550) is
      # unrecognized by the labeller and emits no family label. vram sufficient.
      # ROCm is non-functional on Talos (HIP ABI mismatch); Vulkan on both.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu.vram
                    operator: In
                    values: ["16G"]
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node.kubernetes.io/gpu-tier
                    operator: In
                    values: ["dgpu"]
            - weight: 50
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["bee-jms-03"]
