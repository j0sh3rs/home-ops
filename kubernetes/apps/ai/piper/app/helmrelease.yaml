---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app piper
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      piper:
        containers:
          app:
            image:
              repository: rhasspy/wyoming-piper
              # renovate: datasource=docker depName=rhasspy/wyoming-piper
              tag: latest
              pullPolicy: IfNotPresent
            args:
              - "--piper"
              - "/usr/local/bin/piper"
              - "--data-dir"
              - "/data"
              - "--download-dir"
              - "/data"
              - "--voice"
              - "en_US-lessac-medium"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: "500m"
                memory: 256Mi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    service:
      app:
        controller: *app
        type: ClusterIP
        ports:
          wyoming:
            port: 10200
            protocol: TCP
    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 1Gi
        retain: true
        globalMounts:
          - path: /data
