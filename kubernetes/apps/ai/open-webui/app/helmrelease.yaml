---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              # renovate: datasource=github-releases depName=open-webui/open-webui
              tag: v0.9.5
            env:
              # Point at LiteLLM gateway (same namespace). LiteLLM fronts
              # llama-swap + cloud providers behind a single OpenAI-compat
              # endpoint. Ollama API disabled — neither LiteLLM nor
              # llama-swap implement /api/tags.
              OPENAI_API_BASE_URL: "http://litellm:4000/v1"
              ENABLE_OPENAI_API: "true"
              ENABLE_OLLAMA_API: "false"
              # Disable outbound telemetry
              DO_NOT_TRACK: "true"
              ANONYMIZED_TELEMETRY: "false"
              SCARF_NO_ANALYTICS: "true"
              ENABLE_COMMUNITY_SHARING: "false"
              # Enable authentication (disable with "false" for fully open access)
              WEBUI_AUTH: "true"
              # Data directory
              DATA_DIR: "/app/backend/data"
              # Authentik OIDC. Phase 1 (bootstrap): login form + signup
              # enabled so existing users can sign in and link Authentik.
              # Phase 2: flip ENABLE_LOGIN_FORM=false, DEFAULT_USER_ROLE=user.
              OPENID_PROVIDER_URL: "https://auth.68cc.io/application/o/open-webui/.well-known/openid-configuration"
              OAUTH_PROVIDER_NAME: "Authentik"
              OAUTH_SCOPES: "openid email profile"
              ENABLE_OAUTH_SIGNUP: "true"
              OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "true"
              ENABLE_LOGIN_FORM: "true"
              DEFAULT_USER_ROLE: "pending"
            envFrom:
              # WEBUI_SECRET_KEY (session signing) plus OPENAI_API_KEY
              # which is a LiteLLM virtual key (sk-...) that open-webui
              # sends as the Authorization bearer to LiteLLM. Generate via
              # `POST /key/generate` against the LiteLLM admin API after
              # the gateway is running, then add to this Secret.
              - secretRef:
                  name: open-webui-secrets
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 2
                memory: 2Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 8080
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: 192.168.35.15
        hostnames: ["ai.68cc.io"]
        parentRefs:
          - name: traefik-external-gateway
            namespace: network
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: authentik-forwardauth
            backendRefs:
              - name: *app
                port: *port
    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 10Gi
        retain: true
        globalMounts:
          - path: /app/backend/data
