---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app n8n
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    controllers:
      n8n:
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom:
              - secretRef:
                  name: n8n-secrets
        containers:
          app:
            image:
              repository: n8nio/n8n
              tag: 2.25.5
              pullPolicy: IfNotPresent
            env:
              - name: N8N_EDITOR_BASE_URL
                value: &url "n8n.68cc.io"
              - name: N8N_TEMPLATES_ENABLED
                value: "true"
              - name: N8N_PROTOCOL
                value: "https"
              - name: N8N_HOST
                value: "0.0.0.0"
              - name: N8N_DIAGNOSTICS_ENABLED
                value: false
              - name: N8N_HIRING_BANNER_ENABLED
                value: false
              - name: N8N_REINSTALL_MISSING_PACKAGES
                value: true
              - name: N8N_METRICS
                value: true
              - name: N8N_METRICS_INCLUDE_CACHE_METRICS
                value: true
              - name: N8N_METRICS_INCLUDE_MESSAGE_EVENT_BUS_METRICS
                value: true
              - name: GENERIC_TIMEZONE
                value: "America/New_York"
              # K8s SA token for in-cluster API calls from n8n Code nodes.
              # Read as $env.N8N_K8S_TOKEN. Auto-populated by K8s.
              - name: N8N_K8S_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: n8n-loop-sa-token
                    key: token
            envFrom:
              - secretRef:
                  name: n8n-secrets
            resources:
              requests:
                cpu: 300m
                memory: 1Gi
              limits:
                cpu: 4
                memory: 4Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 5678
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: 192.168.35.15
        hostnames: [*url]
        parentRefs:
          - name: traefik-external-gateway
            namespace: network
        rules:
          # Production webhook endpoints: NO forwardAuth. Headless callers
          # (GitHub, Stripe, calendar pushes, etc.) have no SSO session and
          # would be 302'd to Authentik, silently breaking the webhook. Auth
          # here is the per-webhook secret path/token, enforced by n8n itself.
          # Gateway API selects the most-specific PathPrefix, so these win
          # over the "/" catch-all below regardless of rule order.
          - matches:
              - path:
                  type: PathPrefix
                  value: /webhook
              - path:
                  type: PathPrefix
                  value: /webhook-test
              - path:
                  type: PathPrefix
                  value: /webhook-waiting
            backendRefs:
              - name: *app
                port: *port
          # Editor UI and REST API: SSO-gated via Authentik forwardAuth.
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: authentik-forwardauth
            backendRefs:
              - name: *app
                port: *port
