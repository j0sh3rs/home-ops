---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kelos
  namespace: &namespace kelos-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  # cert-manager must be ready before Kelos installs its CRD conversion webhook
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  interval: 1h
  path: ./kubernetes/apps/kelos-system/kelos/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  # CRD conversion webhook + controller rollout can be slow on first install
  timeout: 15m
  wait: true
