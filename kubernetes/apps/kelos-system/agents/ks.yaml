---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kelos-agents
  namespace: kelos-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: kelos
      namespace: kelos-system
    # Model gateway for all opencode Tasks spawned by this TaskSpawner set.
    - name: omniroute
      namespace: ai
  interval: 1h
  path: ./kubernetes/apps/kelos-system/agents/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kelos-system
  timeout: 5m
  wait: false
