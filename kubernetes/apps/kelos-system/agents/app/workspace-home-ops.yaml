---
# Workspace: clones j0sh3rs/home-ops for Kelos Task pods.
# GITHUB_TOKEN must be set in kelos-github-secret (repo scope PAT).
apiVersion: kelos.dev/v1alpha2
kind: Workspace
metadata:
  name: home-ops
  namespace: kelos-system
spec:
  repo: https://github.com/j0sh3rs/home-ops.git
  ref: main
  secretRef:
    name: kelos-github-secret
  setupCommand:
    - sh
    - -c
    - |
      git config user.name "Kelos Agent"
      git config user.email "kelos@68cc.io"
      mkdir -p ~/.config/opencode
      CONFIG='{"$schema":"https://opencode.ai/config.json","provider":{"omniroute":{"npm":"@ai-sdk/openai-compatible","options":{"baseURL":"http://omniroute.ai.svc.cluster.local:20128/v1","apiKey":"OMNIROUTE_KEY"},"models":{"best-coding":{"id":"best-coding"}}}},"model":"omniroute/best-coding","small_model":"omniroute/best-coding","autoshare":false,"autoupdate":false}'
      echo "$CONFIG" | sed "s/OMNIROUTE_KEY/${OPENAI_API_KEY}/" > ~/.config/opencode/config.json
      echo written
