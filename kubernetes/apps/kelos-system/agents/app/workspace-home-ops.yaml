---
# Workspace: clones j0sh3rs/home-ops for Kelos Task pods.
# GITHUB_TOKEN must be set in kelos-github-secret (repo scope PAT).
apiVersion: kelos.dev/v1alpha2
kind: Workspace
metadata:
  name: home-ops
  namespace: kelos-system
spec:
  repo: https://github.com/j0sh3rs/home-ops.git
  ref: main
  secretRef:
    name: kelos-github-secret
  setupCommand:
    - sh
    - -c
    - |
      git config user.name "Kelos Agent"
      git config user.email "kelos@68cc.io"
      mkdir -p ~/.config/opencode
      CONFIG='{"$schema":"https://opencode.ai/config.json","provider":{"litellm":{"npm":"@ai-sdk/openai-compatible","options":{"baseURL":"http://litellm.ai.svc.cluster.local:4000/v1","apiKey":"LITELLM_KEY"}}},"model":"litellm/local-coder","small_model":"litellm/local-fast","autoshare":false,"autoupdate":false,"models":{"local-fast":{"id":"local-fast"},"local-coder":{"id":"local-coder"},"local-balanced":{"id":"local-balanced"},"local-large":{"id":"local-large"},"local-reason":{"id":"local-reason"}}}'
      echo "$CONFIG" | sed "s/LITELLM_KEY/${OPENAI_API_KEY}/" > ~/.config/opencode/config.json
      echo written
