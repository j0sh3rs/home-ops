---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app metamcp
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      metamcp:
        initContainers:
          init-db:
            image:
              # ghcr.io/onedr0p/postgres-init was archived upstream — the
              # registry no longer serves manifests for any tag. The
              # home-operations org (onedr0p's continuation) publishes the
              # drop-in replacement. Tag scheme matches the CNPG cluster's
              # PG major version (postgres17-rw).
              repository: ghcr.io/home-operations/postgres-init
              # renovate: datasource=docker depName=ghcr.io/home-operations/postgres-init
              tag: "17"
            envFrom:
              - secretRef:
                  name: metamcp-secrets
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/metatool-ai/metamcp
              # renovate: datasource=docker depName=ghcr.io/metatool-ai/metamcp
              tag: 2.4.22
            envFrom:
              - secretRef:
                  name: metamcp-secrets
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
                cpu: 2
    service:
      app:
        controller: *app
        ports:
          http:
            primary: true
            port: &port 12008
    route:
      app:
        annotations:
          # LAN-only — internal VIP. cloudflare-dns owns the
          # `traefik-external-gateway` namespace and only publishes
          # CNAMEs to the tunnel for routes attached there. Routing via
          # `traefik-internal-gateway` here means unifi-dns publishes a
          # split-horizon LAN A record to 192.168.35.17 and the
          # hostname is unreachable from outside the LAN. Reasoning:
          # MCP is a high-trust client interface (full tool execution
          # against the cluster + remote services) and there is no
          # business case yet for reaching it off-network.
          external-dns.alpha.kubernetes.io/target: 192.168.35.17
        hostnames: ["mcp.68cc.io"]
        parentRefs:
          - name: traefik-internal-gateway
            namespace: network
        rules:
          # MCP traffic — programmatic clients (Claude Code, mcp-proxy)
          # cannot complete an interactive Google OAuth redirect, so the
          # MCP endpoint paths bypass the OIDC middleware. MetaMCP's
          # per-namespace API keys (header `Authorization: Bearer ...`
          # or query `?api_key=...`) are the auth mechanism on these
          # paths instead. Path layout (per upstream README):
          #   /metamcp/<endpoint>/sse           — SSE transport
          #   /metamcp/<endpoint>/mcp           — Streamable HTTP
          #   /metamcp/<endpoint>/api           — OpenAPI export
          #   /mcp-proxy/...                    — built-in MCP inspector
          # Rule ordering: Gateway API matches longest-prefix first, so
          # these specific prefixes hit before the root `/` rule below.
          - matches:
              - path: { type: PathPrefix, value: /metamcp }
              - path: { type: PathPrefix, value: /mcp-proxy }
            backendRefs:
              - name: *app
                port: *port
          # Admin UI + everything else: Google OAuth gate. Browser
          # users hit / (login + namespace management) and get
          # redirected to accounts.google.com with
          # mcp.68cc.io/oauth2/callback as the return URI. Adds
          # defence-in-depth on top of the LAN-only exposure since the
          # admin UI controls every MCP server's configuration and
          # secrets.
          - matches:
              - path: { type: PathPrefix, value: / }
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: google-oidc-secure
            backendRefs:
              - name: *app
                port: *port
