---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              # renovate: datasource=github-releases depName=open-webui/open-webui
              tag: v0.8.10
            env:
              # Point at internal Ollama service (same namespace)
              OLLAMA_BASE_URL: "http://ollama:11434"
              ENABLE_OLLAMA_API: "true"
              # Disable outbound telemetry
              DO_NOT_TRACK: "true"
              ANONYMIZED_TELEMETRY: "false"
              SCARF_NO_ANALYTICS: "true"
              ENABLE_COMMUNITY_SHARING: "false"
              # Enable authentication (disable with "false" for fully open access)
              WEBUI_AUTH: "true"
              # Data directory
              DATA_DIR: "/app/backend/data"
            envFrom:
              - secretRef:
                  name: open-webui-secrets
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 2
                memory: 2Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 8080
    route:
      app:
        hostnames: ["ai.68cc.io"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 10Gi
        retain: true
        globalMounts:
          - path: /app/backend/data
