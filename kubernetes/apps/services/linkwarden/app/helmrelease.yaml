---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app linkwarden
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    controllers:
      linkwarden:
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16
            envFrom: &envFrom
              - secretRef:
                  name: linkwarden-secrets
        containers:
          app:
            image:
              repository: ghcr.io/linkwarden/linkwarden
              tag: v2.14.1
              pullPolicy: IfNotPresent
            env:
              - name: TZ
                value: America/New_York
            envFrom:
              - secretRef:
                  name: linkwarden-secrets
            resources:
              requests:
                cpu: 300m
                memory: 1Gi
              limits:
                cpu: 2
                memory: 2Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 3000
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: 192.168.35.15
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Linkwarden
          gethomepage.dev/group: Apps
          gethomepage.dev/icon: linkwarden.png
          gethomepage.dev/description: Bookmark manager
          gethomepage.dev/href: https://links.68cc.io
        hostnames: ["links.68cc.io"]
        parentRefs:
          - name: traefik-external-gateway
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *port
