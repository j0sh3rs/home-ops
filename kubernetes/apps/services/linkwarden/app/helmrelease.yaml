---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app linkwarden
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    controllers:
      linkwarden:
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16
            envFrom: &envFrom
              - secretRef:
                  name: linkwarden-secrets
        containers:
          app:
            image:
              repository: ghcr.io/linkwarden/linkwarden
              tag: v2.15.1
              pullPolicy: IfNotPresent
            env:
              - name: TZ
                value: America/New_York
              # Authentik OIDC. Phase 2 lockdown: SSO-only. No password
              # login, no self-signup, no SSO autoreg. NEXTAUTH_URL must
              # include /api/v1/auth suffix. Break-glass requires manual
              # User row + Account link in postgres.
              - name: NEXTAUTH_URL
                value: "https://links.68cc.io/api/v1/auth"
              - name: NEXT_PUBLIC_AUTHENTIK_ENABLED
                value: "true"
              - name: AUTHENTIK_CUSTOM_NAME
                value: "Authentik"
              - name: NEXT_PUBLIC_DISABLE_REGISTRATION
                value: "true"
              - name: NEXT_PUBLIC_CREDENTIALS_ENABLED
                value: "false"
              - name: DISABLE_NEW_SSO_USERS
                value: "true"
            envFrom:
              - secretRef:
                  name: linkwarden-secrets
            resources:
              requests:
                cpu: 300m
                memory: 1Gi
              limits:
                cpu: 2
                memory: 2Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 3000
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: 192.168.35.15
        hostnames: ["links.68cc.io"]
        parentRefs:
          - name: traefik-external-gateway
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *port
