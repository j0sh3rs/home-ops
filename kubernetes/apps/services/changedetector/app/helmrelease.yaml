---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app changedetector
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      changedetector:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/dgtlmoon/changedetection.io
              # renovate: datasource=docker depName=ghcr.io/dgtlmoon/changedetection.io
              tag: 0.55.7
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
            env:
              - name: WEBDRIVER_URL
                value: http://localhost:4444/wd/hub
              - name: TZ
                value: America/New_York
              - name: DISABLE_VERSION_CHECK
                value: true
              - name: BASE_URL
                value: https://cd.68cc.io
              - name: PLAYWRIGHT_DRIVER_URL
                value: ws://localhost:3000
          browser-chrome:
            image:
              repository: selenium/standalone-chrome
              # renovate: datasource=docker depName=selenium/standalone-chrome
              tag: "148.0"
            securityContext:
              privileged: true
            env:
              - name: VNC_NO_PASSWD
                value: 1
              - name: SCREEN_HEIGHT
                value: 1920
              - name: SCREEN_HEIGHT
                value: 1080
              - name: SCREEN_DEPTH
                value: 24
          playwright-chrome:
            image:
              repository: dgtlmoon/sockpuppetbrowser
              # Upstream publishes only 0.0.1, 0.0.2, 0.0.3, and `latest`.
              # `latest` was a drift bomb (silent rebuild on every restart).
              # Pin to the highest semver tag; Renovate auto-bumps when 0.0.4
              # ships.
              # renovate: datasource=docker depName=dgtlmoon/sockpuppetbrowser
              tag: "0.0.3"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { add: ["SYS_ADMIN"] }
            env:
              - name: SCREEN_WIDTH
                value: 1920
              - name: SCREEN_HEIGHT
                value: 1024
              - name: SCREEN_DEPTH
                value: 16
              - name: MAX_CONCURRENT_CHROME_PROCESSES
                value: 10
    service:
      app:
        controller: *app
        ports:
          http:
            primary: true
            port: &port 5000
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: 192.168.35.15
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: ChangeDetector
          gethomepage.dev/group: Apps
          gethomepage.dev/icon: changedetection-io.png
          gethomepage.dev/description: Website change monitoring
          gethomepage.dev/href: https://cd.68cc.io
        hostnames: ["cd.68cc.io"]
        parentRefs:
          - name: traefik-external-gateway
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      localtime:
        enabled: true
        type: hostPath
        hostPath: /etc/localtime
      datastore:
        enabled: true
        size: 20Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /datastore
      dshm:
        enabled: true
        type: hostPath
        hostPath: /dev/shm
    defaultPodOptions:
      dnsConfig:
        options:
          - { name: ndots, value: "1" }
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
