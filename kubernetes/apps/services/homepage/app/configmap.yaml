---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: services
data:
  kubernetes.yaml: |
    mode: cluster
    ingress: true
    gateway: true

  settings.yaml: |
    title: 68cc.io Home
    headerStyle: clean
    startUrl: https://68cc.io
    background: https://assets.68cc.io/68cc_alt_logo.png
    theme: dark
    color: slate
    target: _blank
    hideVersion: true
    layout:
      Monitoring:
        style: row
        columns: 4
      Databases:
        style: row
        columns: 3
      Apps:
        style: row
        columns: 4
      Infra:
        style: row
        columns: 4
      Storage:
        style: row
        columns: 3

  widgets.yaml: |
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "home"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: custom
        target: _blank
        url: https://kagi.com/search?q=%s
        suggestionUrl: https://kagi.com/api/autosuggest?q=%s
        showSearchSuggestions: true
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: short

  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - abbr: GH
              href: https://github.com/j0sh3rs/home-ops
    - Docs:
        - Flux:
            - abbr: FX
              href: https://fluxcd.io/flux/
        - Talos:
            - abbr: TS
              href: https://www.talos.dev/

  docker.yaml: |
    # Docker socket not exposed to homepage; left empty intentionally.

  proxmox.yaml: |
    # No Proxmox integration; stub to satisfy homepage startup seeding.

  custom.css: ""

  custom.js: ""

  services.yaml: |
    # Grafana, Home Assistant, Linkwarden, IT-Tools surface via HTTPRoute
    # gethomepage.dev/* annotations (Gateway API auto-discovery).
    - Apps:
        - Ollama:
            href: https://ollama.68cc.io
            description: Local LLM inference (internal)
            icon: ollama.png
        - Open WebUI:
            href: https://ai.68cc.io
            description: Web UI for Ollama
            icon: open-webui.png
        - N8N:
            href: https://n8n.68cc.io
            description: Workflow automation
            icon: n8n.png
        - Atuin:
            href: https://sh.68cc.io
            description: Shell history sync
            icon: atuin.png

    - Infra:
        - Flux:
            href: https://flux-webhook.68cc.io
            description: GitOps webhook receiver
            icon: flux.png

    - Storage:
        - RustFS:
            href: https://s3.68cc.io
            description: S3-compatible object storage
            icon: minio.png
