---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app paperless
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    controllers:
      # ── Main Paperless-ngx application ──────────────────────────────────────
      paperless:
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 17
            envFrom:
              - secretRef:
                  name: paperless-secrets
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              # renovate: datasource=github-releases depName=paperless-ngx/paperless-ngx
              tag: 2.20.10
            env:
              PAPERLESS_URL: "https://paperless.68cc.io"
              PAPERLESS_PORT: "8000"
              PAPERLESS_REDIS: "redis://dragonflydb.databases.svc.cluster.local:6379"
              PAPERLESS_DBPORT: "5432"
              # Tika + Gotenberg for Office document support
              PAPERLESS_TIKA_ENABLED: "1"
              PAPERLESS_TIKA_ENDPOINT: "http://paperless-tika:9998"
              PAPERLESS_TIKA_GOTENBERG_ENDPOINT: "http://paperless-gotenberg:3000"
              # OCR settings
              PAPERLESS_OCR_LANGUAGE: "eng"
              PAPERLESS_OCR_MODE: "skip"
              # Timezone
              PAPERLESS_TIME_ZONE: "America/New_York"
              # Consume directory (watch folder)
              PAPERLESS_CONSUMPTION_DIR: "/usr/src/paperless/consume"
              PAPERLESS_DATA_DIR: "/usr/src/paperless/data"
              PAPERLESS_MEDIA_ROOT: "/usr/src/paperless/media"
              PAPERLESS_EXPORT_DIR: "/usr/src/paperless/export"
              # Consumer settings
              PAPERLESS_CONSUMER_POLLING: "60"
            envFrom:
              - secretRef:
                  name: paperless-secrets
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                cpu: 4
                memory: 4Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8000
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8000
                  initialDelaySeconds: 30
                  periodSeconds: 10
              startup:
                enabled: false

      # ── Gotenberg: Office-to-PDF conversion ─────────────────────────────────
      gotenberg:
        containers:
          app:
            image:
              repository: gotenberg/gotenberg
              # renovate: datasource=docker depName=gotenberg/gotenberg
              tag: 8.27.0
            env:
              # Disable unnecessary modules
              DISABLE_GOOGLE_CHROME: "1"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1
                memory: 512Mi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

      # ── Tika: Text extraction for non-PDF documents ──────────────────────────
      tika:
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/tika
              # renovate: datasource=github-releases depName=paperless-ngx/tika
              tag: 2.9.1-1.0
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 2
                memory: 1500Mi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    service:
      # Primary service for the web UI
      app:
        controller: paperless
        ports:
          http:
            port: &port 8000
      # Internal service for Gotenberg (Office→PDF)
      gotenberg:
        controller: gotenberg
        ports:
          http:
            port: 3000
      # Internal service for Tika (text extraction)
      tika:
        controller: tika
        ports:
          http:
            port: 9998

    route:
      app:
        hostnames: ["paperless.68cc.io"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      # Application data (search index, classification models)
      data:
        type: persistentVolumeClaim
        storageClass: openebs-localpv-hostpath
        accessMode: ReadWriteOnce
        size: 10Gi
        retain: true
        advancedMounts:
          paperless:
            app:
              - path: /usr/src/paperless/data

      # Scanned documents and thumbnails — size generously
      media:
        type: persistentVolumeClaim
        storageClass: openebs-localpv-hostpath
        accessMode: ReadWriteOnce
        size: 50Gi
        retain: true
        advancedMounts:
          paperless:
            app:
              - path: /usr/src/paperless/media

      # Watch folder: drop files here to trigger ingest
      consume:
        type: persistentVolumeClaim
        storageClass: openebs-localpv-hostpath
        accessMode: ReadWriteOnce
        size: 5Gi
        retain: true
        advancedMounts:
          paperless:
            app:
              - path: /usr/src/paperless/consume

      # Bulk export directory
      export:
        type: persistentVolumeClaim
        storageClass: openebs-localpv-hostpath
        accessMode: ReadWriteOnce
        size: 10Gi
        retain: true
        advancedMounts:
          paperless:
            app:
              - path: /usr/src/paperless/export
