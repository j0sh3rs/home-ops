---
# Home Assistant config-overlay mounted at /config/packages/.
# HA's `packages:` feature merges every *.yaml in that directory into the
# main configuration tree at startup, so we can add discrete blocks here
# without touching /config/configuration.yaml (which HA owns and rewrites
# via its UI). See home-ops-43h for context.
#
# STEP 1 (current): fix the 400-after-OIDC problem by telling HA to trust
# the Traefik reverse proxy and to read the real client IP from
# X-Forwarded-For. The trusted_networks auth provider is defined but
# allow_bypass_login is OFF until we know the admin user UUID to map it
# to (that UUID only exists after onboarding). The homeassistant provider
# keeps the local login form working so onboarding completes.
#
# STEP 2 (follow-up): flip allow_bypass_login=true and populate
# trusted_users with the UUID captured from /config/.storage/auth.
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-packages
data:
  # Only keys HA permits inside a package belong here. `homeassistant.auth_providers`
  # must live in the primary configuration.yaml (HA rejects it from packages
  # with a "Package network contains invalid customize" warning) — the
  # enable-auth-providers initContainer in the HelmRelease writes that block
  # directly onto the PVC at pod start.
  network.yaml: |
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        # Cilium cluster pod CIDR — all Traefik ingress pods live here.
        - 10.42.0.0/16
        # Cluster service CIDR — covers in-cluster service-to-service
        # calls (e.g. future prometheus sensor hitting ha:8123/api/...).
        - 10.43.0.0/16

  recorder.yaml: |
    # Recorder → CNPG Postgres. URL resolved at HA startup from the
    # RECORDER_DB_URL env var injected by home-assistant-db-secret.
    # CNPG handles durability via barman-cloud; don't need Velero fs-backup
    # of this DB. SQLite file at /config/home-assistant_v2.db will stop
    # growing on next restart once recorder switches engines.
    recorder:
      db_url: !env_var RECORDER_DB_URL
      purge_keep_days: 30
      commit_interval: 10

  prometheus.yaml: |
    # Cluster health surfaces from VMsingle (PromQL-compatible endpoint).
    # scan_interval raised to 120s (was 30-60s): three sensors hammering
    # vmsingle every 30s queued past its 10s window and got 429-flooded,
    # which then spammed "value_json is undefined" template errors. Slower
    # cadence + value_json guard stops both. Each rest sensor fires one
    # HTTP call per scan_interval.
    sensor:
      - platform: rest
        name: cluster_cpu_usage_percent
        unique_id: cluster_cpu_usage_percent
        resource: http://vmsingle-vmsingle.monitoring.svc.cluster.local:8429/api/v1/query
        params:
          query: "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)"
        value_template: >-
          {% if value_json is defined and value_json.data.result | count > 0 %}
          {{ value_json.data.result[0].value[1] | float | round(1) }}
          {% else %}
          {{ states('sensor.cluster_cpu_usage_percent') }}
          {% endif %}
        unit_of_measurement: "%"
        timeout: 25
        scan_interval: 120

      - platform: rest
        name: cluster_memory_used_gb
        unique_id: cluster_memory_used_gb
        resource: http://vmsingle-vmsingle.monitoring.svc.cluster.local:8429/api/v1/query
        params:
          query: "sum(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / 1024 / 1024 / 1024"
        value_template: >-
          {% if value_json is defined and value_json.data.result | count > 0 %}
          {{ value_json.data.result[0].value[1] | float | round(1) }}
          {% else %}
          {{ states('sensor.cluster_memory_used_gb') }}
          {% endif %}
        unit_of_measurement: "GB"
        timeout: 25
        scan_interval: 120

      - platform: rest
        name: cluster_nodes_up
        unique_id: cluster_nodes_up
        resource: http://vmsingle-vmsingle.monitoring.svc.cluster.local:8429/api/v1/query
        params:
          query: "count(up{job=\"node-exporter\"} == 1)"
        value_template: >-
          {% if value_json is defined and value_json.data.result | count > 0 %}
          {{ value_json.data.result[0].value[1] | int }}
          {% else %}
          {{ states('sensor.cluster_nodes_up') }}
          {% endif %}
        unit_of_measurement: "nodes"
        timeout: 25
        scan_interval: 120
