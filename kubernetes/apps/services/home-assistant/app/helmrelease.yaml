---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # Idempotently wire HA's packages feature into /config/configuration.yaml.
          # HA owns that file and rewrites it via the UI, but only when the user
          # edits via Settings → YAML. Appending a single `homeassistant:` block
          # with `packages: !include_dir_named packages` stays untouched across
          # HA's own writes. Guarded by grep so the block is never duplicated.
          enable-packages:
            image:
              repository: docker.io/library/busybox
              tag: 1.37.0
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                CFG=/config/configuration.yaml
                [ -f "$CFG" ] || { echo "$CFG missing, skipping"; exit 0; }
                if grep -qE '^homeassistant:[[:space:]]*$' "$CFG"; then
                  echo "packages include already wired"; exit 0
                fi
                printf '\nhomeassistant:\n  packages: !include_dir_named packages\n' >> "$CFG"
                echo "appended homeassistant.packages include to $CFG"
        containers:
          app:
            image:
              repository: homeassistant/home-assistant
              # renovate: datasource=docker depName=homeassistant/home-assistant
              tag: 2026.4.4
            env:
              TZ: "America/New_York"
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 2
                memory: 2Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
        # hostNetwork is required for mDNS, UPnP, and local device auto-discovery.
        # Without it, HA cannot detect most IoT devices on the LAN automatically.
        pod:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet

    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 8123

    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: 192.168.35.15
        hostnames: ["ha.68cc.io"]
        parentRefs:
          - name: traefik-external-gateway
            namespace: network
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: oidc-auth0-secure
            backendRefs:
              - name: *app
                port: *port

    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 20Gi
        retain: true
        globalMounts:
          - path: /config
      # YAML overlay files merged into HA's config tree via its packages
      # feature (wired by the enable-packages initContainer above). Mounted
      # read-only; all overlay content lives in configmap.yaml.
      packages:
        type: configMap
        name: home-assistant-packages
        globalMounts:
          - path: /config/packages
            readOnly: true
