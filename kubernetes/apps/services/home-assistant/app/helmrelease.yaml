---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: homeassistant/home-assistant
              # renovate: datasource=docker depName=homeassistant/home-assistant
              tag: 2026.3.3
            env:
              TZ: "America/New_York"
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 2
                memory: 2Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
        # hostNetwork is required for mDNS, UPnP, and local device auto-discovery.
        # Without it, HA cannot detect most IoT devices on the LAN automatically.
        pod:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet

    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 8123

    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: 192.168.35.15
        hostnames: ["ha.68cc.io"]
        parentRefs:
          - name: traefik-gateway
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 20Gi
        retain: true
        globalMounts:
          - path: /config
