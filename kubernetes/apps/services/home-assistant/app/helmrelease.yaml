---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # Create the homeassistant DB + user on the shared postgres17 CNPG
          # cluster if they don't exist yet. Reads INIT_POSTGRES_* vars from
          # the home-assistant-db-secret. Idempotent; safe to re-run.
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: "16"
            envFrom:
              - secretRef:
                  name: home-assistant-db-secret
          # Idempotently wire two blocks into /config/configuration.yaml:
          #
          #   homeassistant:
          #     packages: !include_dir_named packages   # merges packages/*.yaml
          #     auth_providers:                         # must be at root, not in a package
          #       - type: homeassistant
          #       - type: trusted_networks
          #         trusted_networks: [10.42.0.0/16]
          #         allow_bypass_login: false           # step 2 will flip to true + map user
          #
          # HA owns configuration.yaml and rewrites it via the UI, but this
          # initContainer only appends when the marker string isn't present,
          # so re-applies are no-ops. Delete the block manually if you need
          # to re-seed from scratch.
          enable-ha-config:
            image:
              repository: docker.io/library/busybox
              tag: 1.37.0
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                CFG=/config/configuration.yaml
                BEGIN='# BEGIN home-ops-managed (home-ops-43h)'
                END='# END home-ops-managed (home-ops-43h)'
                # Admin user UUID captured after first-run onboarding —
                # this maps any request from the cluster pod CIDR to that
                # user, which is the actual SSO bypass. Auth0/Traefik-OIDC
                # remains the edge gate; this just skips HA's own login.
                # Rotate by recreating the admin user and updating here.
                ADMIN_UUID='a1757624734047ec82b7e2f1d845b3ac'
                [ -f "$CFG" ] || { echo "$CFG missing, skipping"; exit 0; }
                # Strip any prior marker-fenced block (idempotent re-seed).
                if grep -qF "$BEGIN" "$CFG"; then
                  sed -i "/$BEGIN/,/$END/d" "$CFG"
                  # Also trim trailing blank lines left behind.
                  sed -i -e :a -e '/^$/{$d;N;ba' -e '}' "$CFG"
                fi
                {
                  printf '\n%s\n' "$BEGIN"
                  printf 'homeassistant:\n'
                  printf '  packages: !include_dir_named packages\n'
                  printf '  auth_providers:\n'
                  printf '    - type: homeassistant\n'
                  printf '    - type: trusted_networks\n'
                  printf '      trusted_networks:\n'
                  printf '        - 10.42.0.0/16\n'
                  printf '      trusted_users:\n'
                  printf '        10.42.0.0/16: %s\n' "$ADMIN_UUID"
                  printf '      allow_bypass_login: true\n'
                  printf '%s\n' "$END"
                } >> "$CFG"
                echo "re-seeded home-ops-managed block in $CFG"
        containers:
          app:
            image:
              repository: homeassistant/home-assistant
              # renovate: datasource=docker depName=homeassistant/home-assistant
              tag: 2026.5.1
            env:
              TZ: "America/New_York"
            envFrom:
              # Exposes RECORDER_DB_URL (and the INIT_POSTGRES_* which HA
              # itself ignores) so packages/recorder.yaml can reference
              # !env_var RECORDER_DB_URL.
              - secretRef:
                  name: home-assistant-db-secret
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 2
                memory: 2Gi
            probes:
              # Liveness intentionally off — HA occasionally pauses for long
              # integration setup/teardown (e.g. Sonos discovery). A failing
              # livenessProbe would send it into a crash loop for what is
              # actually healthy behavior.
              liveness:
                enabled: false
              # Readiness on /manifest.json — always 200 on a running HA,
              # independent of login state, so the probe doesn't flap when
              # anonymous auth is disabled. Gates Service endpoint add/drop.
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /manifest.json
                    port: 8123
                  initialDelaySeconds: 30
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 3
              # Startup off — HA's first boot with many integrations can
              # take >2 min; use initialDelaySeconds on readiness instead.
              startup:
                enabled: false
        # hostNetwork is required for mDNS, UPnP, and local device auto-discovery.
        # Without it, HA cannot detect most IoT devices on the LAN automatically.
        pod:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet

    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 8123

    route:
      app:
        annotations:
          # Internal-only: ha.68cc.io is served from traefik-internal
          # (VIP 192.168.35.17) behind UniFi split-horizon DNS. The
          # Cloudflare tunnel publishes only traefik-external-gateway,
          # so this route does NOT get a public CNAME — HA remains
          # LAN-only until the security posture of exposing it publicly
          # is evaluated (HA Companion apps hold long-lived bearer
          # tokens; a leaked token equals full house-control).
          external-dns.alpha.kubernetes.io/target: 192.168.35.17
        hostnames: ["ha.68cc.io"]
        parentRefs:
          - name: traefik-internal-gateway
            namespace: network
        rules:
          # API + auth + static paths bypass oauth2-proxy. HA Companion
          # apps (iOS/Android) authenticate to /api/* and /api/websocket
          # via long-lived bearer tokens stored in the keychain; the
          # Google OAuth redirect flow would kill them. HA's own login
          # form lives at /auth/authorize and serves /static + /local
          # as public assets — those must remain reachable without a
          # Google session to render the login UI.
          #
          # Rule ordering: Gateway API matches longest-prefix first so
          # these specific prefixes hit before the root `/` rule below.
          - matches:
              - path: { type: PathPrefix, value: /api }
              - path: { type: PathPrefix, value: /auth }
              - path: { type: PathPrefix, value: /static }
              - path: { type: PathPrefix, value: /local }
              - path: { type: PathPrefix, value: /frontend_latest }
              - path: { type: PathPrefix, value: /hacsfiles }
              - path: { type: PathPrefix, value: /manifest.json }
              - path: { type: PathPrefix, value: /service_worker.js }
            backendRefs:
              - name: *app
                port: *port
          # Dashboard + everything else: Google OAuth gate. Browser
          # users hit / (Lovelace) or /config / /developer-tools and
          # get redirected to auth.68cc.io for Google sign-in.
          - matches:
              - path: { type: PathPrefix, value: / }
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: oauth2-proxy-errors
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: oauth2-proxy-auth
            backendRefs:
              - name: *app
                port: *port

    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 20Gi
        retain: true
        globalMounts:
          - path: /config
      # YAML overlay files merged into HA's config tree via its packages
      # feature (wired by the enable-ha-config initContainer above). Mounted
      # read-only; all overlay content lives in configmap.yaml.
      packages:
        type: configMap
        name: home-assistant-packages
        globalMounts:
          - path: /config/packages
            readOnly: true
