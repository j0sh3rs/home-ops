---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: services
data:
  mosquitto.conf: |
    # Mosquitto broker config — LAN-internal only (ClusterIP).
    # No TLS (cluster mTLS/NetworkPolicy layer handles that if added
    # later). No anonymous access. Password file provided by Secret
    # mount.
    listener 1883 0.0.0.0
    protocol mqtt

    allow_anonymous false
    password_file /mosquitto/secret/passwd

    persistence true
    persistence_location /mosquitto/data/

    log_dest stdout
    log_type error
    log_type warning
    log_type notice
    log_type information
