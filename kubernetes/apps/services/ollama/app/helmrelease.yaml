---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      ollama:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ollama/ollama
              # renovate: datasource=docker depName=ollama/ollama
              tag: 0.23.0-rocm
            env:
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_MODELS: /models
              # Allow longer context windows at the cost of VRAM
              OLLAMA_NUM_PARALLEL: "2"
              OLLAMA_MAX_LOADED_MODELS: "2"
              # ROCm workaround for gfx90c (Renoir/Cezanne APU iGPU):
              # ROCm ships no Tensile DB entry for gfx90c → rocBLAS init fails
              # with "Illegal seek" on TensileLibrary.dat. Masquerade as gfx900
              # (Vega10) which has precompiled kernels. Without this, ollama
              # silently falls back to CPU inference.
              HSA_OVERRIDE_GFX_VERSION: "9.0.0"
              # Bound ROCm to the single iGPU exposed by amd-gpu device plugin.
              ROCR_VISIBLE_DEVICES: "0"
              HIP_VISIBLE_DEVICES: "0"
              # Small-VRAM APU tuning: flash attention + quantized KV cache
              # reduces KV memory ~2x so more of the 2 GiB UMA is free for
              # model weights. Safe with recent ROCm on gfx900.
              OLLAMA_FLASH_ATTENTION: "1"
              OLLAMA_KV_CACHE_TYPE: "q8_0"
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                memory: 32Gi
                amd.com/gpu: "1"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/tags
                    port: 11434
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/tags
                    port: 11434
                  initialDelaySeconds: 15
                  periodSeconds: 10
              startup:
                enabled: false
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 11434
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: 192.168.35.17
        hostnames: ["ollama.68cc.io"]
        parentRefs:
          - name: traefik-internal-gateway
            namespace: network
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: oidc-auth0-secure
            backendRefs:
              - name: *app
                port: *port
    persistence:
      models:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 100Gi
        retain: true
        globalMounts:
          - path: /models
    defaultPodOptions:
      # GPU node scheduling:
      # - require an AMD GPU node (excludes any non-GPU node added later)
      # - soft-prefer bee-jms-03 (Cezanne 8CU + memory-tier: high) for best tok/s
      # - soft-exclude bee-jms-01 (Renoir, older 7CU, device-id 1636) as fallback
      # Soft affinity keeps failover to bee-jms-02 if bee-jms-03 is down.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu.family
                    operator: Exists
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["bee-jms-03"]
            - weight: 50
              preference:
                matchExpressions:
                  - key: amd.com/gpu.device-id
                    operator: In
                    values: ["1638"]
