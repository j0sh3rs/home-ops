---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      ollama:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ollama/ollama
              # renovate: datasource=docker depName=ollama/ollama
              tag: 0.18.1-rocm
            env:
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_MODELS: /models
              # Allow longer context windows at the cost of VRAM
              OLLAMA_NUM_PARALLEL: "2"
              OLLAMA_MAX_LOADED_MODELS: "2"
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                memory: 32Gi
                amd.com/gpu: "1"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/tags
                    port: 11434
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/tags
                    port: 11434
                  initialDelaySeconds: 15
                  periodSeconds: 10
              startup:
                enabled: false
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 11434
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: 192.168.35.15
        hostnames: ["ollama.68cc.io"]
        parentRefs:
          - name: traefik-gateway
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      models:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 100Gi
        retain: true
        globalMounts:
          - path: /models
