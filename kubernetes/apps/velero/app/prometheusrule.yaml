---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: velero-alerts
  namespace: velero
  labels:
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    - name: velero-backups
      interval: 30s
      rules:
        - alert: VeleroBackupFailure
          expr: |
            increase(velero_backup_failure_total[1h]) > 0
          for: 5m
          labels:
            severity: critical
            component: backup
          annotations:
            summary: "Velero backup failed for schedule {{ $labels.schedule }}"
            description: "{{ $value }} Velero backup(s) have failed in the last hour for schedule {{ $labels.schedule }}. Cluster data may not be protected."

        - alert: VeleroBackupPartialFailure
          expr: |
            increase(velero_backup_partial_failure_total[1h]) > 0
          for: 5m
          labels:
            severity: warning
            component: backup
          annotations:
            summary: "Velero backup partially failed for schedule {{ $labels.schedule }}"
            description: "{{ $value }} Velero backup(s) completed with partial failures in the last hour for schedule {{ $labels.schedule }}. Some resources may not be backed up."

        - alert: VeleroScheduleStale
          # Fires if no backup *attempt* has finalized for the schedule in the
          # last 27h (covers one missed run + overhead). Uses absent() +
          # increase() to catch the "no Backup CRs at all" case that the
          # previous `velero_backup_last_status == 0` rule missed during the
          # 2026-04-03..05-01 outage — empty vector never crossed == 0 so
          # nothing fired for 28 days.
          #
          # We count attempts rather than successes because at home-ops we
          # currently run without CSI drivers (home-ops-ohh) so every
          # scheduled backup finalizes as PartiallyFailed. The scheduler
          # *is* working in that state; we don't want to page every 15m.
          # VeleroBackupFailure + VeleroBackupPartialFailure cover quality.
          expr: |
            absent(velero_backup_attempt_total{schedule="daily-backup"}) == 1
              or increase(velero_backup_attempt_total{schedule="daily-backup"}[27h]) < 1
          for: 15m
          labels:
            severity: critical
            component: backup
          annotations:
            summary: "Velero schedule daily-backup is stale"
            description: |-
              No Velero backup attempt has been observed for schedule
              daily-backup in the last 27 hours, or the metric is entirely
              absent (scheduler halted / velero pod down / CRs never created).
              Check: kubectl get schedule,backup -n velero --context home

        - alert: VeleroBackupDurationHigh
          expr: |
            velero_backup_duration_seconds{schedule!=""} > 3600
          for: 5m
          labels:
            severity: warning
            component: backup
          annotations:
            summary: "Velero backup taking longer than 1 hour for schedule {{ $labels.schedule }}"
            description: "Velero backup for schedule {{ $labels.schedule }} has been running for {{ $value | humanizeDuration }}. Investigate for stuck or unusually large backup."

    - name: velero-restores
      interval: 30s
      rules:
        - alert: VeleroRestoreFailure
          expr: |
            increase(velero_restore_failed_total[1h]) > 0
          for: 5m
          labels:
            severity: critical
            component: backup
          annotations:
            summary: "Velero restore operation failed"
            description: "{{ $value }} Velero restore(s) have failed in the last hour."
