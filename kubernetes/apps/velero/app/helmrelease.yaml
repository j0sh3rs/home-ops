---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: vmware-tanzu
  namespace: velero
spec:
  interval: 1h
  url: https://vmware-tanzu.github.io/helm-charts
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 1h
  chart:
    spec:
      chart: velero
      # renovate: datasource=helm depName=velero repository=https://vmware-tanzu.github.io/helm-charts
      version: 12.1.0
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: velero
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # CRDs managed out-of-band by the velero-crds Flux Kustomization
    # (../crds/app) pinned to the same chart tag as chart.spec.version below.
    # Keep false so the chart never touches CRDs on upgrade.
    upgradeCRDs: false

    # Resource limits per NFR-SCALE-001
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 500Mi

    # Initialize with AWS S3 plugin (CSI plugin temporarily disabled until working version found)
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.2
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins

    # Backup storage location configuration
    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: velero
          default: true
          config:
            region: minio # Use 'minio' as region for non-AWS S3
            s3ForcePathStyle: "true" # Required for Minio S3 compatibility
            s3Url: https://s3.68cc.io
            publicUrl: https://s3.68cc.io
            insecureSkipTLSVerify: "false"

      # CSI snapshot path disabled — the cluster has no CSI drivers and
      # no external-snapshotter CRDs, so leaving EnableCSI on only produced
      # noisy "no matches for kind VolumeSnapshot" reconcile errors and a
      # spurious PartiallyFailed phase on every Backup (see home-ops-ohh
      # smoke test). PV data is captured by the kopia node-agent below.
      # Re-enable when/if we adopt a CSI-capable storage class.

      # Default backup TTL
      defaultBackupTTL: 720h # 30 days

      # Opt-out fs-level backup — every PV is captured via kopia unless the
      # PVC carries the velero.io/exclude-from-backup="true" label. Excluded
      # at home-ops: CNPG pgdata (barman), vmsingle/victoria-logs/alertmanager
      # (loss-acceptable hot stores), grafana (dashboards in Git), crowdsec
      # (rebuilt from hub), dragonflydb (in-mem cache). See home-ops-ohh.
      defaultVolumesToFsBackup: true
      uploaderType: kopia

    # Credentials for S3 access (from SOPS-encrypted secret)
    credentials:
      existingSecret: velero-s3-secret

    # The chart's own checksum/secret pod annotation only fires when it
    # generates the Secret itself (credentials.useSecret + no
    # existingSecret) — see templates/deployment.yaml condition. Since we
    # bring our own existingSecret, that auto-reload path is skipped, so
    # wire Reloader explicitly — issue #493.
    podAnnotations:
      secret.reloader.stakater.com/reload: velero-s3-secret

    # Environment variables to force AWS SDK to use credentials file (not EC2 IMDS)
    extraEnvVars:
      AWS_SHARED_CREDENTIALS_FILE: /credentials/cloud
      AWS_SDK_LOAD_CONFIG: "false"

    # CSI snapshot feature is off cluster-wide (see configuration above).
    snapshotsEnabled: false

    # Deploy node-agent DaemonSet for kopia fs-level backup (home-ops-ohh).
    # Cluster runs non-CSI storage so this is the only data-path for PV
    # backups. Single-node-per-volume topology means no cross-host dedup,
    # but kopia still does content-address dedup per repo.
    deployNodeAgent: true
    nodeAgent:
      # Talos default kubelet pods dir — required for node-agent to access
      # pod volume bind-mounts.
      podVolumePath: /var/lib/kubelet/pods
      privileged: true
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
      # Node-agent pods are per-node, tolerate control-plane taints so etcd
      # node PVs (if any) would be covered too.
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    # ServiceMonitor for Prometheus metrics (NFR-OPER-001)
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
