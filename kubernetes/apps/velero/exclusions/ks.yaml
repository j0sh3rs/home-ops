---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app velero-exclusions
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  # Server-side-apply partial PVC manifests that only carry the
  # velero.io/exclude-from-backup label. Prune is off because these docs
  # do not own the PVCs themselves — the operator/chart that created
  # each PVC retains spec ownership via SSA field-manager separation.
  # Wait is off because the partial-manifest pattern leaves the underlying
  # PVCs without a Ready signal tied to this Kustomization.
  interval: 1h
  path: ./kubernetes/apps/velero/exclusions/app
  prune: false
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
