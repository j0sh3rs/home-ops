# Velero PVC exclusion set.
#
# Each document is a partial PVC manifest that only carries the
# velero.io/exclude-from-backup label. Applied via Flux server-side-apply
# so operator/chart ownership of spec + other labels is preserved. Volume
# data for these PVCs will NOT be captured by the daily fs-backup schedule.
#
# Rationale is per-PVC below; overall decision tree in home-ops-ohh.
#
# CNPG PVCs (postgres17-*) are excluded separately via the Cluster CR's
# spec.inheritedMetadata — keep operator-native where the chart supports it.
---
# Grafana — dashboards, datasources, provisioning are Git-managed via the
# grafana-operator CRDs. Persistent SQLite state is trivial for a single-user
# lab with anonymous auth disabled to LAN.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: monitoring
  labels:
    velero.io/exclude-from-backup: "true"
---
# vmsingle — hot metrics store (30d local retention, no long-term offload).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vmsingle-vmsingle
  namespace: monitoring
  labels:
    velero.io/exclude-from-backup: "true"
---
# VictoriaLogs — hot log cache. Retention window survives pod restarts;
# durable archive is not a goal per the same loss-acceptable stance as
# vmsingle.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: server-volume-victoria-logs-server-0
  namespace: monitoring
  labels:
    velero.io/exclude-from-backup: "true"
---
# Alertmanager — ephemeral silences and notification log. Nothing here is
# worth a restore; silences can be recreated in seconds.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-prometheus-db-alertmanager-prometheus-0
  namespace: monitoring
  labels:
    velero.io/exclude-from-backup: "true"
---
# CrowdSec LAPI DB — decisions and bouncers can be rebuilt from the
# central CrowdSec hub after a restart; local SQLite has no unique state.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: crowdsec-db-pvc
  namespace: security
  labels:
    velero.io/exclude-from-backup: "true"
---
# CrowdSec LAPI config — rendered from chart values; regenerated by the
# operator on restart.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: crowdsec-config-pvc
  namespace: security
  labels:
    velero.io/exclude-from-backup: "true"
---
# CrowdSec agent config — same as above, rendered from chart values.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: crowdsec-agent-config-pvc
  namespace: security
  labels:
    velero.io/exclude-from-backup: "true"
