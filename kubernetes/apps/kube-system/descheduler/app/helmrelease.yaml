---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
spec:
  interval: 30m
  chart:
    spec:
      # renovate: registryUrl=https://kubernetes-sigs.github.io/descheduler/
      chart: descheduler
      version: 0.35.1
      sourceRef:
        kind: HelmRepository
        name: descheduler
        namespace: flux-system
      interval: 5m
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    podAnnotations:
      reloader.stakater.com/auto: "true"
    # Deployment mode (replaces the prior CronJob). The chart's
    # ServiceMonitor template only renders under `kind: Deployment` —
    # under CronJob it silently no-ops, which is why we had no
    # descheduler metrics in vmagent before. The Kubernetes
    # cronjob-controller also has a known stuck-status.active failure
    # mode under concurrencyPolicy: Forbid that broke our previous
    # CronJob for 12 days; Deployment side-steps that entirely.
    kind: Deployment
    replicas: 1
    # Loop interval. 5m is the chart default and trades responsiveness
    # for eviction churn — fast enough to act on imbalance shortly after
    # it appears, slow enough that LowNodeUtilization isn't flapping on
    # transient pod-scheduling events.
    deschedulingInterval: 5m
    # Single replica → leader election unnecessary (and incompatible
    # with DryRun mode if we ever flip that for diagnostics).
    leaderElection:
      enabled: false
    # Tighter than chart defaults (500m / 256Mi) — descheduler's hot path
    # is a periodic informer-driven sweep that idles between cycles. 50m
    # CPU + 128Mi memory has been stable in homelab usage; raise if logs
    # show ContainerThrottled.
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    # Verbose logs (-v=4) make it easy to see why a strategy did or
    # didn't evict during the first week of Deployment-mode operation.
    # Drop to v=3 (chart default) once steady-state is verified.
    cmdOptions:
      v: 4
    deschedulerPolicy:
      profiles:
        - name: Default
          pluginConfig:
            - name: DefaultEvictor
              args:
                # Allow descheduler to consider Pods backed by PVCs.
                # Almost every workload here has at least one
                # openebs-hostpath / nfs-client PVC; without this the
                # only evictable pods are the few stateless ones
                # (cilium-operator, vmalert, tuppr) and descheduler
                # can't actually rebalance.
                ignorePvcPods: false
                # Permit eviction of Pods using emptyDir / hostPath.
                # PVC handling is a separate knob (above).
                evictLocalStoragePods: true
                # Keep system-cluster-critical workloads
                # (kube-apiserver, etcd, scheduler, descheduler itself)
                # off-limits — single control plane has no redundancy
                # for these.
                evictSystemCriticalPods: false
                # Don't kill `kubectl run` / `kubectl debug` pods out
                # from under in-progress investigations.
                evictFailedBarePods: false
                # Simulate scheduling before eviction. RWO openebs-
                # hostpath PVCs pin pods to their current node — without
                # nodeFit, descheduler would evict them and the
                # scheduler would fail to place the replacement.
                nodeFit: true
            - name: RemovePodsViolatingInterPodAntiAffinity
            - name: RemovePodsViolatingNodeAffinity
              args:
                nodeAffinityType:
                  - requiredDuringSchedulingIgnoredDuringExecution
            - name: RemovePodsViolatingNodeTaints
            - name: RemovePodsViolatingTopologySpreadConstraint
              args:
                # Both DoNotSchedule and ScheduleAnyway respected — the
                # multi-replica Deployment patches landing alongside this
                # commit add ScheduleAnyway TSC to cilium-operator,
                # coredns, openebs-localpv-provisioner (via
                # podAntiAffinity), vmalert, and tuppr (via
                # podAntiAffinity). Without those, this plugin had
                # nothing to act on (only cloudflared had a TSC before).
                constraints:
                  - DoNotSchedule
                  - ScheduleAnyway
            - name: RemovePodsHavingTooManyRestarts
              args:
                # Upstream default is 100. The previous value of 3
                # evicted pods that were CrashLooping due to app bugs /
                # OOMKills, which only delays the next crash on a
                # different node.
                podRestartThreshold: 100
                includingInitContainers: true
                states:
                  - CrashLoopBackOff
                  - Running
            - name: LowNodeUtilization
              args:
                # Tightened from 40/70 → 25/60 so the plugin actually
                # has work to do. Cluster nodes typically sit at 20–30%
                # CPU + memory; with 40% under-threshold every node was
                # classified "underutilized" and the plugin no-op'd
                # ("All nodes are underutilized, nothing to do here").
                # Adding `pods:` because the real imbalance on this
                # cluster is in pod count (30/35/48 spread observed
                # pre-rollout), not raw CPU/memory.
                thresholds:
                  cpu: 25
                  memory: 25
                  pods: 25
                targetThresholds:
                  cpu: 60
                  memory: 60
                  pods: 60
            - name: RemoveFailedPods
              args:
                reasons:
                  - OutOfcpu
                  - CreateContainerConfigError
                includingInitContainers: true
                excludeOwnerKinds:
                  - Job
                minPodLifetimeSeconds: 3600
            # Descheduler v0.30+ requires a pluginConfig entry for every
            # plugin referenced under profiles.plugins.*.enabled.
            - name: RemoveDuplicates
          plugins:
            balance:
              enabled:
                - RemovePodsViolatingTopologySpreadConstraint
                - LowNodeUtilization
                - RemoveDuplicates
            deschedule:
              enabled:
                - RemovePodsViolatingInterPodAntiAffinity
                - RemovePodsViolatingNodeAffinity
                - RemovePodsViolatingNodeTaints
                - RemovePodsHavingTooManyRestarts
                - RemoveFailedPods
    # Service required by the chart's ServiceMonitor template (which
    # only renders under kind: Deployment, not CronJob). Cluster-local;
    # not exposed externally.
    service:
      enabled: true
    serviceMonitor:
      enabled: true
      # vmagent runs with selectAllByDefault: true so it auto-converts
      # any ServiceMonitor in any namespace into a VMServiceScrape — no
      # additionalLabels selector match needed.
