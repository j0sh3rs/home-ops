---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tetragon
spec:
  interval: 30m
  chart:
    spec:
      # renovate: registryUrl=https://helm.cilium.io
      chart: tetragon
      version: 1.6.0
      sourceRef:
        kind: HelmRepository
        name: tetragon
      interval: 5m
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    hostNetwork: true
    enableK8sAPI: true
    enablePolicyFilter: true
    # Talos Linux eBPF support
    extraVolumes:
      - name: debugfs
        hostPath:
          path: /sys/kernel/debug
          type: DirectoryOrCreate
      - name: tracefs
        hostPath:
          path: /sys/kernel/tracing
          type: DirectoryOrCreate
    tetragonOperator:
      forceUpdateCRDs: true
      replicas: 1
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 128Mi
      tracingPolicy:
        enabled: true
      prometheus:
        serviceMonitor:
          enabled: true
    tetragon:
      enabled: true
      image:
        repository: quay.io/cilium/tetragon
        tag: v1.6.0
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      securityContext:
        privileged: true
      processCacheSize: 65536
      exportFilename: /dev/stdout
      exportRateLimit: 1000
      # Event filtering - exclude platform namespaces, focus on workloads
      exportAllowList: |-
        {"event_set":["PROCESS_EXEC", "PROCESS_EXIT", "PROCESS_KPROBE", "PROCESS_TRACEPOINT", "PROCESS_LSM"]}
      exportDenyList: |-
        {"health_check":true}
        {"namespace":["", "cilium", "kube-system", "flux-system"]}
      grpc:
        enabled: true
        address: "localhost:54321"
      cri:
        enabled: true
        socketHostPath: /run/containerd/containerd.sock
      prometheus:
        enabled: true
        port: 2112
        metricsLabelFilter: "namespace,workload,pod,binary"
        serviceMonitor:
          enabled: true
          scrapeInterval: 60s
      # Talos Linux eBPF volume mounts
      extraVolumeMounts:
        - name: debugfs
          mountPath: /sys/kernel/debug
          readOnly: true
        - name: tracefs
          mountPath: /sys/kernel/tracing
          readOnly: true
