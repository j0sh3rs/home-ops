---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tetragon
spec:
  interval: 30m
  chart:
    spec:
      # renovate: registryUrl=https://helm.cilium.io
      chart: tetragon
      version: 1.7.0
      sourceRef:
        kind: HelmRepository
        name: tetragon
      interval: 5m
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    hostNetwork: true
    enableK8sAPI: true
    enablePolicyFilter: true
    # Talos Linux eBPF support
    extraVolumes:
      - name: debugfs
        hostPath:
          path: /sys/kernel/debug
          type: DirectoryOrCreate
      - name: tracefs
        hostPath:
          path: /sys/kernel/tracing
          type: DirectoryOrCreate
    tetragonOperator:
      forceUpdateCRDs: true
      replicas: 1
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 128Mi
      tracingPolicy:
        enabled: true
      prometheus:
        serviceMonitor:
          enabled: true
    tetragon:
      enabled: true
      # image override removed — chart 1.7.0 ships appVersion 1.7.0 so the
      # default image (quay.io/cilium/tetragon:v1.7.0) already matches. Chart
      # bumps track image bumps automatically.
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      securityContext:
        privileged: true
      processCacheSize: 65536
      exportFilename: /dev/stdout
      exportRateLimit: 1000
      # Event filtering - exclude platform namespaces, focus on workloads.
      # databases intentionally NOT in denyList (want dolt/postgres exec visibility).
      exportAllowList: |-
        {"event_set":["PROCESS_EXEC", "PROCESS_EXIT", "PROCESS_KPROBE", "PROCESS_TRACEPOINT", "PROCESS_LSM"]}
      exportDenyList: |-
        {"health_check":true}
        {"namespace":["", "cilium", "kube-system", "flux-system", "monitoring", "network", "velero", "system-upgrade"]}
      # Process enrichment — ancestor chain + capability + namespace transitions.
      # Required for useful parent-chain on shell-spawn detection (home-ops-gmt)
      # and capability/namespace visibility beyond setuid/setgid.
      processAncestors:
        enabled: "base,kprobe,lsm"
      enableProcessCred: true
      enableProcessNs: true
      grpc:
        enabled: true
        # address override removed — chart 1.7.0 default is
        # unix:///var/run/tetragon/tetragon.sock (breaking change from 1.6
        # localhost:54321). Chart mounts /var/run/tetragon as a host-path
        # volume on every node via the tetragon-run volume (see chart
        # daemonset.yaml), so the socket is reachable from the node and from
        # tetra CLI via kubectl exec.
      cri:
        enabled: true
        socketHostPath: /run/containerd/containerd.sock
      # cgidmap uses cgroup IDs for pod association (v1.7+). Required on Talos
      # cgroupv2 — without it the agent logs 'failed to find cgroup id.
      # Skipping container' warnings and drops container enrichment on events.
      # Depends on cri.enabled=true (above).
      cgidmap:
        enabled: true
      prometheus:
        enabled: true
        port: 2112
        # binary dropped from label filter — unbounded cardinality (every executable
        # on every node). Per-binary detail moves to event logs when victoria-logs
        # returns (home-ops-d1e). Workload attribution retained via namespace/workload.
        metricsLabelFilter: "namespace,workload,pod"
        serviceMonitor:
          enabled: true
          scrapeInterval: 60s
      # Talos Linux eBPF volume mounts
      extraVolumeMounts:
        - name: debugfs
          mountPath: /sys/kernel/debug
          readOnly: true
        - name: tracefs
          mountPath: /sys/kernel/tracing
          readOnly: true
