---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./grafanadashboard.yaml
configMapGenerator:
  - name: amd-gpu-overview-dashboard
    files:
      - amd-gpu-overview-dashboard.json
  - name: amd-gpu-detail-dashboard
    files:
      - amd-gpu-detail-dashboard.json
  - name: amd-gpu-node-dashboard
    files:
      - amd-gpu-node-dashboard.json
generatorOptions:
  disableNameSuffixHash: true
