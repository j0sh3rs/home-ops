---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: amd-gpu
  namespace: kube-system
spec:
  chart:
    spec:
      chart: amd-gpu
      version: 0.21.0
      sourceRef:
        kind: HelmRepository
        name: amd-gpu
        namespace: flux-system
  interval: 10m0s
  values:
    nfd:
      enabled: true
    labeller:
      enabled: true
    # Pin device-plugin + labeller image tags so Renovate's helm-values
    # manager can bump them independently of the chart appVersion. Chart
    # appVersion historically lags upstream image releases; pinning here
    # means we get 1.31.0.x patches the moment they ship to docker.io.
    # Labeller versioning is normalized to plain semver via the
    # `amd-gpu-labeller` packageRule in .renovate/groups.json5.
    dp:
      image:
        repository: docker.io/rocm/k8s-device-plugin
        # renovate: datasource=docker depName=docker.io/rocm/k8s-device-plugin versioning=regex:^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)\.(?<build>\d+)$
        tag: 1.31.0.10
    lbl:
      image:
        repository: docker.io/rocm/k8s-device-plugin
        # renovate: datasource=docker depName=docker.io/rocm/k8s-device-plugin versioning=regex:^labeller-(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)\.(?<build>\d+)$
        tag: labeller-1.31.0.10
