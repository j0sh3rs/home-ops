---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
spec:
  chartRef:
    kind: OCIRepository
    name: openebs
  interval: 1h
  values:
    preUpgradeHook:
      enabled: false
    localpv-provisioner:
      analytics:
        enabled: false
      localpv:
        replicas: 3
        image:
          registry: quay.io/
        basePath: &hostPath /var/mnt/local-hostpath
        # The localpv-provisioner sub-chart does not expose
        # topologySpreadConstraints (only `nodeSelector`, `tolerations`,
        # `affinity` per its values.yaml). Use podAntiAffinity instead so
        # the 3 replicas land on 3 different nodes — preferred (not
        # required) so a single-node failure doesn't block scheduling.
        # Live state pre-rollout: 2 replicas were on bee-jms-03 because
        # the chart had no spread directive at all.
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      openebs.io/component-name: openebs-localpv-provisioner
                  topologyKey: kubernetes.io/hostname
      hostpathClass:
        enabled: true
        name: openebs-hostpath
        isDefaultClass: true
        basePath: *hostPath
      helperPod:
        image:
          registry: quay.io/
    openebs-crds:
      csi:
        volumeSnapshots:
          enabled: false
          keep: false
    zfs-localpv:
      enabled: false
    lvm-localpv:
      enabled: false
    mayastor:
      enabled: false
    engines:
      local:
        lvm:
          enabled: false
        zfs:
          enabled: false
      replicated:
        mayastor:
          enabled: false
    loki:
      enabled: false
    alloy:
      enabled: false
    minio:
      enabled: false
