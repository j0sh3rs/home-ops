---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app clickhouse
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: clickhouse
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Single-shard, single-replica — homelab scale, no ZooKeeper needed.
    # ClickHouse Keeper (built-in Raft) handles coordination for 1 node.
    shards: 1
    replicaCount: 1

    auth:
      username: default
      existingSecret: clickhouse-secret
      existingSecretKey: CLICKHOUSE_ADMIN_PASSWORD

    persistence:
      enabled: true
      storageClass: openebs-hostpath
      size: 20Gi

    zookeeper:
      enabled: false

    keeper:
      enabled: true

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: databases
        labels:
          prometheus: k8s
          release: kube-prometheus-stack
      prometheusRule:
        enabled: false   # We manage rules in our own PrometheusRule below

    # Expose native (9000) and HTTP (8123) ports — LangFuse uses both
    service:
      type: ClusterIP
      ports:
        http: 8123
        native: 9000
        metrics: 8001
