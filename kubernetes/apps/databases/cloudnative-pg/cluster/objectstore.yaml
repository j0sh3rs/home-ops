---
# Barman Cloud Plugin ObjectStore CR — replacement for the in-tree
# spec.backup.barmanObjectStore block on the Cluster CR.
#
# Field-placement note (cnpg-i v0.6.0 webhook):
#   - The S3 location, credentials, and retention live HERE.
#   - `serverName` lives on the Cluster's spec.plugins[].parameters,
#     NOT on ObjectStore.spec.configuration. The webhook explicitly
#     rejects serverName at the ObjectStore level:
#       "spec.configuration.serverName: Forbidden: use the 'serverName'
#        plugin parameter in the Cluster resource"
#   - `barmanObjectName` (the ObjectStore CR's metadata.name) is referenced
#     from the Cluster's plugin parameters; the same ObjectStore can serve
#     multiple clusters by varying serverName per consumer.
#
# Backup continuity: the cluster references serverName=postgres17-v4 in
# its plugin parameters, so the plugin reads/writes the SAME S3 path at
# s3://cloudnative-pg/postgres17-v4/ that the in-tree config used.
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: postgres17-v4
  namespace: databases
spec:
  configuration:
    destinationPath: s3://cloudnative-pg/
    endpointURL: https://s3.68cc.io
    s3Credentials:
      accessKeyId:
        name: cloudnative-pg-secret
        key: S3_ACCESS_KEY_ID
      secretAccessKey:
        name: cloudnative-pg-secret
        key: S3_SECRET_ACCESS_KEY
    data:
      compression: bzip2
    wal:
      compression: bzip2
      maxParallel: 8
  # Retention policy lives on the ObjectStore (was on Cluster.spec.backup
  # in the in-tree model).
  retentionPolicy: 30d
---
# Recovery-source ObjectStore. cluster17.yaml's spec.bootstrap.recovery
# references the original postgres17-v3 cluster (pre-current-incarnation).
# That historical S3 path needs its own ObjectStore so the plugin can
# read it. Not used for ongoing backups — pure recovery-time config.
# serverName=postgres17-v3 lives in the externalClusters[].plugin.parameters
# of cluster17.yaml.
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: postgres17-v3
  namespace: databases
spec:
  configuration:
    destinationPath: s3://cloudnative-pg/
    endpointURL: https://s3.68cc.io
    s3Credentials:
      accessKeyId:
        name: cloudnative-pg-secret
        key: S3_ACCESS_KEY_ID
      secretAccessKey:
        name: cloudnative-pg-secret
        key: S3_SECRET_ACCESS_KEY
---
# Post-PG18 backup target. Fresh serverName so PG18 backups land at
# s3://cloudnative-pg/postgres18-v1/ — a clean directory separate from
# the PG17 archives at s3://cloudnative-pg/postgres17-v4/. Rationale:
# PITR is invalid across major-version boundaries (PG18 binaries can't
# replay PG17 WAL), so mixing timelines in the same path is at best
# confusing and at worst a footgun during recovery. Aligns with cnpg's
# upstream upgrade docs example (postgres-cluster-pg16 -> -pg17).
#
# Migration sequencing:
#   - This ObjectStore lands BEFORE the major bump (PR 5 of the upgrade
#     plan) so the cluster CR can reference it atomically.
#   - First plugin backup post-PG18 lands at the new path.
#   - postgres17-v4 ObjectStore stays around as a forensic reference
#     (its S3 archive ages out under the existing 30d retention).
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: postgres18-v1
  namespace: databases
spec:
  configuration:
    destinationPath: s3://cloudnative-pg/
    endpointURL: https://s3.68cc.io
    s3Credentials:
      accessKeyId:
        name: cloudnative-pg-secret
        key: S3_ACCESS_KEY_ID
      secretAccessKey:
        name: cloudnative-pg-secret
        key: S3_SECRET_ACCESS_KEY
    data:
      compression: bzip2
    wal:
      compression: bzip2
      maxParallel: 8
  retentionPolicy: 30d
