---
# LAN A record for pg.68cc.io so on-net clients reach the PostgreSQL
# TCPRoute on traefik-internal (VIP 192.168.35.17). LAN-only by design:
# the record points at the internal VIP and cloudflare-dns never publishes
# it (the route is no longer on traefik-external-gateway), so postgres is
# unreachable over the WAN / Cloudflare tunnel.
# unifi-dns watches the crd source (DNSEndpoint) in addition to
# gateway-httproute, so this survives the gateway-name=traefik-internal-gateway
# filter that was added to stop unifi-dns from creating A records for
# traefik-external HTTPRoutes (which must only be reachable via Cloudflare tunnel).
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: postgres-internal
  namespace: databases
spec:
  endpoints:
    - dnsName: pg.68cc.io
      recordTTL: 300
      recordType: A
      targets:
        - 192.168.35.17
