---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/traefik.io/ingressroute_v1alpha1.json
# Using IngressRoute (not HTTPRoute) because Traefik's Gateway API provider
# does not support appProtocol: h2c on backends. IngressRoute's scheme: h2c
# is the correct Traefik-native way to proxy gRPC (HTTP/2) backends.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dolt-remotesapi
  namespace: databases
  annotations:
    external-dns.alpha.kubernetes.io/target: 192.168.35.15
    external-dns.alpha.kubernetes.io/hostname: dolt-api.68cc.io
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dolt-api.68cc.io`)
      kind: Rule
      services:
        - name: dolt
          port: 8000
          scheme: h2c
