---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dolt
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    controllers:
      dolt:
        containers:
          app:
            image:
              repository: dolthub/dolt-sql-server
              # renovate: datasource=docker depName=dolthub/dolt-sql-server
              tag: "1.85.0"
            env:
              - name: DOLT_ROOT_HOST
                value: "%"
            envFrom:
              - secretRef:
                  name: dolt-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 3306
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: *app
        type: ClusterIP
        ports:
          mysql:
            port: *port
            protocol: TCP
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: openebs-hostpath
        globalMounts:
          - path: /var/lib/dolt
      config:
        type: configMap
        name: dolt-config
        globalMounts:
          - path: /etc/dolt/servercfg.d
            readOnly: true
