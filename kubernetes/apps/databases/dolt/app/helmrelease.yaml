---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dolt
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      annotations:
        reloader.stakater.com/auto: "true"
    defaultPodOptions:
      annotations:
        # Velero backup hooks: write per-database dolt SQL dumps to
        # /var/lib/dolt/backup/<db>.sql before kopia fs-backup captures
        # the PVC, then clean up after the backup completes.
        # Restore path: kopia restores the raw dolt chunk store *and*
        # the portable SQL dumps, so recovery can use either one.
        # Each db subdir under /var/lib/dolt is its own dolt repository;
        # `dolt dump -fn` only works from inside a repo, hence the loop.
        pre.hook.backup.velero.io/command: |
          ["sh","-c","rm -rf /var/lib/dolt/backup && mkdir -p /var/lib/dolt/backup && for db in $(ls -d /var/lib/dolt/*/ | xargs -n1 basename | grep -v '^backup$'); do cd /var/lib/dolt/$db && dolt dump -f -fn /var/lib/dolt/backup/$db.sql; done"]
        pre.hook.backup.velero.io/timeout: 5m
        pre.hook.backup.velero.io/container: app
        post.hook.backup.velero.io/command: |
          ["sh","-c","rm -rf /var/lib/dolt/backup"]
        post.hook.backup.velero.io/timeout: 1m
        post.hook.backup.velero.io/container: app
    controllers:
      dolt:
        containers:
          app:
            image:
              repository: dolthub/dolt-sql-server
              # renovate: datasource=docker depName=dolthub/dolt-sql-server
              tag: "1.88.0"
            env:
              - name: DOLT_ROOT_HOST
                value: "%"
            envFrom:
              - secretRef:
                  name: dolt-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 3306
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: *app
        type: ClusterIP
        ports:
          mysql:
            port: *port
            protocol: TCP
          remotesapi:
            port: 8000
            protocol: TCP
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: openebs-hostpath
        globalMounts:
          - path: /var/lib/dolt
      config:
        type: configMap
        name: dolt-config
        globalMounts:
          - path: /etc/dolt/servercfg.d
            readOnly: true
