---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dolt-config
data:
  server.yaml: |
    log_level: "info"
    listener:
      host: "0.0.0.0"
      port: 3306
      max_connections: 100
      read_timeout_millis: 28800000
      write_timeout_millis: 28800000
    behavior:
      autocommit: true
      dolt_transaction_commit: false
    metrics:
      labels:
        host: dolt.68cc.io
