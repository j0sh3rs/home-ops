---
# IMPORTANT: This file must be encrypted with SOPS before committing.
# Run: task sops:encrypt-file file=kubernetes/apps/databases/dolt/app/secret.sops.yaml
#
# Required keys:
#   DOLT_ROOT_PASSWORD - MySQL root password for the dolt server
#
# After deploying, create the beads database and user by connecting as root:
#   mysql -h dolt.68cc.io -P 3306 -u root -p --ssl-mode=REQUIRED
#   CREATE DATABASE beads;
#   CREATE USER 'beads'@'%' IDENTIFIED BY '<beads-password>';
#   GRANT ALL PRIVILEGES ON beads.* TO 'beads'@'%';
#   FLUSH PRIVILEGES;
apiVersion: v1
kind: Secret
metadata:
  name: dolt-secret
stringData:
  DOLT_ROOT_PASSWORD: "CHANGE_ME_BEFORE_ENCRYPTING"
