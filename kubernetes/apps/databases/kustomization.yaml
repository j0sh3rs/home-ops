---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: databases
components:
  - ../../components/common
  - ../../components/repos/app-template
resources:
  - ./cloudnative-pg/ks.yaml
  - ./cnpg-barman-plugin/ks.yaml
  # - ./clickhouse/ks.yaml
  - ./dragonflydb/ks.yaml
patches:
  - target:
      kind: Namespace
      # Rewritten to "databases" by the `namespace:` field above.
      name: not-used
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: not-used
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
