---
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  labels:
    app.kubernetes.io/name: dragonfly
    app.kubernetes.io/instance: dragonfly
    app.kubernetes.io/part-of: dragonfly-operator
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: dragonfly-operator
  name: dragonflydb
  namespace: databases
spec:
  image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.39.0
  replicas: 1
  # Resource bump 2026-05-21 (phase 2 audit). AI workloads (LiteLLM cache +
  # future AnythingLLM RAG cache) plus traefikoidc sessions are projected
  # to push cache use past the 2 Gi limit. 4 Gi gives headroom and
  # 2 Gi memory request avoids opportunistic eviction by the scheduler.
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 1
      memory: 4Gi
  args:
    - --logtostderr
    - --memcached_port=11211
    - --default_lua_flags=allow-undeclared-keys
    # Cache mode = LRU eviction when reaching maxmemory. Without this
    # dragonfly errors writes once full (noeviction-equivalent), which
    # would cascade to LiteLLM/traefikoidc errors instead of degraded
    # cache hit ratio. Acceptable trade-off because every consumer here
    # is a *cache* user — losing old entries is fine.
    - --cache_mode=true
    # Admin port (9999) exposes Prometheus metrics on /metrics with no auth.
    # The operator already sets these by default but listing here makes the
    # config self-documenting:
    #   --admin_port=9999  (passed by operator)
    #   --admin_nopass     (passed by operator — admin port skips auth)
    #   --primary_port_http_enabled=false  (operator default — keeps :6379 pure RESP)
    # Scraping is wired via the dragonflydb-metrics Service + ServiceMonitor below.
  authentication:
    passwordFromSecret:
      name: dragonflydb-auth
      key: password
  # Periodic snapshot every 30 min into a 5 Gi PVC. On pod restart the
  # operator auto-loads the snapshot — caches start warm instead of cold.
  # Loss window = 30 min, acceptable for cache (traefikoidc sessions
  # re-auth, LiteLLM repopulates on first request).
  # `enableOnMasterOnly: true` means replicas (if added later) don't
  # write competing snapshots into the same PVC.
  snapshot:
    cron: "*/30 * * * *"
    dir: /dragonfly/snapshots
    enableOnMasterOnly: true
    persistentVolumeClaimSpec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: openebs-hostpath
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: dragonflydb
    app.kubernetes.io/component: Dragonfly
    app.kubernetes.io/instance: dragonflydb
    app.kubernetes.io/part-of: dragonfly-operator
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: dragonfly-memcached
  name: dragonflydb-memcached
  namespace: databases
spec:
  ports:
  - name: memcached
    port: 11211
    protocol: TCP
    targetPort: 11211
  selector:
    app: dragonflydb
    app.kubernetes.io/name: dragonfly
    role: master
  sessionAffinity: None
  type: ClusterIP
---
# Sidecar Service exposing the admin port (9999) for Prometheus scraping.
# The operator-managed `dragonflydb` Service exposes only :6379 (RESP) and we
# can't extend it without forking the CR. Selector mirrors the master pod so
# only the active master is scraped (avoids double-counting on replicas).
apiVersion: v1
kind: Service
metadata:
  # Flux's parent Kustomization (kubernetes/apps/databases/dragonflydb/ks.yaml)
  # injects `commonMetadata.labels.app.kubernetes.io/name: dragonflydb-instance`,
  # which overwrites any `app.kubernetes.io/name` we set on this Service.
  # We use a distinct label `home-ops/role: dragonfly-metrics` for the
  # ServiceMonitor selector so it can't be clobbered by Flux's labelling.
  labels:
    app: dragonflydb
    app.kubernetes.io/component: Dragonfly
    app.kubernetes.io/instance: dragonflydb
    app.kubernetes.io/part-of: dragonfly-operator
    app.kubernetes.io/managed-by: kustomize
    home-ops/role: dragonfly-metrics
  name: dragonflydb-metrics
  namespace: databases
spec:
  ports:
  - name: metrics
    port: 9999
    protocol: TCP
    targetPort: 9999
  selector:
    app: dragonflydb
    app.kubernetes.io/name: dragonfly
    role: master
  sessionAffinity: None
  type: ClusterIP
---
# vmagent (selectAllByDefault: true) ingests this. dragonfly admin port has
# NO auth — `--admin_nopass` is set by the operator. Path is /metrics on
# the same port. The operator runs Prometheus exposition format natively;
# no exporter sidecar required.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dragonflydb
  namespace: databases
  labels:
    home-ops/role: dragonfly-metrics
    app.kubernetes.io/instance: dragonflydb
spec:
  selector:
    matchLabels:
      home-ops/role: dragonfly-metrics
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
# The dragonfly operator auto-creates a NetworkPolicy that locks down
# the admin port (9999) to operator + peer pods only. That blocks
# vmagent from scraping /metrics. We keep the operator's policy intact
# (lockdown on 9999 from arbitrary tenants is a feature) and add this
# sibling policy to additively allow monitoring/vmagent → 9999.
# Multiple ingress NetworkPolicies are additive, so this unions cleanly
# with the operator-managed one.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dragonflydb-allow-monitoring-scrape
  namespace: databases
  labels:
    app.kubernetes.io/name: dragonfly-metrics
    app.kubernetes.io/instance: dragonflydb
spec:
  podSelector:
    matchLabels:
      app: dragonflydb
      app.kubernetes.io/name: dragonfly
      app.kubernetes.io/part-of: dragonfly
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vmagent
      ports:
        - port: 9999
          protocol: TCP
---
# The operator's auto-created NetworkPolicy only allows port 6379 (RESP)
# from pods in the `databases` namespace (`podSelector: {}`, no
# namespaceSelector). But our Redis clients live in OTHER namespaces:
# `ai` (litellm db4, langfuse db6, open-webui) and `services`
# (paperless db2). When the operator deletes+recreates the Dragonfly
# instance (e.g. on a VolumeClaimTemplates change) it re-applies that
# lockdown, severing every cross-namespace client — litellm then blocks
# ~270s on Redis connect during startup and crashloops past its probe
# budget. NetworkPolicies are additive, so this sibling policy unions
# with the operator's to allow cross-namespace clients on 6379.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dragonflydb-allow-cross-ns-clients
  namespace: databases
  labels:
    app.kubernetes.io/name: dragonfly
    app.kubernetes.io/instance: dragonflydb
spec:
  podSelector:
    matchLabels:
      app: dragonflydb
      app.kubernetes.io/name: dragonfly
      app.kubernetes.io/part-of: dragonfly
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: services
      ports:
        - port: 6379
          protocol: TCP
