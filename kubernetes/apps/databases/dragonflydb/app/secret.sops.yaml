# DragonflyDB authentication password.
# Consumed by the Dragonfly CR (spec.authentication.passwordFromSecret)
# and mirrored into consumer namespaces (services, monitoring, kube-system,
# security) so apps like oauth2-proxy (session store) and paperless (redis
# cache) can mount it directly via `existingSecret: dragonflydb-auth`.
apiVersion: v1
kind: Secret
metadata:
  name: dragonflydb-auth
  namespace: databases
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: services,monitoring,kube-system,security
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: services,monitoring,kube-system,security
