---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Gateway API experimental-channel CRDs, pulled directly from the upstream
# kubernetes-sigs/gateway-api release artifact. Same 12 CRDs the
# traefik-helm-chart bundle ships — Traefik just rebundles upstream — so
# tracking the canonical source removes a layer of indirection.
#
# Previously this resource lived inline in traefik-external/app/kustomization.yaml
# pointing at refs/heads/master — an unpinned drift bomb that silently shipped
# whatever Gateway API bundle was on master.
#
# On chart v40.0.0 the bundle gained a ValidatingAdmissionPolicy
# (safe-upgrades) that refused to let the existing standard-channel CRDs
# transition to experimental, self-blocking every reconcile. The upstream
# project does not ship that VAP, so the patches below become a no-op
# safety net rather than a load-bearing fix.
#
# Then on chart v40.1.0 traefik-helm-chart split traefik-crds into a
# separately-released sub-chart tagged `crds_vX.Y.Z`, breaking the previous
# URL pattern (`v40.X.Y/traefik-crds/...`) entirely. Tracking the upstream
# Gateway API release sidesteps that churn — Renovate auto-bumps a single
# stable tag scheme.
#
# This Kustomization owns the CRDs and lives on prune: false so the CRDs
# survive any upstream refactor.
resources:
  # renovate: datasource=github-releases depName=kubernetes-sigs/gateway-api
  - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.6.1/experimental-install.yaml

patches:
  # Drop VAP + Binding — see header comment.
  - patch: |
      $patch: delete
      apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingAdmissionPolicy
      metadata:
        name: safe-upgrades.gateway.networking.k8s.io
  - patch: |
      $patch: delete
      apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingAdmissionPolicyBinding
      metadata:
        name: safe-upgrades.gateway.networking.k8s.io
