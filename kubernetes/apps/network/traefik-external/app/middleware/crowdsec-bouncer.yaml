---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crowdsec-bouncer
  namespace: network
spec:
  plugin:
    crowdsec-bouncer-traefik-plugin:
      enabled: true
      crowdsecLapiHost: crowdsec-service.security.svc.cluster.local:8080
      # home-ops-b5w: HTTPS to LAPI. CA cert comes from the mirrored
      # crowdsec-bouncer-tls secret mounted at /etc/traefik/crowdsec-tls
      # (see traefik HR volumes). Bouncer still authenticates with its
      # API key — chart does not enforce bouncer mTLS by default.
      crowdsecLapiScheme: https
      crowdsecLapiTlsCertificateAuthorityFile: /etc/traefik/crowdsec-tls/ca.crt
      crowdsecLapiKeyFile: /etc/traefik/secrets/CROWDSEC_BOUNCER_KEY
      crowdsecMode: stream
      MetricsUpdateIntervalSeconds: 60
      remediationStatusCode: 403
      updateIntervalSecond: 60
      crowdsecAppsecEnabled: true
      crowdsecAppsecHost: crowdsec-appsec-service.security.svc.cluster.local:7422
      # home-ops-bu8: fail-closed on AppSec rule-decision errors so a decode
      # failure or evaluator crash returns 403 instead of allowing the
      # request through. UnreachableBlock stays false so a full AppSec pod
      # outage does not wedge the edge — only rule-level failures propagate.
      crowdsecAppsecFailureBlock: true
      crowdsecAppsecUnreachableBlock: false
      logLevel: INFO
      forwardedHeadersTrustedIPs:
        - 10.42.0.0/16
        - 192.168.35.0/24
      clientTrustedIPs:
        - 10.42.0.0/16
        - 192.168.35.0/24
