---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crowdsec-bouncer
  namespace: network
spec:
  plugin:
    crowdsec-bouncer-traefik-plugin:
      enabled: true
      crowdsecLapiHost: crowdsec-service.security.svc.cluster.local:8080
      # Plain HTTP — in-cluster traffic is already masqueraded by Cilium
      # eBPF, and enabling chart TLS hits a secretTemplate=null bug in
      # chart 0.23.0 (tracked via home-ops-b5w reopen). Bouncer
      # authenticates to LAPI via its API key.
      crowdsecLapiScheme: http
      crowdsecLapiKeyFile: /etc/traefik/secrets/CROWDSEC_BOUNCER_KEY
      crowdsecMode: stream
      MetricsUpdateIntervalSeconds: 60
      remediationStatusCode: 403
      updateIntervalSecond: 60
      crowdsecAppsecEnabled: true
      crowdsecAppsecHost: crowdsec-appsec-service.security.svc.cluster.local:7422
      # home-ops-bu8: fail-closed on AppSec rule-decision errors so a decode
      # failure or evaluator crash returns 403 instead of allowing the
      # request through. UnreachableBlock stays false so a full AppSec pod
      # outage does not wedge the edge — only rule-level failures propagate.
      crowdsecAppsecFailureBlock: true
      crowdsecAppsecUnreachableBlock: false
      logLevel: INFO
      # Public path is Cloudflare tunnel; the real client IP is in
      # CF-Connecting-IP, not X-Forwarded-For (cloudflared speaks plain HTTP,
      # pod CIDR untrusted). Tell the bouncer to read client IP from that
      # header so CrowdSec decisions target the actual abuser.
      forwardedHeadersCustomName: CF-Connecting-IP
      forwardedHeadersTrustedIPs:
        - 10.42.0.0/16
        - 192.168.35.0/24
      clientTrustedIPs:
        - 10.42.0.0/16
        - 192.168.35.0/24
