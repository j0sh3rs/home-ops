---
# Traefik native per-instance rate limit. Replaces the defunct
# nzin/traefik-cluster-ratelimit plugin (v1.2.0 panicked on every
# request due to a Yaegi type-assertion bug — rate.go:116). No
# maintained Redis-backed cluster rate-limit Traefik plugin exists,
# so we accept per-instance enforcement: effective cluster-wide rate
# is average * <DaemonSet replica count>. CrowdSec still blocks
# abusive IPs upstream.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: network
spec:
  rateLimit:
    average: 100
    burst: 200
    period: 1s
    sourceCriterion:
      # Key rate limiting on the real end-user IP. Public traffic arrives via
      # Cloudflare tunnel -> cloudflared (plain HTTP, no PROXY/XFF trust), so
      # XFF is unreliable here; Cloudflare's edge sets CF-Connecting-IP on
      # every tunneled request. Requests lacking this header (e.g. direct LAN
      # hits) fall back to a shared bucket — acceptable since CrowdSec + LAN
      # trust cover that path.
      requestHeaderName: CF-Connecting-IP
