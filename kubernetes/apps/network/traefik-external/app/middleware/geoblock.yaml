---
# Country-allowlist middleware (home-ops-99c). Complements CrowdSec scenario-
# based blocking with a fast cached per-IP allowlist. Attach per-HTTPRoute
# via filters.extensionRef — NOT in the global entrypoint chain, since
# legitimate mobile / VPN users might geo-resolve outside the allowlist.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: geoblock-us-ca
  namespace: network
spec:
  plugin:
    geoblock:
      silentStartUp: false
      allowLocalRequests: true
      logLocalRequests: false
      logAllowedRequests: false
      logApiRequests: false
      api: "https://get.geojs.io/v1/ip/country/{ip}"
      apiTimeoutMs: 750
      cacheSize: 50
      forceMonthlyUpdate: true
      allowUnknownCountries: false
      unknownCountryApiResponse: "nil"
      countries:
        - US
        - CA
      addCountryHeader: true
