# Auth0 OIDC Configuration Secrets
# This file contains sensitive credentials for Auth0 authentication
# Encrypted with SOPS using age key
apiVersion: v1
kind: Secret
metadata:
  name: traefik-secrets
  namespace: network
  annotations:
    # Mirror secret into opted-in namespaces so in-namespace Middlewares
    # can read Auth0 creds via urn:k8s:secret:traefik-secrets:<key> syntax
    # (traefikoidc plugin reads secrets from its own namespace only).
    # Gateway API forbids cross-namespace extensionRef, so Middleware must
    # co-locate with HTTPRoute — see traefik/traefik#11126, gateway-api#3903.
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: services,monitoring,kube-system
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: services,monitoring,kube-system
type: Opaque
