# Traefik secrets (network namespace only).
#
# Consumed by both `traefik-external` and `traefik-internal` HelmReleases
# via `envFrom: secretRef` + a volume mount at /etc/traefik/secrets/. The
# crowdsec-bouncer-traefik-plugin reads CROWDSEC_BOUNCER_KEY from the file
# mount; that is currently the only consumer.
#
# Historical orphan keys removed (follow-up to the Auth0 cleanup):
#   - AUTH0_CLIENT_ID / AUTH0_CLIENT_SECRET / AUTH0_DOMAIN /
#     SESSION_ENCRYPTION_KEY / PROVIDER_URL  (traefikoidc plugin — gone)
#   - DRAGONFLYDB_PASSWORD                    (traefikoidc session store — gone)
#   - CROWDSEC_LAPI_KEY / CROWDSEC_LAPI_KEY_B64  (no consumer; bouncer uses
#     the bouncer key, not the LAPI key, against the in-cluster LAPI)
#   - crowdsec-ca.crt / crowdsec-tls.crt / crowdsec-tls.key  (bouncer plugin
#     talks plain HTTP to LAPI — `crowdsecLapiScheme: http` — so the mTLS
#     material was never wired up)
#
# Reflector annotations removed: nothing outside the `network` namespace
# consumed the mirrored secret. Re-add only if a new Middleware in another
# namespace needs the bouncer key (unlikely — per-namespace Middlewares
# reference it via the file mount on pods that already live here).
apiVersion: v1
kind: Secret
metadata:
  name: traefik-secrets
  namespace: network
type: Opaque
stringData:
  CROWDSEC_BOUNCER_KEY: ENC[AES256_GCM,data:CPapdtl4JwCgJeXo52caWzkwWV0W13Z+4k2S7D5WJAPz7sC3E20tKKI0buKIN9ouMuaCLrewAB4Ud1V7qlQUPA==,iv:EtrXFuqT2+T8FuQBnyDj3cTFsIUTPz+4cFBBBVqoY0o=,tag:bU/lA78lqnNqz1NwaQ3Zpg==,type:str]
