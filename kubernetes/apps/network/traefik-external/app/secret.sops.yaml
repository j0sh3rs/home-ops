# Traefik secrets (network namespace). Consumed by traefik-external +
# traefik-internal HelmReleases via envFrom + volume mount at
# /etc/traefik/secrets/. CROWDSEC_BOUNCER_KEY is read off the file mount
# by the crowdsec-bouncer-traefik-plugin.
#
# Keys:
#   - CROWDSEC_BOUNCER_KEY    — crowdsec-bouncer-traefik-plugin (file mount)
#
# Removed (2026-05-21): GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
# SESSION_ENCRYPTION_KEY, DRAGONFLYDB_PASSWORD — these were consumed by
# the traefikoidc plugin (components/traefik-oidc), which is replaced by
# Authentik forwardAuth (components/authentik-forwardauth). Authentik
# reads its own `authentik-secrets` Secret in the `security` namespace.
# Reflector mirroring to kube-system/monitoring/services/ai removed
# accordingly.
