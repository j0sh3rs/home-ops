# Traefik secrets: CrowdSec bouncer API key + mTLS material used by the
# crowdsec-bouncer-traefik-plugin. Auth0/OIDC credentials removed with the
# oauth2-proxy migration — sessions now terminate at auth.68cc.io.
apiVersion: v1
kind: Secret
metadata:
  name: traefik-secrets
  namespace: network
  annotations:
    # Kept reflected into downstream namespaces in case future Middlewares
    # in those namespaces need CrowdSec plugin config. oauth2-proxy +
    # forwardAuth do not read this secret, so this is currently unused
    # outside the network namespace — safe to tighten if/when verified.
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: services,monitoring,kube-system
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
