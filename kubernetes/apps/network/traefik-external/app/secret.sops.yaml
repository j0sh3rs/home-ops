# Traefik secrets (network namespace; mirrored to kube-system / monitoring /
# services by Reflector for the traefikoidc plugin middleware).
#
# Consumed by:
#   - traefik-external + traefik-internal HelmReleases (via envFrom +
#     volume mount at /etc/traefik/secrets/). CROWDSEC_BOUNCER_KEY is read
#     off the file mount by the crowdsec-bouncer-traefik-plugin.
#   - traefikoidc plugin Middleware (components/traefik-oidc) in every
#     opted-in namespace via urn:k8s:secret:traefik-secrets:<key>. The
#     plugin reads the Secret through the in-cluster Kubernetes API, so
#     Reflector must mirror this Secret into each consumer namespace.
#
# Keys:
#   - CROWDSEC_BOUNCER_KEY    — crowdsec-bouncer-traefik-plugin (file mount)
#   - GOOGLE_CLIENT_ID        — traefikoidc plugin (Google OAuth client)
#   - GOOGLE_CLIENT_SECRET    — traefikoidc plugin
#   - SESSION_ENCRYPTION_KEY  — traefikoidc plugin (32-byte random key,
#                                base64-encoded, encrypts session cookies)
#   - DRAGONFLYDB_PASSWORD    — traefikoidc plugin session store (DB 5,
#                                reused from the retired oauth2-proxy)
apiVersion: v1
kind: Secret
metadata:
  name: traefik-secrets
  namespace: network
  annotations:
    # Reflector mirrors this Secret into every namespace that imports the
    # components/traefik-oidc Component so the plugin can resolve
    # urn:k8s:secret:traefik-secrets:<key> in-namespace.
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: kube-system,monitoring,services,ai
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: kube-system,monitoring,services,ai
type: Opaque
