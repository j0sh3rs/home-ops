---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-external
  namespace: network
spec:
  chartRef:
    kind: OCIRepository
    name: traefik-external
    namespace: network
  interval: 1h
  timeout: 2m
  values:
    volumes:
      - name: botwrangler-robots-template
        mountPath: /etc/traefik/bot-wrangler/
        type: configMap
      - name: traefik-secrets
        mountPath: /etc/traefik/secrets
        type: secret
        secretName: traefik-secrets
    # Inject traefik-secrets as env vars for OCSP stapling and plugin configuration
    envFrom:
      - secretRef:
          name: traefik-secrets
    global:
      checkNewVersion: false
      sendAnonymousUsage: false
    image:
      # renovate: datasource=docker depName=traefik
      tag: v3.7.1
    experimental:
      plugins:
        crowdsec-bouncer-traefik-plugin:
          moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
          # renovate: datasource=github-releases depName=maxlerebourg/crowdsec-bouncer-traefik-plugin
          version: v1.6.0
        wrangler:
          moduleName: "github.com/holysoles/bot-wrangler-traefik-plugin"
          version: v0.10.1
        traefikoidc:
          moduleName: "github.com/lukaszraczylo/traefikoidc"
          # renovate: datasource=github-releases depName=lukaszraczylo/traefikoidc
          version: v1.0.11
      otlpLogs: false
    ocsp:
      enabled: true
    ports:
      web:
        port: 80
        expose:
          default: true
        protocol: TCP
      websecure:
        port: 443
        expose:
          default: true
        protocol: TCP
        http3:
          enabled: true
        transport:
          respondingTimeouts:
            readTimeout: 60
            writeTimeout: 120
            idleTimeout: 180
      metrics:
        port: 9100
        expose:
          default: false
        protocol: TCP
      syslog:
        port: 514
        expose:
          default: true
        protocol: TCP
      syslog-udp:
        port: 514
        expose:
          default: true
        protocol: UDP
      mysql:
        port: 3306
        expose:
          default: true
        protocol: TCP
    gateway:
      enabled: true
      name: traefik-external-gateway
      listeners:
        web:
          port: 80
          protocol: HTTP
          namespacePolicy:
            from: All
        websecure:
          port: 443
          protocol: HTTPS
          namespacePolicy:
            from: All
          certificateRefs:
            - name: 68cc-io-tls
              kind: Secret
        syslog:
          port: 514
          namespacePolicy:
            from: All
          protocol: TCP
        mysql:
          port: 3306
          namespacePolicy:
            from: All
          protocol: TCP
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-external
    gatewayClass:
      enabled: true
      name: traefik-external
      labels:
        ingress: external
    additionalArguments:
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --entryPoints.web.http.redirections.entryPoint.permanent=true
      # Chain:
      #   1. crowdsec-bouncer — malicious IPs 403'd before any CPU spend
      #   2. rate-limit — Traefik native per-instance rate limit
      #                   (60 req/s * 3 replicas = ~180 req/s cluster)
      #   3. security-headers — STS/XFO/CSP on every response
      #   4. bot-wrangler — block AI crawlers per robots.txt template
      #   5. compression — gzip response body last so headers stay plain
      # Previous cluster-rate-limiter (nzin/traefik-cluster-ratelimit v1.2.0)
      # was removed — Yaegi mistyped a Redis Lua reply (rate.go:116) and
      # 500'd every request. No maintained Redis-backed alternative exists.
      - --entryPoints.web.http.middlewares=network-crowdsec-bouncer@kubernetescrd,network-rate-limit@kubernetescrd,network-security-headers@kubernetescrd,network-bot-wrangler@kubernetescrd,network-compression@kubernetescrd
      - --entryPoints.web.observability.accessLogs=false
      - --entryPoints.web.observability.metrics=false
      - --entryPoints.web.observability.tracing=false
      - --entryPoints.web.reuseport=true
      # PROXY protocol trusted only from the LAN CIDR so the UniFi LB can
      # forward real client IP. Pod CIDR (10.42.0.0/16) is intentionally
      # NOT trusted — cloudflared pods speak plain HTTP/2 (not PROXY), and
      # trusting the pod CIDR would cause Traefik to fail-parse PROXY
      # headers on those connections. End-user IP over the tunnel is
      # preserved by the CF-Connecting-IP header instead.
      - --entryPoints.web.proxyProtocol=true
      - --entryPoints.web.proxyProtocol.trustedIPs=192.168.35.0/24
      - --entryPoints.websecure.http.middlewares=network-crowdsec-bouncer@kubernetescrd,network-rate-limit@kubernetescrd,network-security-headers@kubernetescrd,network-bot-wrangler@kubernetescrd,network-compression@kubernetescrd
      - --entryPoints.websecure.proxyProtocol=true
      - --entryPoints.websecure.proxyProtocol.trustedIPs=192.168.35.0/24
      - --entryPoints.websecure.reuseport=true
      # Drop sub-50ms access log entries (kube-probe health checks complete in <10ms)
      - --accesslog.filters.minduration=50ms
    deployment:
      kind: DaemonSet
      revisionHistoryLimit: 3
      # Set GOMEMLIMIT to 90% of the container memory limit (2Gi → ~1.8Gi)
      # This ensures Go's GC runs before the OOM killer fires
      goMemLimitPercentage: 90
      lifecycle:
        preStop:
          exec:
            # Give the LB 5s to drain connections before SIGTERM is sent
            command: ["/bin/sh", "-c", "sleep 5"]
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
      kubernetesGateway:
        enabled: true
        experimentalChannel: true
        labelSelector: "ingress=external"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    service:
      type: LoadBalancer
      annotations:
        io.cilium/lb-ipam-ips: "192.168.35.15"
        service.beta.kubernetes.io/do-loadbalancer-enable-proxy-protocol: "true"
      spec:
        externalTrafficPolicy: Local
    metrics:
      prometheus:
        enabled: true
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
        # Dedicated ClusterIP metrics Service. Without this the chart's
        # ServiceMonitor has no Service to scrape — the LoadBalancer
        # Service intentionally does not expose :9100. ClusterIP keeps
        # /metrics off the public VIP while vmagent can still reach it.
        service:
          enabled: true
        serviceMonitor:
          enabled: true
          enableHttp2: true
        prometheusRule:
          enabled: true
          rules:
            - alert: TraefikAbsent
              # Traefik v3 renamed traefik_entrypoint_open_connections to
              # traefik_open_connections with an 'entrypoint' label.
              expr: absent(traefik_open_connections{service="traefik-external-metrics"}) == 1
              for: 5m
              labels:
                severity: critical
                component: ingress
              annotations:
                summary: "Traefik metrics absent"
                description: "Traefik has stopped reporting metrics for 5 minutes, service may be down."
            - alert: TraefikHighHTTP5xxErrorRate
              expr: |
                sum by (entrypoint) (
                  rate(traefik_entrypoint_requests_total{code=~"5.."}[5m])
                )
                /
                sum by (entrypoint) (
                  rate(traefik_entrypoint_requests_total[5m])
                ) > 0.05
              for: 5m
              labels:
                severity: warning
                component: ingress
              annotations:
                summary: "Traefik high 5xx error rate on {{ $labels.entrypoint }}"
                description: "{{ $value | humanizePercentage }} of requests to {{ $labels.entrypoint }} are returning 5xx errors."
            # Per-service p99 latency. `exported_service` is the backend
            # k8s Service the request resolved to (e.g.
            # services-open-webui-http-8080@kubernetesgateway). Tells you
            # *which app* is slow, not just which entrypoint.
            # Threshold 5s / 10m window: excludes normal LLM-stream bursts
            # and model-load latency spikes; still catches sustained pain.
            - alert: TraefikServiceHighLatency
              expr: |
                histogram_quantile(0.99,
                  sum by (exported_service, le) (
                    rate(traefik_service_request_duration_seconds_bucket[5m])
                  )
                ) > 5
              for: 10m
              labels:
                severity: warning
                component: ingress
              annotations:
                summary: "Traefik p99 latency >5s for service {{ $labels.exported_service }}"
                description: "Backend service {{ $labels.exported_service }} p99 latency is {{ $value | humanizeDuration }} (sustained >10m). Check pod logs / downstream dependencies."
            # Per-router p99 — finer granularity (a single service can
            # have multiple routers across hosts). Router name format:
            # httproute-<ns>-<name>-gw-... so it identifies the HTTPRoute.
            - alert: TraefikRouterHighLatency
              expr: |
                histogram_quantile(0.99,
                  sum by (router, le) (
                    rate(traefik_router_request_duration_seconds_bucket[5m])
                  )
                ) > 5
              for: 10m
              labels:
                severity: warning
                component: ingress
              annotations:
                summary: "Traefik p99 latency >5s on router {{ $labels.router }}"
                description: "Router {{ $labels.router }} p99 latency is {{ $value | humanizeDuration }} (sustained >10m). Router name encodes the HTTPRoute namespace/name."
            - alert: TraefikConfigReloadFailed
              expr: traefik_config_last_reload_failure_time_seconds > traefik_config_last_reload_success_time_seconds
              for: 5m
              labels:
                severity: warning
                component: ingress
              annotations:
                summary: "Traefik configuration reload failed"
                description: "Traefik failed to reload its configuration. Check Traefik logs for details."
            - alert: TraefikTLSCertExpiringSoon
              expr: traefik_tls_certs_not_after - time() < 7 * 24 * 3600
              for: 1h
              labels:
                severity: warning
                component: certificates
              annotations:
                summary: "TLS cert expiring soon: {{ $labels.cn }}"
                description: "TLS certificate for {{ $labels.cn }} (SANs: {{ $labels.sans }}) expires in less than 7 days."
            - alert: TraefikHighOpenConnections
              # v3 rename: traefik_entrypoint_open_connections -> traefik_open_connections
              expr: sum by (entrypoint) (traefik_open_connections{service="traefik-external-metrics"}) > 1000
              for: 5m
              labels:
                severity: warning
                component: ingress
              annotations:
                summary: "Traefik high open connections on {{ $labels.entrypoint }}"
                description: "{{ $value }} open connections on entrypoint {{ $labels.entrypoint }}. Possible connection leak or traffic spike."
      otlp:
        enabled: false
        http:
          enabled: false
    logs:
      general:
        level: INFO
        otlp:
          enabled: false
        format: json
      access:
        enabled: true
        format: json
        otlp:
          enabled: false
        fields:
          general:
            defaultmode: keep
            names:
              ServiceName: keep
          headers:
            defaultmode: drop
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`dash.68cc.io`)
        entryPoints:
          - websecure
      # syslog-udp:
      #   port: 514
      #   namespacePolicy:
      #     from: All
      #   protocol: UDP
      #   entryPoints:
      #     - syslog-udp
    tlsOptions:
      default:
        sniStrict: true
        minVersion: VersionTLS13
