---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
#
# cloudflared runs as a Deployment in the network namespace connecting the
# existing "home" tunnel (id 3ecf7dee-f421-46df-bcc1-1ea7ff24155c) to
# Cloudflare's edge. Tunnel ingress config is managed remotely via the
# Cloudflare dashboard / API (not via this repo) — the tunnel config
# points every *.68cc.io hostname at
# traefik-external.network.svc.cluster.local:443, where Traefik + the
# authentik-forwardauth middleware takes over.
#
# Phase 1 of the Cloudflare tunnel rollout. See CLAUDE.md + the
# accompanying PR for the architecture write-up.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cloudflared
spec:
  interval: 1h
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      cloudflared:
        replicas: 2
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/cloudflare/cloudflared
              # renovate: datasource=docker depName=docker.io/cloudflare/cloudflared
              tag: 2026.7.3
            args:
              - tunnel
              - --no-autoupdate
              - --loglevel
              - info
              - --metrics
              - 0.0.0.0:2000
              - run
            env:
              NO_AUTOUPDATE: "true"
              TUNNEL_METRICS: 0.0.0.0:2000
            envFrom:
              - secretRef:
                  name: cloudflared-secret
            # /ready returns 200 iff cloudflared has an active connection
            # to the Cloudflare edge. liveness kills pods that detached
            # from the edge so the Deployment brings them back.
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: &metricsPort 2000
                  failureThreshold: 1
                  initialDelaySeconds: 10
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: *metricsPort
                  failureThreshold: 3
                  initialDelaySeconds: 10
                  periodSeconds: 10
              startup:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
            # ICMP ping from cloudflared (rare but required for some
            # origins that rely on pathping health). 65532 is the
            # nonroot uid/gid used by the distroless base.
            sysctls:
              - name: net.ipv4.ping_group_range
                value: "65532 65532"
          # Spread replicas across nodes so a single-node failure
          # doesn't black-hole public traffic.
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: *app
    service:
      app:
        controller: *app
        ports:
          metrics:
            port: *metricsPort
    serviceMonitor:
      app:
        serviceName: *app
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 30s
    # Tunnel health alerts. cloudflared exposes
    # `cloudflared_tunnel_ha_connections` as a gauge per replica — each
    # pod normally maintains 4 connections to distinct Cloudflare colos.
    # Two replicas → typical sum is 8. If the sum hits 0 the tunnel is
    # dead and every *.68cc.io public hostname returns 530 from the
    # Cloudflare edge (origin unreachable).
    prometheusRule:
      app:
        groups:
          - name: cloudflared
            rules:
              - alert: CloudflaredTunnelAbsent
                # scrape target vanished — pods down, service broken,
                # or ServiceMonitor mis-wired
                expr: absent(cloudflared_tunnel_ha_connections) == 1
                for: 5m
                labels:
                  severity: critical
                  component: ingress
                annotations:
                  summary: "cloudflared metrics absent"
                  description: >-
                    No cloudflared pod has reported metrics for 5
                    minutes. Public ingress via the home tunnel is
                    likely down.
              - alert: CloudflaredTunnelDown
                # All replicas detached from the Cloudflare edge.
                # Public services on *.68cc.io will return 530 at the
                # edge. Liveness probe should already be recycling pods;
                # firing this alert means the recycle loop hasn't
                # recovered.
                expr: sum(cloudflared_tunnel_ha_connections) == 0
                for: 2m
                labels:
                  severity: critical
                  component: ingress
                annotations:
                  summary: "Cloudflare tunnel has zero active connections"
                  description: >-
                    Every cloudflared replica is disconnected from the
                    Cloudflare edge. Public traffic is failing. Check
                    pod logs: kubectl -n network logs -l
                    app.kubernetes.io/name=cloudflared --tail=100
              - alert: CloudflaredTunnelDegraded
                # Fewer connections than expected. Typical = 4 per
                # replica * 2 replicas = 8. Alert below half so a single
                # pod restart doesn't flap — one full replica gone for
                # 10 minutes is worth investigating.
                expr: sum(cloudflared_tunnel_ha_connections) < 4
                for: 10m
                labels:
                  severity: warning
                  component: ingress
                annotations:
                  summary: "cloudflared HA connections below threshold"
                  description: >-
                    Active Cloudflare tunnel connections dropped below
                    4 (expected 8 with 2 replicas). One replica may be
                    unhealthy.
