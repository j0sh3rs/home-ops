---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: external-dns-rules
spec:
  groups:
    # All four ExternalDNS rules use `increase(...[15m]) > 0` rather than
    # the naive `counter > 0`. The cumulative *_errors_total counters only
    # reset on pod restart, so `> 0` fires forever after any transient
    # error (which is what bit unifi-dns on 2026-05-17 — a one-shot UniFi
    # controller reboot pinned the alert "active" for hours after errors
    # stopped). `increase(...[15m])` is window-bounded and auto-clears
    # when errors stop. for: 5m + 15m window = ~20m worst-case detection
    # latency on sustained errors but no false-positives on transients.
    - name: external-dns.rules
      rules:
        - alert: ExternalDNSRegistryError
          expr: |
            sum by (job, namespace) (increase(external_dns_registry_errors_total[15m])) > 0
          for: 5m
          annotations:
            summary: >-
              {{ $labels.job }} has registry errors in the last 15 minutes
          labels:
            severity: critical

        - alert: ExternalDNSSourceError
          expr: |
            sum by (job, namespace) (increase(external_dns_source_errors_total[15m])) > 0
          for: 5m
          annotations:
            summary: >-
              {{ $labels.job }} has source errors in the last 15 minutes
          labels:
            severity: critical

        - alert: ExternalDNSApplyChangesError
          expr: |
            sum by (job, namespace) (increase(external_dns_webhook_provider_applychanges_errors_total[15m])) > 0
          for: 5m
          annotations:
            summary: >-
              {{ $labels.job }} has failed to apply changes in the last 15 minutes
          labels:
            severity: critical

        - alert: ExternalDNSRecordsError
          expr: |
            sum by (job, namespace) (increase(external_dns_webhook_provider_records_errors_total[15m])) > 0
          for: 5m
          annotations:
            summary: >-
              {{ $labels.job }} has failed to gather records in the last 15 minutes
          labels:
            severity: critical
