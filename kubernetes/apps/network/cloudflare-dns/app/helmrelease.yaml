---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cloudflare-dns
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: cloudflare-dns
  install:
    disableSchemaValidation: true # Ref: https://github.com/kubernetes-sigs/external-dns/issues/5206
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    disableSchemaValidation: true # Ref: https://github.com/kubernetes-sigs/external-dns/issues/5206
    remediation:
      retries: 3
  values:
    fullnameOverride: *app
    provider:
      name: cloudflare
    env:
      - name: &name CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: &secret cloudflare-dns-secret
            key: *name
      - name: &name CF_ZONE_ID
        valueFrom:
          secretKeyRef:
            name: *secret
            key: *name
    extraArgs:
      - --cloudflare-dns-records-per-page=1000
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --gateway-name=traefik-external-gateway
      - --zone-id-filter=$(CF_ZONE_ID)
      # Public ingress anchor: every HTTPRoute attached to
      # traefik-external-gateway becomes a CNAME to the Cloudflare
      # tunnel hostname. cloudflared (kubernetes/apps/network/cloudflared)
      # runs the tunnel in-cluster; the tunnel's public ingress config
      # forwards *.68cc.io to traefik-external.network.svc:443 where
      # Traefik + the authentik-forwardauth middleware take over.
      #
      # --force-default-targets overrides each route's
      # external-dns.alpha.kubernetes.io/target annotation (which stays
      # 192.168.35.15 so unifi-dns keeps writing LAN records pointing
      # at the traefik-external VIP — split-horizon DNS).
      #
      # --cloudflare-proxied orange-clouds every managed record so it
      # terminates at the Cloudflare edge before hitting the tunnel.
      # Required for the tunnel CNAME to actually route traffic.
      - --default-targets=3ecf7dee-f421-46df-bcc1-1ea7ff24155c.cfargotunnel.com
      - --force-default-targets
      - --cloudflare-proxied
    triggerLoopOnEvent: true
    policy: sync
    sources: ["crd", "gateway-httproute", "gateway-tcproute", "gateway-tlsroute"]
    txtOwnerId: default
    txtPrefix: k8s.
    domainFilters: ["68cc.io", "*.68cc.io"]
    serviceMonitor:
      enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
