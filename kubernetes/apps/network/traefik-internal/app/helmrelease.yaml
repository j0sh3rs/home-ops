---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
# home-ops-1h2: Internal Traefik intentionally does NOT include the CrowdSec
# bouncer middleware in its entrypoint chain. Internal gateway is reachable
# only via the LAN LoadBalancer IP 192.168.35.17 (UniFi split-horizon DNS);
# external ingress goes through traefik-external which has the bouncer. The
# homelab threat model (see talos/patches/README.md) assumes a trusted LAN,
# single operator, no PHI/PCI workloads — adding a bouncer here is
# defense-in-depth against compromised LAN devices but adds complexity for
# minimal return. Revisit if the cluster hosts regulated data or the LAN is
# shared with untrusted users.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-internal
  namespace: network
spec:
  chartRef:
    kind: OCIRepository
    name: traefik-internal
    namespace: network
  interval: 1h
  timeout: 2m
  values:
    # Secret volume + env mirrored from traefik-external for CrowdSec
    # bouncer API key + TLS certs used by the crowdsec-bouncer plugin.
    volumes:
      - name: traefik-secrets
        mountPath: /etc/traefik/secrets
        type: secret
        secretName: traefik-secrets
    envFrom:
      - secretRef:
          name: traefik-secrets
    global:
      checkNewVersion: false
      sendAnonymousUsage: false
    image:
      # renovate: datasource=docker depName=traefik
      tag: v3.7.6
    experimental:
      plugins: {}
      otlpLogs: false
    ocsp:
      enabled: true
    ports:
      web:
        port: 80
        expose:
          default: true
        protocol: TCP
      websecure:
        port: 443
        expose:
          default: true
        protocol: TCP
        http3:
          enabled: true
        transport:
          respondingTimeouts:
            readTimeout: 60
            writeTimeout: 120
            idleTimeout: 180
      metrics:
        port: 9100
        expose:
          default: false
        protocol: TCP
      postgres:
        port: 5432
        expose:
          default: true
        protocol: TCP
      syslog:
        port: 514
        expose:
          default: true
        protocol: TCP
      syslog-udp:
        port: 514
        expose:
          default: true
        protocol: UDP
    gateway:
      enabled: true
      name: traefik-internal-gateway
      listeners:
        web:
          port: 80
          protocol: HTTP
          namespacePolicy:
            from: All
        websecure:
          port: 443
          protocol: HTTPS
          namespacePolicy:
            from: All
          certificateRefs:
            - name: 68cc-io-tls
              kind: Secret
        # Plain TCP passthrough for PostgreSQL. NOT a TLS listener: the
        # postgres wire protocol starts in cleartext and upgrades via its
        # own SSLRequest, so there is no ClientHello SNI for Traefik to
        # route on. CNPG terminates TLS itself end-to-end on 5432.
        postgres:
          port: 5432
          namespacePolicy:
            from: All
          protocol: TCP
        # Syslog ingest (TCP) via Gateway API TCPRoute. UDP syslog uses a
        # Traefik IngressRouteUDP on the syslog-udp entryPoint (port below);
        # Gateway API UDPRoute is not used. LAN-only — moved off the external
        # gateway so log ingest is not WAN-reachable (no CrowdSec at L4).
        syslog:
          port: 514
          namespacePolicy:
            from: All
          protocol: TCP
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-internal
    gatewayClass:
      enabled: true
      name: traefik-internal
      labels:
        ingress: internal
    additionalArguments:
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --entryPoints.web.http.redirections.entryPoint.permanent=true
      # Apply security-headers CR from network ns on both entrypoints.
      # CR is owned by traefik-external kustomization; cross-namespace
      # CRD refs already enabled via providers.kubernetesCRD.allowCrossNamespace.
      # No CrowdSec bouncer here — see file header comment (trusted LAN).
      - --entryPoints.web.http.middlewares=network-security-headers@kubernetescrd
      - --entryPoints.web.observability.accessLogs=false
      - --entryPoints.web.observability.metrics=false
      - --entryPoints.web.observability.tracing=false
      - --entryPoints.web.reuseport=true
      # Pod CIDR intentionally omitted — see matching comment in
      # traefik-external. Cloudflared isn't targeted at internal today,
      # but parity keeps the story consistent across both instances.
      - --entryPoints.web.proxyProtocol=true
      - --entryPoints.web.proxyProtocol.trustedIPs=192.168.35.0/24
      - --entryPoints.websecure.http.middlewares=network-security-headers@kubernetescrd
      - --entryPoints.websecure.proxyProtocol=true
      - --entryPoints.websecure.proxyProtocol.trustedIPs=192.168.35.0/24
      - --entryPoints.websecure.reuseport=true
      - --accesslog.filters.minduration=50ms
    deployment:
      kind: DaemonSet
      revisionHistoryLimit: 3
      # DaemonSet surge (k8s 1.22+): new pod up before old pod down so every
      # node keeps a Traefik pod during chart/image bumps. With
      # externalTrafficPolicy: Local, maxUnavailable>0 blackholes the LB node
      # mid-rollout. maxSurge:1/maxUnavailable:0 = zero-downtime rollout.
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 0
          maxSurge: 1
      goMemLimitPercentage: 90
      lifecycle:
        preStop:
          exec:
            command: ["/bin/sh", "-c", "sleep 5"]
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
      kubernetesGateway:
        enabled: true
        experimentalChannel: true
        labelSelector: "ingress=internal"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    service:
      type: LoadBalancer
      annotations:
        io.cilium/lb-ipam-ips: "192.168.35.17"
        service.beta.kubernetes.io/do-loadbalancer-enable-proxy-protocol: "true"
      spec:
        externalTrafficPolicy: Local
    metrics:
      prometheus:
        enabled: true
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
        # Dedicated ClusterIP metrics Service. Without this the chart's
        # ServiceMonitor has no Service to scrape — the LoadBalancer
        # Service intentionally does not expose :9100. ClusterIP keeps
        # /metrics off the public VIP while vmagent can still reach it.
        service:
          enabled: true
        serviceMonitor:
          enabled: true
          enableHttp2: true
        prometheusRule:
          enabled: true
          rules:
            - alert: TraefikInternalAbsent
              # Traefik v3 renamed traefik_entrypoint_open_connections to
              # traefik_open_connections with an 'entrypoint' label.
              expr: absent(traefik_open_connections{service="traefik-internal-metrics"}) == 1
              for: 5m
              labels:
                severity: critical
                component: ingress
                instance: internal
              annotations:
                summary: "Traefik-internal metrics absent"
                description: "Traefik-internal has stopped reporting metrics for 5 minutes."
            - alert: TraefikInternalHighHTTP5xxErrorRate
              expr: |
                sum by (entrypoint) (
                  rate(traefik_entrypoint_requests_total{service="traefik-internal-metrics", code=~"5.."}[5m])
                )
                /
                sum by (entrypoint) (
                  rate(traefik_entrypoint_requests_total{service="traefik-internal-metrics"}[5m])
                ) > 0.05
              for: 5m
              labels:
                severity: warning
                component: ingress
                instance: internal
              annotations:
                summary: "Traefik-internal high 5xx error rate on {{ $labels.entrypoint }}"
                description: "{{ $value | humanizePercentage }} of requests to {{ $labels.entrypoint }} are returning 5xx errors."
            # Per-service p99. exported_service = backend k8s Service.
            - alert: TraefikInternalServiceHighLatency
              expr: |
                histogram_quantile(0.99,
                  sum by (exported_service, le) (
                    rate(traefik_service_request_duration_seconds_bucket{service="traefik-internal-metrics"}[5m])
                  )
                ) > 5
              for: 10m
              labels:
                severity: warning
                component: ingress
                instance: internal
              annotations:
                summary: "Traefik-internal p99 latency >5s for service {{ $labels.exported_service }}"
                description: "Backend service {{ $labels.exported_service }} p99 latency is {{ $value | humanizeDuration }} (sustained >10m on internal gateway). Check pod logs / downstream dependencies."
            # Per-router p99 — identifies the HTTPRoute by name.
            - alert: TraefikInternalRouterHighLatency
              expr: |
                histogram_quantile(0.99,
                  sum by (router, le) (
                    rate(traefik_router_request_duration_seconds_bucket{service="traefik-internal-metrics"}[5m])
                  )
                ) > 5
              for: 10m
              labels:
                severity: warning
                component: ingress
                instance: internal
              annotations:
                summary: "Traefik-internal p99 latency >5s on router {{ $labels.router }}"
                description: "Router {{ $labels.router }} p99 latency is {{ $value | humanizeDuration }} (sustained >10m on internal gateway)."
      otlp:
        enabled: false
        http:
          enabled: false
    log:
      level: INFO
      otlp:
        enabled: false
      format: json
    accessLog:
      enabled: true
      format: json
      otlp:
        enabled: false
      fields:
        defaultMode: keep
        names:
          ServiceName: keep
        headers:
          defaultMode: drop
    # No dashboard IngressRoute — external Traefik hosts dash.68cc.io.
    ingressRoute:
      dashboard:
        enabled: false
    tlsOptions:
      default:
        sniStrict: true
        minVersion: VersionTLS13
