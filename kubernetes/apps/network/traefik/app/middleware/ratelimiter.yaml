---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cluster-rate-limiter
  namespace: network
spec:
  plugin:
    clusterRatelimit:
      average: 20
      burst: 10
      period: 10
      sourceCriterion:
        ipStrategy:
          depth: 2
      redisAddress: "dragonflydb.databases.svc.cluster.local:6379"
      # $DRAGONFLYDB_PASSWORD env-var expansion; plugin reads value from
      # traefik-secrets (mounted via HelmRelease envFrom).
      redisPassword: "$DRAGONFLYDB_PASSWORD"
      redisDb: 3
      redisConnectionTimeout: 2
      whitelistIPs:
        - "127.0.0.1/32"
        - "10.42.0.0/16"
        - "10.43.0.0/16"
        - "192.168.35.0/24"
