---
# Auth0 OIDC middleware (plugin: github.com/lukaszraczylo/traefikoidc v0.8.1)
# Provider: Auth0 tenant 68ccio, app HomeOps
# Social login: Google only
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oidc-auth0-secure
  namespace: network
spec:
  plugin:
    traefikoidc:
      providerURL: https://68ccio.us.auth0.com
      clientID: "${AUTH0_CLIENT_ID}"
      clientSecret: "${AUTH0_CLIENT_SECRET}"
      sessionEncryptionKey: "${SESSION_ENCRYPTION_KEY}"
      sessionMaxAge: 28800

      callbackURL: /oauth2/callback
      logoutURL: /oauth2/logout
      postLogoutRedirectURI: /

      # Traefik terminates TLS; plugin must force https on redirect URIs.
      forceHTTPS: true

      scopes:
        - openid
        - profile
        - email

      # Reject sessions whose access-token audience does not match
      # (prevents token-confusion attacks). No custom API → audience
      # defaults to clientID.
      strictAudienceValidation: true

      # Single-user homelab allowlist.
      allowedUsers:
        - j0sh3rs@gmail.com

      logLevel: info

      redis:
        enabled: true
        address: dragonflydb.databases.svc.cluster.local:6379
        db: 0
        keyPrefix: "traefikoidc:auth0:"
        cacheMode: hybrid
        poolSize: 20
        connectTimeout: 5
        readTimeout: 3
        writeTimeout: 3
        enableCircuitBreaker: true
        circuitBreakerThreshold: 5
        circuitBreakerTimeout: 60
        enableHealthCheck: true
        healthCheckInterval: 30
