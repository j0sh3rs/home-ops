---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: network
spec:
  chartRef:
    kind: OCIRepository
    name: traefik
    namespace: network
  interval: 1h
  timeout: 2m
  # The Traefik chart template only renders tls: for protocol: HTTPS listeners.
  # For protocol: TLS (e.g. mysql-tls) the tls block is silently dropped, causing
  # "InvalidTLSConfiguration: No TLS configuration for Gateway Listener". Patch it in.
  #
  # JSON patch (RFC 6902) is used instead of a strategic merge patch because kustomize
  # in postRenderers context has no CRD schema, so a merge patch would replace the
  # entire listeners array. Helm sorts gateway.listeners map keys alphabetically, so
  # the listener order is deterministic: mysql-tls=0, syslog-tcp=1, web=2, websecure=3.
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: gateway.networking.k8s.io
              kind: Gateway
              name: traefik-gateway
            patch: |-
              - op: add
                path: /spec/listeners/0/tls
                value:
                  mode: Terminate
                  certificateRefs:
                    - name: 68cc-io-tls
                      kind: Secret
  values:
    volumes:
      - name: botwrangler-robots-template
        mountPath: /etc/traefik/bot-wrangler/
        type: configMap
      - name: traefik-secrets
        mountPath: /etc/traefik/secrets
        type: secret
        secretName: traefik-secrets
    # Inject traefik-secrets as env vars for OCSP stapling and plugin configuration
    envFrom:
      - secretRef:
          name: traefik-secrets
    global:
      checkNewVersion: false
      sendAnonymousUsage: false
    image:
      # renovate: datasource=docker depName=traefik
      tag: v3.6.12
    experimental:
      plugins:
        crowdsec-bouncer-traefik-plugin:
          moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
          # renovate: datasource=github-releases depName=maxlerebourg/crowdsec-bouncer-traefik-plugin
          version: v1.5.1
        traefikoidc:
          # renovate: datasource=github-releases depName=lukaszraczylo/traefikoidc
          moduleName: "github.com/lukaszraczylo/traefikoidc"
          version: "v0.8.1"
        clusterRatelimit:
          moduleName: "github.com/nzin/traefik-cluster-ratelimit"
          version: "v1.2.0"
        wrangler:
          moduleName: "github.com/holysoles/bot-wrangler-traefik-plugin"
          version: v0.10.1
      otlpLogs: false
    ocsp:
      enabled: true
    ports:
      web:
        port: 80
        expose:
          default: true
        protocol: TCP
      websecure:
        port: 443
        expose:
          default: true
        protocol: TCP
        http3:
          enabled: true
        transport:
          respondingTimeouts:
            readTimeout: 60
            writeTimeout: 120
            idleTimeout: 180
      metrics:
        port: 9100
        expose:
          default: false
        protocol: TCP
      syslog-tcp:
        port: 514
        expose:
          default: true
        protocol: TCP
      mysql-tls:
        port: 3306
        expose:
          default: true
        protocol: TCP
    gateway:
      enabled: true
      listeners:
        web:
          port: 80
          protocol: HTTP
          namespacePolicy:
            from: All
        websecure:
          port: 443
          protocol: HTTPS
          namespacePolicy:
            from: All
          certificateRefs:
            - name: 68cc-io-tls
              kind: Secret
        syslog-tcp:
          port: 514
          namespacePolicy:
            from: All
          protocol: TCP
        mysql-tls:
          port: 3306
          namespacePolicy:
            from: All
          protocol: TLS
          tls:
            mode: Terminate
            certificateRefs:
              - name: 68cc-io-tls
                kind: Secret
    ingressClass:
      enabled: true
      isDefaultClass: false
    additionalArguments:
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --entryPoints.web.http.redirections.entryPoint.permanent=true
      - --entryPoints.web.http.middlewares=network-security-headers@kubernetescrd,network-bot-wrangler@kubernetescrd,network-crowdsec-bouncer@kubernetescrd
      - --entryPoints.web.observability.accessLogs=false
      - --entryPoints.web.observability.metrics=false
      - --entryPoints.web.observability.tracing=false
      - --entryPoints.web.reuseport=true
      - --entryPoints.web.proxyProtocol=true
      - --entryPoints.web.proxyProtocol.trustedIPs=10.42.0.0/16,192.168.35.0/24
      - --entryPoints.websecure.http.middlewares=network-security-headers@kubernetescrd,network-bot-wrangler@kubernetescrd,network-crowdsec-bouncer@kubernetescrd
      - --entryPoints.websecure.proxyProtocol=true
      - --entryPoints.websecure.proxyProtocol.trustedIPs=10.42.0.0/16,192.168.35.0/24
      - --entryPoints.websecure.reuseport=true
    deployment:
      kind: DaemonSet
      revisionHistoryLimit: 3
      # Set GOMEMLIMIT to 90% of the container memory limit (2Gi → ~1.8Gi)
      # This ensures Go's GC runs before the OOM killer fires
      goMemLimitPercentage: 90
      lifecycle:
        preStop:
          exec:
            # Give the LB 5s to drain connections before SIGTERM is sent
            command: ["/bin/sh", "-c", "sleep 5"]
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
      kubernetesGateway:
        enabled: true
        experimentalChannel: true
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    service:
      type: LoadBalancer
      annotations:
        io.cilium/lb-ipam-ips: "192.168.35.15"
        service.beta.kubernetes.io/do-loadbalancer-enable-proxy-protocol: "true"
      spec:
        externalTrafficPolicy: Local
    metrics:
      prometheus:
        enabled: true
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
        serviceMonitor:
          enabled: true
          enableHttp2: true
        prometheusRule:
          enabled: true
          rules:
            - alert: TraefikAbsent
              expr: absent(traefik_entrypoint_open_connections) == 1
              for: 5m
              labels:
                severity: critical
                component: ingress
              annotations:
                summary: "Traefik metrics absent"
                description: "Traefik has stopped reporting metrics for 5 minutes, service may be down."
            - alert: TraefikHighHTTP5xxErrorRate
              expr: |
                sum by (entrypoint) (
                  rate(traefik_entrypoint_requests_total{code=~"5.."}[5m])
                )
                /
                sum by (entrypoint) (
                  rate(traefik_entrypoint_requests_total[5m])
                ) > 0.05
              for: 5m
              labels:
                severity: warning
                component: ingress
              annotations:
                summary: "Traefik high 5xx error rate on {{ $labels.entrypoint }}"
                description: "{{ $value | humanizePercentage }} of requests to {{ $labels.entrypoint }} are returning 5xx errors."
            - alert: TraefikHighRequestLatency
              expr: |
                histogram_quantile(0.99,
                  sum by (le, entrypoint) (
                    rate(traefik_entrypoint_request_duration_seconds_bucket[5m])
                  )
                ) > 2
              for: 5m
              labels:
                severity: warning
                component: ingress
              annotations:
                summary: "Traefik high p99 latency on {{ $labels.entrypoint }}"
                description: "p99 request latency on entrypoint {{ $labels.entrypoint }} is {{ $value | humanizeDuration }}."
            - alert: TraefikConfigReloadFailed
              expr: traefik_config_last_reload_failure_time_seconds > traefik_config_last_reload_success_time_seconds
              for: 5m
              labels:
                severity: warning
                component: ingress
              annotations:
                summary: "Traefik configuration reload failed"
                description: "Traefik failed to reload its configuration. Check Traefik logs for details."
            - alert: TraefikTLSCertExpiringSoon
              expr: traefik_tls_certs_not_after - time() < 7 * 24 * 3600
              for: 1h
              labels:
                severity: warning
                component: certificates
              annotations:
                summary: "TLS cert expiring soon: {{ $labels.cn }}"
                description: "TLS certificate for {{ $labels.cn }} (SANs: {{ $labels.sans }}) expires in less than 7 days."
            - alert: TraefikHighOpenConnections
              expr: sum by (entrypoint) (traefik_entrypoint_open_connections) > 1000
              for: 5m
              labels:
                severity: warning
                component: ingress
              annotations:
                summary: "Traefik high open connections on {{ $labels.entrypoint }}"
                description: "{{ $value }} open connections on entrypoint {{ $labels.entrypoint }}. Possible connection leak or traffic spike."
      otlp:
        enabled: false
        http:
          enabled: false
    logs:
      general:
        level: INFO
        otlp:
          enabled: false
        format: json
      access:
        enabled: true
        format: json
        otlp:
          enabled: false
        filters:
          # Drop sub-50ms requests — eliminates kube-probe health check noise
          # (probes complete in <10ms; real requests are almost always slower)
          minDuration: "50ms"
        fields:
          general:
            defaultmode: keep
            names:
              ServiceName: keep
          headers:
            defaultmode: drop
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`dash.68cc.io`)
        entryPoints:
          - websecure
        middlewares:
          - name: oidc-auth0-secure
            namespace: network
    tlsOptions:
      default:
        sniStrict: true
        minVersion: VersionTLS13
