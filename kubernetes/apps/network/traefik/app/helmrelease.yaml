---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: network
spec:
  chartRef:
    kind: OCIRepository
    name: traefik
    namespace: network
  interval: 1h
  timeout: 2m
  values:
    volumes:
      - name: botwrangler-robots-template
        mountPath: /etc/traefik/bot-wrangler/
        type: configMap
      - name: traefik-secrets
        mountPath: /etc/traefik/secrets
        type: secret
        secretName: traefik-secrets
    global:
      checkNewVersion: false
    image:
      # renovate: datasource=docker depName=traefik
      tag: v3.6.12
    experimental:
      plugins:
        crowdsec-bouncer-traefik-plugin:
          moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
          # renovate: datasource=github-releases depName=maxlerebourg/crowdsec-bouncer-traefik-plugin
          version: v1.5.1
        traefikoidc:
          # renovate: datasource=github-releases depName=lukaszraczylo/traefikoidc
          moduleName: "github.com/lukaszraczylo/traefikoidc"
          version: "v0.8.1"
        clusterRatelimit:
          moduleName: "github.com/nzin/traefik-cluster-ratelimit"
          version: "v1.2.0"
        wrangler:
          moduleName: "github.com/holysoles/bot-wrangler-traefik-plugin"
          version: v0.10.1
      otlpLogs: false
    ocsp:
      enabled: true
      envFrom:
        - secretRef:
            name: traefik-secrets
    ports:
      web:
        port: 80
        expose:
          default: true
        protocol: TCP
      websecure:
        port: 443
        expose:
          default: true
        protocol: TCP
        http3:
          enabled: true
      metrics:
        port: 9100
        expose:
          default: false
        protocol: TCP
      syslog-tcp:
        port: 514
        expose:
          default: true
        protocol: TCP
    gateway:
      # annotations:
      #   external-dns.alpha.kubernetes.io/target: home.68cc.io
      enabled: true
      listeners:
        web:
          port: 80
          protocol: HTTP
          namespacePolicy:
            from: All
        websecure:
          port: 443
          protocol: HTTPS
          namespacePolicy:
            from: All
          certificateRefs:
            - name: 68cc-io-tls
              kind: Secret
        syslog-tcp:
          port: 514
          namespacePolicy:
            from: All
          protocol: TCP
    ingressClass:
      enabled: true
      isDefaultClass: false
    additionalArguments:
      - --accesslog=true
      - --accesslog.format=json
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --entryPoints.web.http.redirections.entryPoint.permanent=true
      - --entryPoints.web.http.middlewares=network-security-headers@kubernetescrd,network-bot-wrangler@kubernetescrd,network-crowdsec-bouncer@kubernetescrd
      - --entryPoints.web.observability.accessLogs=false
      - --entryPoints.web.observability.metrics=false
      - --entryPoints.web.observability.tracing=false
      - --entryPoints.web.reuseport=true
      - --entryPoints.web.proxyProtocol=true
      - --entryPoints.web.proxyProtocol.trustedIPs=10.42.0.0/16,192.168.35.0/24
      - --entryPoints.websecure.http.middlewares=network-security-headers@kubernetescrd,network-bot-wrangler@kubernetescrd,network-crowdsec-bouncer@kubernetescrd
      - --entryPoints.websecure.proxyProtocol=true
      - --entryPoints.websecure.proxyProtocol.trustedIPs=10.42.0.0/16,192.168.35.0/24
      - --entryPoints.websecure.reuseport=true
    deployment:
      kind: DaemonSet
      revisionHistoryLimit: 3
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
      kubernetesGateway:
        enabled: true
        experimentalChannel: true
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    service:
      type: LoadBalancer
      annotations:
        io.cilium/lb-ipam-ips: "192.168.35.15"
        service.beta.kubernetes.io/do-loadbalancer-enable-proxy-protocol: "true"
      spec:
        externalTrafficPolicy: Local
    metrics:
      prometheus:
        enabled: true
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
        serviceMonitor:
          enabled: true
          enableHttp2: true
        prometheusRule:
          enabled: true
          rules:
            - alert: TraefikAbsent
              expr: absent(traefik_entrypoint_open_connections) == 1
              for: 5m
              labels:
                severity: critical
                component: ingress
              annotations:
                summary: "Traefik metrics absent"
                description: "Traefik has stopped reporting metrics for 5 minutes, service may be down."
            - alert: TraefikHighHTTP5xxErrorRate
              expr: |
                sum by (entrypoint) (
                  rate(traefik_entrypoint_requests_total{code=~"5.."}[5m])
                )
                /
                sum by (entrypoint) (
                  rate(traefik_entrypoint_requests_total[5m])
                ) > 0.05
              for: 5m
              labels:
                severity: warning
                component: ingress
              annotations:
                summary: "Traefik high 5xx error rate on {{ $labels.entrypoint }}"
                description: "{{ $value | humanizePercentage }} of requests to {{ $labels.entrypoint }} are returning 5xx errors."
            - alert: TraefikHighRequestLatency
              expr: |
                histogram_quantile(0.99,
                  sum by (le, entrypoint) (
                    rate(traefik_entrypoint_request_duration_seconds_bucket[5m])
                  )
                ) > 2
              for: 5m
              labels:
                severity: warning
                component: ingress
              annotations:
                summary: "Traefik high p99 latency on {{ $labels.entrypoint }}"
                description: "p99 request latency on entrypoint {{ $labels.entrypoint }} is {{ $value | humanizeDuration }}."
            - alert: TraefikConfigReloadFailed
              expr: traefik_config_last_reload_failure_time_seconds > traefik_config_last_reload_success_time_seconds
              for: 5m
              labels:
                severity: warning
                component: ingress
              annotations:
                summary: "Traefik configuration reload failed"
                description: "Traefik failed to reload its configuration. Check Traefik logs for details."
            - alert: TraefikTLSCertExpiringSoon
              expr: traefik_tls_certs_not_after - time() < 7 * 24 * 3600
              for: 1h
              labels:
                severity: warning
                component: certificates
              annotations:
                summary: "TLS cert expiring soon: {{ $labels.cn }}"
                description: "TLS certificate for {{ $labels.cn }} (SANs: {{ $labels.sans }}) expires in less than 7 days."
      otlp:
        enabled: false
        http:
          enabled: false
    logs:
      general:
        level: INFO
        otlp:
          enabled: false
        format: json
      access:
        enabled: true
        format: json
        otlp:
          enabled: false
        fields:
          defaultMode: keep
          names:
            ServiceName: keep
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`dash.68cc.io`)
        entryPoints:
          - websecure
    tlsOptions:
      default:
        sniStrict: true
        preferServerCipherSuites: true
        minVersion: VersionTLS13
