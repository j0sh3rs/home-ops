---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmagent_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAgent
metadata:
  name: vmagent
spec:
  replicaCount: 1
  scrapeInterval: "30s"
  # Pick up every ServiceMonitor / PodMonitor / Probe / VMRule in the cluster
  # without requiring a selector. vm-operator also auto-converts prom-operator
  # CRDs, so existing kube-prometheus-stack targets are included.
  selectAllByDefault: true
  remoteWrite:
    - url: http://vmsingle-vmsingle.monitoring.svc.cluster.local:8429/api/v1/write
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  # bee-jms-01 apiserver /metrics response exceeds the default 16 MiB cap
  # (large ServiceAccount/Lease churn + verbose workqueue histograms).
  # 64 MiB gives headroom for all 3 control-plane scrapes without masking
  # a real regression. Other targets nowhere near this size.
  extraArgs:
    promscrape.maxScrapeSize: "64MiB"
  serviceScrapeSpec:
    endpoints:
      - port: http
        interval: 30s
