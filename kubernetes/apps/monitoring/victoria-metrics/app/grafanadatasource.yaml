---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: vmsingle
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    type: prometheus
    name: vmsingle
    access: proxy
    isDefault: false
    url: http://vmsingle-vmsingle.monitoring.svc.cluster.local:8429
    jsonData:
      prometheusType: Prometheus
      # 30s matches vmagent scrapeInterval so dashboards step cleanly.
      timeInterval: 30s
