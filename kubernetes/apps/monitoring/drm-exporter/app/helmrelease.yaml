---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: drm-exporter
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # All 4 nodes carry an AMD GPU
    # (feature.node.kubernetes.io/pci-0300_1002.present), unlike
    # amd-device-metrics-exporter's gpuagent which only enumerates the
    # discrete Navi 48 card on bigboi-jms-01 — the 3 Renoir/Cezanne APU
    # nodes (bee-jms-*) were previously unmonitored. drm-exporter reads
    # sysfs/DRM directly, so it covers APUs too; each pod exits cleanly
    # on a GPU-less node.
    nodeSelector:
      kubernetes.io/arch: amd64
      feature.node.kubernetes.io/pci-0300_1002.present: "true"
    hostAccess:
      # AMD-only cluster: no MSR/devCpu path needed (Intel-only), sys
      # is required.
      devDri: /dev/dri
      sys: /sys
    # Chart defaults (root + PERFMON/SYS_RAWIO, non-privileged) still hit
    # EPERM on "discovering DRM devices" on every node. A hostPath bind
    # mount of /dev/dri does not grant a cgroup device-access rule by
    # itself — that only happens via `privileged: true` or a device
    # plugin/DRA claim that injects the device (this cluster's amd-gpu
    # device-plugin is legacy-style, not DRA, so it can't back this
    # chart's `dra.enabled` option). Run privileged until upstream
    # supports device-plugin-based access for non-DRA clusters.
    securityContext:
      privileged: true
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
    service:
      type: ClusterIP
    # vmagent picks this up via its `selectAllByDefault: true` setting
    # (see kubernetes/apps/monitoring/victoria-metrics/app/vmagent.yaml).
    monitoring:
      serviceMonitor:
        enabled: true
        interval: 30s
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          folder: monitoring
          matchLabels:
            grafana.internal/instance: grafana
