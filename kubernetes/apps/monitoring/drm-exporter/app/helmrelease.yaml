---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: drm-exporter
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # All 4 nodes carry an AMD GPU
    # (feature.node.kubernetes.io/pci-0300_1002.present), unlike
    # amd-device-metrics-exporter's gpuagent which only enumerates the
    # discrete Navi 48 card on bigboi-jms-01 — the 3 Renoir/Cezanne APU
    # nodes (bee-jms-*) were previously unmonitored. drm-exporter reads
    # sysfs/DRM directly, so it covers APUs too; each pod exits cleanly
    # on a GPU-less node.
    nodeSelector:
      kubernetes.io/arch: amd64
      feature.node.kubernetes.io/pci-0300_1002.present: "true"
    hostAccess:
      # AMD-only cluster: no MSR/devCpu path needed (Intel-only), sys
      # is required.
      devDri: /dev/dri
      sys: /sys
    # Chart defaults (root + PERFMON/SYS_RAWIO) are required even on
    # AMD-only nodes: dropping to a non-root user + dropping capabilities
    # broke DRM device discovery cluster-wide (EPERM on every node,
    # including the dGPU node) despite the README's claim that AMD needs
    # neither. Leave securityContext/podSecurityContext at chart defaults.
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
    service:
      type: ClusterIP
    # vmagent picks this up via its `selectAllByDefault: true` setting
    # (see kubernetes/apps/monitoring/victoria-metrics/app/vmagent.yaml).
    monitoring:
      serviceMonitor:
        enabled: true
        interval: 30s
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          folder: monitoring
          matchLabels:
            grafana.internal/instance: grafana
