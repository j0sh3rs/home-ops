---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  values:
    fullnameOverride: victoria-logs
    server:
      retentionPeriod: 30d
      extraArgs:
        envflag.enable: true
        envflag.prefix: VM_
        loggerFormat: json
        httpListenAddr: :9428
        http.shutdownDelay: 15s
        syslog.listenAddr.tcp: ":514"
        syslog.listenAddr.udp: ":514"
        syslog.timezone: "America/New_York"
      securityContext:
        capabilities:
          add:
            - NET_BIND_SERVICE
      persistentVolume:
        enabled: true
        storageClassName: openebs-hostpath
        size: 50Gi
      service:
        extraPorts:
          - name: syslog-tcp
            port: 514
            targetPort: 514
            protocol: TCP
          - name: syslog-udp
            port: 514
            targetPort: 514
            protocol: UDP
      route:
        enabled: true
        annotations:
          external-dns.alpha.kubernetes.io/target: 192.168.35.15
        hostnames:
          - logs.68cc.io
        parentRefs:
          - name: traefik-gateway
            namespace: network
        extraRules:
          - filters:
              - type: RequestRedirect
                requestRedirect:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /select/vmui/
                  statusCode: 302
            matches:
              - path:
                  type: Exact
                  value: /
      serviceMonitor:
        enabled: true

    # Vector DaemonSet ships pod logs to VictoriaLogs via the ES-compatible
    # /insert/elasticsearch endpoint. Chart renders the DS + ConfigMap itself
    # when vector.enabled=true.
    vector:
      enabled: true
      role: Agent
      dataDir: /vector-data-dir
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 1Gi
      args:
        - -w
        - --config-dir
        - /etc/vector/
      containerPorts:
        - name: prom-exporter
          containerPort: 9090
          protocol: TCP
      service:
        enabled: false
      existingConfigMaps:
        - vector-vl-config
      customConfigNamespace: ""
      customConfigName: vector-vl-config
      customConfig:
        data_dir: /vector-data-dir
        api:
          enabled: false
          address: 0.0.0.0:8686
        sources:
          k8s:
            type: kubernetes_logs
          internal_metrics:
            type: internal_metrics
        transforms:
          parser:
            type: remap
            inputs: [k8s]
            source: |
              # Try to parse message as JSON, otherwise keep as-is.
              parsed, err = parse_json(.message)
              if err == null {
                .log = parsed
              } else {
                .log = .message
              }
              del(.message)
              # Drop verbose node/pod label maps — pod_name + namespace are
              # already present as dedicated fields and every log entry was
              # carrying ~3KB of AMD CPU feature labels per record.
              del(.kubernetes.node_labels)
              del(.kubernetes.pod_labels)
              del(.kubernetes.namespace_labels)
              del(.kubernetes.pod_annotations)
              del(.kubernetes.node_annotations)
        sinks:
          exporter:
            type: prometheus_exporter
            address: 0.0.0.0:9090
            inputs: [internal_metrics]
          vlogs:
            type: elasticsearch
            inputs: [parser]
            endpoints:
              - http://victoria-logs-server.monitoring.svc.cluster.local:9428/insert/elasticsearch
            mode: bulk
            api_version: v8
            compression: gzip
            healthcheck:
              enabled: false
            request:
              headers:
                VL-Time-Field: timestamp
                VL-Stream-Fields: stream,kubernetes.pod_name,kubernetes.container_name,kubernetes.pod_namespace
                VL-Msg-Field: message,msg,_msg,log.msg,log.message,log
                AccountID: "0"
                ProjectID: "0"

    dashboards:
      enabled: true
