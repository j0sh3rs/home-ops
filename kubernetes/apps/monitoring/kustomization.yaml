---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
components:
  - ../../components/common
  - ../../components/repos/app-template
  - ../../components/traefik-oidc
resources:
  - ./referencegrant.yaml
  - ./grafana/ks.yaml
  - ./grafana/dashboards/ks.yaml
  - ./kube-prometheus-stack/ks.yaml
  - ./unpoller/ks.yaml
  - ./victoria-logs/ks.yaml
  - ./victoria-metrics-operator/ks.yaml
  - ./victoria-metrics/ks.yaml
# node-exporter + kube-prometheus-stack need hostNetwork/hostPID/hostPath/hostPort,
# which PodSecurity "baseline" rejects. Label the namespace "privileged" so those
# workloads can run. Other namespaces are unaffected.
patches:
  - target:
      kind: Namespace
      # Original name from components/common/namespace.yaml; kustomize rewrites
      # this to "monitoring" via the `namespace:` field above.
      name: not-used
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: not-used
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
