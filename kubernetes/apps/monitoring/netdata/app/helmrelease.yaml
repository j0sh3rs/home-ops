---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netdata
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      # renovate: datasource=helm depName=netdata registryUrl=https://netdata.github.io/helmchart/
      chart: netdata
      version: 3.7.168
      sourceRef:
        kind: HelmRepository
        name: netdata
        namespace: flux-system
      interval: 5m
  valuesFrom:
    - kind: Secret
      name: netdata-secrets
      valuesKey: PARENT_CLAIMING_TOKEN
      targetPath: parent.claiming.token
    - kind: Secret
      name: netdata-secrets
      valuesKey: PARENT_CLAIMING_ROOMS
      targetPath: parent.claiming.rooms
    - kind: Secret
      name: netdata-secrets
      valuesKey: CHILD_CLAIMING_TOKEN
      targetPath: child.claiming.token
    - kind: Secret
      name: netdata-secrets
      valuesKey: CHILD_CLAIMING_ROOMS
      targetPath: child.claiming.rooms
    - kind: Secret
      name: netdata-secrets
      valuesKey: DISCORD_WEBHOOK_URL
      targetPath: notifications.discord.webhook_url
  values:
    image:
      repository: netdata/netdata
      # renovate: datasource=docker depName=netdata/netdata
      tag: v2.10.3
      pullPolicy: IfNotPresent
    ingress:
      enabled: false
    parent:
      claiming:
        enabled: true
      # NOTE: do NOT set DO_NOT_TRACK here. The entrypoint reacts to it by
      # touching /etc/netdata/.opt-out-from-anonymous-statistics, but the parent
      # runs as uid 201 against a root-owned /etc/netdata, so the write fails and
      # the container exits 1 (crashloop). Telemetry opt-out is moot anyway since
      # Netdata Cloud claiming is enabled (accepted egress).
      configs:
        # Route parent health alarms to Discord. storedType=secret renders the
        # webhook into the netdata-conf-parent Secret (b64), keeping it out of a
        # plaintext ConfigMap. webhook_url is injected from netdata-secrets via
        # valuesFrom and resolved by the chart's `tpl` pass on config.data.
        health:
          enabled: true
          storedType: secret
          path: /etc/netdata/health_alarm_notify.conf
          data: |
            SEND_EMAIL="NO"
            SEND_SLACK="NO"
            SEND_DISCORD="YES"
            DISCORD_WEBHOOK_URL="{{ .Values.notifications.discord.webhook_url }}"
            DEFAULT_RECIPIENT_DISCORD="alerts"
      database:
        storageclass: openebs-hostpath
        volumesize: 5Gi
      alarms:
        storageclass: openebs-hostpath
        volumesize: 1Gi
      resources:
        requests:
          cpu: 200m
          memory: 768Mi
        limits:
          memory: 1536Mi
    child:
      claiming:
        enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
    k8sState:
      resources:
        requests:
          cpu: 50m
          memory: 192Mi
        limits:
          memory: 512Mi
