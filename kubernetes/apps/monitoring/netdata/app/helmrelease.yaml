---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netdata
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      # renovate: datasource=helm depName=netdata registryUrl=https://netdata.github.io/helmchart/
      chart: netdata
      version: 3.7.166
      sourceRef:
        kind: HelmRepository
        name: netdata
        namespace: flux-system
      interval: 5m
  valuesFrom:
    - kind: Secret
      name: netdata-secrets
      valuesKey: PARENT_CLAIMING_TOKEN
      targetPath: parent.claiming.token
    - kind: Secret
      name: netdata-secrets
      valuesKey: PARENT_CLAIMING_ROOMS
      targetPath: parent.claiming.rooms
    - kind: Secret
      name: netdata-secrets
      valuesKey: CHILD_CLAIMING_TOKEN
      targetPath: child.claiming.token
    - kind: Secret
      name: netdata-secrets
      valuesKey: CHILD_CLAIMING_ROOMS
      targetPath: child.claiming.rooms
  values:
    image:
      repository: netdata/netdata
      # renovate: datasource=docker depName=netdata/netdata
      tag: v2.10.3
      pullPolicy: IfNotPresent
    ingress:
      enabled: false
    parent:
      claiming:
        enabled: true
      env:
        DO_NOT_TRACK: 1
      database:
        storageclass: openebs-hostpath
        volumesize: 5Gi
      alarms:
        storageclass: openebs-hostpath
        volumesize: 1Gi
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 1Gi
    child:
      claiming:
        enabled: true
      env:
        DO_NOT_TRACK: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
    k8sState:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
