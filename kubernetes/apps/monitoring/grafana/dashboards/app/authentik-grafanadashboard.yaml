---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
# Upstream: https://grafana.com/grafana/dashboards/14837
# Pulled verbatim and surfaced via ConfigMap (matches dragonflydb/litellm pattern).
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: authentik
  namespace: monitoring
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: vmsingle
      inputName: DS_PROMETHEUS
  configMapRef:
    name: authentik-dashboard
    key: authentik-dashboard.json
