---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - victorialogs-configmap.yaml
  - victorialogs-grafanadashboard.yaml
  - tetragon-configmap.yaml
  - tetragon-grafanadashboard.yaml
  - vm-dashboards.yaml
  - traefik-dashboards.yaml
  - homebridge-grafanadashboard.yaml
  - amd-gpu-grafanadashboards.yaml
  - dragonflydb-grafanadashboard.yaml
  # Note: the CloudNativePG GrafanaDashboard CR lives in
  # `kubernetes/apps/databases/cloudnative-pg/cluster/grafanadashboard.yaml`
  # because its source ConfigMap (cnpg-grafana-dashboard) is in the
  # `databases` namespace and the CRD's `configMapRef` is a
  # LocalObjectReference (no cross-namespace field).
  # `allowCrossNamespaceImport: true` lets the Grafana Operator pick it up.
configMapGenerator:
  - name: amd-gpu-overview-dashboard
    files:
      - amd-gpu-overview-dashboard.json
  - name: amd-gpu-detail-dashboard
    files:
      - amd-gpu-detail-dashboard.json
  - name: amd-gpu-node-dashboard
    files:
      - amd-gpu-node-dashboard.json
  - name: dragonflydb-dashboard
    files:
      - dragonflydb-dashboard.json
generatorOptions:
  disableNameSuffixHash: true
