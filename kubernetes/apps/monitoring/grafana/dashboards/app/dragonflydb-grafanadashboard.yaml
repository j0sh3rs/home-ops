---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
# Upstream dashboard from
# https://github.com/dragonflydb/dragonfly/blob/main/tools/local/monitoring/grafana/provisioning/dashboards/dragonfly.json
# Pulled into the repo verbatim and surfaced as a ConfigMap-generated CR
# (matches the tetragon / amd-gpu dashboard pattern).
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: dragonflydb
  namespace: monitoring
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: vmsingle
      inputName: DS_PROMETHEUS
  configMapRef:
    name: dragonflydb-dashboard
    key: dragonflydb-dashboard.json
