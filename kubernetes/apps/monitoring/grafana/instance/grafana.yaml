---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    grafana.internal/instance: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      feedback_links_enabled: "false"
      reporting_enabled: "false"
    # Grafana trusts the X-Forwarded-User header set by the Traefik
    # google-oidc-secure middleware (plugin: lukaszraczylo/traefikoidc,
    # see kubernetes/components/traefik-oidc/google-oidc-secure.yaml).
    # All external ingress transits that middleware via the HTTPRoute
    # filter in instance/httproute.yaml, and there is no Service-level
    # path that bypasses it, so the auth_proxy whitelist is safe to
    # scope to the cluster pod CIDR. Google OIDC identity (email)
    # becomes the Grafana username; auto_sign_up creates the Grafana
    # account on first login.
    auth:
      # Hide the /login form to force OIDC-only. The admin credential
      # can still sign in via POST /login?disableLoginForm=false if
      # needed during emergencies.
      disable_login_form: "true"
      # Send the Grafana logout action through Traefik's logout handler
      # so the OIDC session cookie is cleared at the same time.
      signout_redirect_url: /oauth2/logout
    auth.anonymous:
      enabled: "false"
    auth.proxy:
      enabled: "true"
      header_name: X-Forwarded-User
      header_property: email
      auto_sign_up: "true"
      # Additional headers the proxy trusts. The traefikoidc plugin emits
      # X-Forwarded-User (email) and X-Forwarded-Name (Google `name` claim,
      # via the headers template in components/traefik-oidc/google-oidc-secure.yaml).
      # The space-separated `Property:Header` pairs populate matching fields
      # on the Grafana user on sign-up and every sync_ttl refresh.
      headers: "Name:X-Forwarded-Name Email:X-Forwarded-User"
      # Cilium native routing preserves source IP; the Traefik DaemonSet
      # pods live in the cluster pod CIDR.
      whitelist: 10.42.0.0/16
      # Issue a Grafana login token on first proxy-authed request so the
      # header isn't re-read on every subsequent request.
      enable_login_token: "true"
      # Re-sync user metadata (name/email) from the header every 60s.
      sync_ttl: "60"
    users:
      # Auto-created users (from auth.proxy.auto_sign_up) land as org
      # Admin. Safe because the Traefik middleware's allowedUsers list
      # only permits j0sh3rs@gmail.com to complete OIDC at all.
      auto_assign_org_role: Admin
    log:
      mode: console
    metrics:
      enabled: "true"
    news:
      news_feed_enabled: "false"
    plugins:
      plugin_admin_enabled: "true"
      allow_loading_unsigned_plugins: "victoriametrics-logs-datasource"
    security:
      angular_support_enabled: "true"
    server:
      enable_gzip: "true"
      root_url: https://grafana.68cc.io
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-password
                      key: GF_SECURITY_ADMIN_PASSWORD
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-pvc
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 30Gi
      storageClassName: openebs-hostpath
  disableDefaultSecurityContext: All
