---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: infrastructure-health-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    # Flux GitOps Controllers
    - name: flux-controllers
      interval: 30s
      rules:
        - alert: FluxControllerDown
          expr: |
            kube_deployment_status_replicas_available{namespace="flux-system", deployment=~"(helm-controller|kustomize-controller|notification-controller|source-controller)"} == 0
          for: 5m
          labels:
            severity: critical
            component: gitops
          annotations:
            summary: "Flux controller {{ $labels.deployment }} is unavailable"
            description: "The Flux controller {{ $labels.deployment }} in namespace {{ $labels.namespace }} has no available replicas for more than 5 minutes. GitOps operations may be impacted."

        - alert: FluxOperatorDown
          expr: |
            kube_deployment_status_replicas_available{namespace="flux-system", deployment="flux-operator"} == 0
          for: 5m
          labels:
            severity: critical
            component: gitops
          annotations:
            summary: "Flux Operator is unavailable"
            description: "The Flux Operator in namespace flux-system has no available replicas for more than 5 minutes. This may prevent GitOps reconciliation."

        - alert: FluxReconciliationFailure
          expr: |
            increase(gotk_reconcile_condition{type="Ready", status="False"}[10m]) > 5
          for: 10m
          labels:
            severity: warning
            component: gitops
          annotations:
            summary: "High Flux reconciliation failure rate"
            description: "Flux resource {{ $labels.name }} in namespace {{ $labels.namespace }} has failed reconciliation more than 5 times in the last 10 minutes."

    # Certificate Management
    - name: cert-manager
      interval: 30s
      rules:
        - alert: CertManagerDown
          expr: |
            kube_deployment_status_replicas_available{namespace="cert-manager", deployment=~"(cert-manager|cert-manager-cainjector|cert-manager-webhook)"} == 0
          for: 5m
          labels:
            severity: critical
            component: certificates
          annotations:
            summary: "cert-manager component {{ $labels.deployment }} is unavailable"
            description: "The cert-manager component {{ $labels.deployment }} has no available replicas for more than 5 minutes. Certificate operations may be impacted."

        - alert: CertificateExpiringSoon
          expr: |
            certmanager_certificate_expiration_timestamp_seconds - time() < (7 * 24 * 60 * 60)
          for: 1h
          labels:
            severity: warning
            component: certificates
          annotations:
            summary: "Certificate {{ $labels.name }} expiring soon"
            description: "Certificate {{ $labels.name }} in namespace {{ $labels.namespace }} will expire in less than 7 days."

        - alert: CertificateNotReady
          expr: |
            certmanager_certificate_ready_status{condition="False"} == 1
          for: 15m
          labels:
            severity: warning
            component: certificates
          annotations:
            summary: "Certificate {{ $labels.name }} is not ready"
            description: "Certificate {{ $labels.name }} in namespace {{ $labels.namespace }} has been in a not-ready state for more than 15 minutes."

    # Cluster Networking
    - name: networking
      interval: 30s
      rules:
        - alert: CoreDNSDown
          expr: |
            kube_deployment_status_replicas_available{namespace="kube-system", deployment="coredns"} == 0
          for: 3m
          labels:
            severity: critical
            component: networking
          annotations:
            summary: "CoreDNS is unavailable"
            description: "CoreDNS has no available replicas for more than 3 minutes. DNS resolution in the cluster will fail."

        - alert: CiliumOperatorDown
          expr: |
            kube_deployment_status_replicas_available{namespace="kube-system", deployment="cilium-operator"} == 0
          for: 5m
          labels:
            severity: critical
            component: networking
          annotations:
            summary: "Cilium Operator is unavailable"
            description: "Cilium Operator has no available replicas for more than 5 minutes. CNI operations may be impacted."

        - alert: CiliumAgentDown
          expr: |
            kube_daemonset_status_number_ready{namespace="kube-system", daemonset="cilium"} < kube_daemonset_status_desired_number_scheduled{namespace="kube-system", daemonset="cilium"}
          for: 5m
          labels:
            severity: critical
            component: networking
          annotations:
            summary: "Cilium agents not running on all nodes"
            description: "{{ $value }} Cilium agent pods are not running. Expected: {{ $labels.desired }}. Pod networking may be degraded on some nodes."

    # Ingress and Gateway
    - name: gateways
      interval: 30s
      rules:
        - alert: TraefikDown
          expr: |
            kube_daemonset_status_number_ready{namespace="network", daemonset="traefik"} == 0
          for: 5m
          labels:
            severity: critical
            component: ingress
          annotations:
            summary: "Traefik ingress controller is unavailable"
            description: "Traefik has no ready pods for more than 5 minutes. External access to all services may be impacted."

    # Storage
    - name: storage
      interval: 30s
      rules:
        - alert: PersistentVolumeFillingUp
          expr: |
            (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.85
          for: 15m
          labels:
            severity: warning
            component: storage
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} is filling up"
            description: "PersistentVolumeClaim {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is {{ $value | humanizePercentage }} full."

        - alert: PersistentVolumeCritical
          expr: |
            (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.95
          for: 5m
          labels:
            severity: critical
            component: storage
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} is critically full"
            description: "PersistentVolumeClaim {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is {{ $value | humanizePercentage }} full. Immediate action required."

    # Node Health
    - name: nodes
      interval: 30s
      rules:
        - alert: NodeNotReady
          expr: |
            kube_node_status_condition{condition="Ready", status="true"} == 0
          for: 5m
          labels:
            severity: critical
            component: nodes
          annotations:
            summary: "Node {{ $labels.node }} is not ready"
            description: "Node {{ $labels.node }} has been in a NotReady state for more than 5 minutes."

        - alert: NodeMemoryPressure
          expr: |
            kube_node_status_condition{condition="MemoryPressure", status="true"} == 1
          for: 5m
          labels:
            severity: warning
            component: nodes
          annotations:
            summary: "Node {{ $labels.node }} has memory pressure"
            description: "Node {{ $labels.node }} is experiencing memory pressure for more than 5 minutes."

        - alert: NodeDiskPressure
          expr: |
            kube_node_status_condition{condition="DiskPressure", status="true"} == 1
          for: 5m
          labels:
            severity: warning
            component: nodes
          annotations:
            summary: "Node {{ $labels.node }} has disk pressure"
            description: "Node {{ $labels.node }} is experiencing disk pressure for more than 5 minutes."

    # Discrete GPU (AMD Navi 48 / RX 9070 XT on bigboi-jms-01, RDNA4/gfx1201).
    # Metrics from amd-device-metrics-exporter (configmap MetricsFieldPrefix
    # "amd_"; field GPU_X -> metric amd_gpu_x). Label set matches the bundled
    # AMD dashboards (kube-system/amd-gpu/*.json): hostname / gpu_id / gpu_uuid
    # / card_model — NOT the kube "node" label, so descriptions key on
    # $labels.hostname. The dashboards gate amd_gpu_junction_temperature behind
    # the Instinct card_model list; the 9070 XT is a consumer card and reports
    # amd_gpu_edge_temperature, so edge is the reliable critical path here and
    # junction is a best-effort bonus that no-ops if the field is unset.
    # Thresholds CONSERVATIVE until load-bench run on 9070 XT (prior data was
    # 6900 XT: idle 27-29C/61W, peak 53C/161W). Re-tune after first bench.
    #   Navi 48 edge throttle ~110C, junction hotspot ~120C.
    #   Warn=80C, Crit=100C (pre-throttle, to be tightened post-bench).
    - name: gpu
      interval: 30s
      rules:
        - alert: GPUEdgeTemperatureCritical
          expr: |
            amd_gpu_edge_temperature > 100
          for: 2m
          labels:
            severity: critical
            component: gpu
          annotations:
            summary: "GPU edge temperature critical on {{ $labels.hostname }}"
            description: "AMD GPU edge temperature on {{ $labels.hostname }} has exceeded 100C for more than 2 minutes — approaching the ~110C throttle point. Check airflow and reduce GPU workload immediately. Threshold is conservative pending 9070 XT load bench."

        - alert: GPUEdgeTemperatureHigh
          expr: |
            amd_gpu_edge_temperature > 80
          for: 5m
          labels:
            severity: warning
            component: gpu
          annotations:
            summary: "GPU edge temperature high on {{ $labels.hostname }}"
            description: "AMD GPU edge temperature on {{ $labels.hostname }} has exceeded 80C for more than 5 minutes. Threshold is conservative pending 9070 XT load bench — re-tune once idle/peak baseline is established."

        # No GPUJunctionTemperatureCritical: amd_gpu_junction_temperature is
        # gated to Instinct card_models in the exporter, and the 9070 XT
        # reports card_model="" — the metric never populates on this card, so
        # an alert on it would be permanently dead. Edge temperature above is
        # the authoritative thermal signal for this consumer GPU.
        - alert: GPUPackagePowerHigh
          expr: |
            amd_gpu_average_package_power > 320
          for: 5m
          labels:
            severity: warning
            component: gpu
          annotations:
            summary: "GPU package power high on {{ $labels.hostname }}"
            description: "AMD GPU average package power draw on {{ $labels.hostname }} has exceeded 320W for more than 5 minutes (304W TDP). Sustained over-budget draw — check for runaway inference load. NOTE: verify metric name post-install; 6900 XT exposed amd_gpu_average_package_power — confirm same on 9070 XT."

        - alert: GPUMetricsExporterDown
          expr: |
            count(up{job=~".*amd.*metrics.*"} == 1) == 0
          for: 10m
          labels:
            severity: warning
            component: gpu
          annotations:
            summary: "AMD GPU metrics exporter is not reporting"
            description: "No amd-device-metrics-exporter target has been up for 10 minutes. GPU thermal and power alerts are blind until this recovers (gpuagent.sock may be down on the dgpu node)."
