---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    receiver: discord
    # Re-notify on long-running critical conditions every 4h (was 12h) so a
    # persistent outage doesn't go quiet after a single notification.
    repeatInterval: 4h
    routes:
      - receiver: blackhole
        matchers:
          - name: alertname
            value: Watchdog
            matchType: =
      - receiver: blackhole
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      # Parity-soak gate (home-ops-c51): vmalert stamps alerts with the
      # externalLabel alertSource=vmalert. Blackhole them so Discord isn't
      # double-paged while Prom alerting is still live. Drop this route
      # when Prom is decommissioned in home-ops-8bb.
      - receiver: blackhole
        matchers:
          - name: alertSource
            value: vmalert
            matchType: =
      - receiver: discord
        matchers:
          - name: severity
            value: critical
            matchType: =
    groupBy:
      - alertname
      - cluster
      - job
    groupInterval: 5m
    groupWait: 1m

  inhibitRules:
    - equal:
        - alertname
        - namespace
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =

  receivers:
    - name: blackhole
    - name: discord
      discordConfigs:
        - apiURL:
            name: alertmanager-secret
            key: DISCORD_WEBHOOK_URL
