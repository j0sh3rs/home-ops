---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    receiver: discord
    # Re-notify on long-running critical conditions every 4h (was 12h) so a
    # persistent outage doesn't go quiet after a single notification.
    repeatInterval: 4h
    routes:
      - receiver: blackhole
        matchers:
          - name: alertname
            value: Watchdog
            matchType: =
      - receiver: blackhole
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      # Decom gate (home-ops-8bb stage 1): vmalert is now primary pager.
      # Prom is still scraping and evaluating but its notifications must go
      # nowhere to avoid duplicates. Prom alerts carry the external label
      # prometheus=monitoring/prometheus; vmalert alerts have either no
      # prometheus label or prometheus=monitoring/vmagent. Blackholing on
      # the Prom label lets vmalert reach Discord while Prom goes quiet.
      # Drop this route entirely when kube-prometheus-stack Prometheus is
      # deleted later in 8bb (stage 2).
      - receiver: blackhole
        matchers:
          - name: prometheus
            value: monitoring/prometheus
            matchType: =
      - receiver: discord
        matchers:
          - name: severity
            value: critical
            matchType: =
    groupBy:
      - alertname
      - cluster
      - job
    groupInterval: 5m
    groupWait: 1m

  inhibitRules:
    - equal:
        - alertname
        - namespace
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =

  receivers:
    - name: blackhole
    - name: discord
      discordConfigs:
        - apiURL:
            name: alertmanager-secret
            key: DISCORD_WEBHOOK_URL
