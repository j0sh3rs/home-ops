---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: security-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    # Tetragon Runtime Security (Replaces Wazuh auditd monitoring)
    - name: tetragon-runtime-security
      interval: 30s
      rules:
        # Privilege Escalation Detection (Wazuh rule 80721 equivalent)
        - alert: PrivilegeEscalationDetected
          expr: |
            sum by (namespace, pod, binary, workload) (
              rate(tetragon_policy_events_total{
                policy="monitor-privilege-escalation",
                hook=~"kprobe:sys_setuid|kprobe:sys_setgid"
              }[5m])
            ) > 0
          for: 1m
          labels:
            severity: critical
            component: security
            mitre_attack: "T1548"
          annotations:
            summary: "Privilege escalation attempt detected in {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Process {{ $labels.binary }} in workload {{ $labels.workload }} attempted privilege escalation via setuid/setgid syscalls. This matches Wazuh rule 80721 (ANOM_ROOT_TRANS)."

        # Sensitive File Access (Wazuh rule 80713 equivalent)
        - alert: SensitiveFileAccessed
          expr: |
            sum by (namespace, pod, binary, workload) (
              rate(tetragon_policy_events_total{
                policy="monitor-sensitive-files",
                hook="kprobe:security_file_open"
              }[5m])
            ) > 0
          for: 1m
          labels:
            severity: high
            component: security
            mitre_attack: "T1003"
          annotations:
            summary: "Sensitive file accessed in {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Process {{ $labels.binary }} in workload {{ $labels.workload }} accessed sensitive system files (e.g., /etc/passwd, /etc/shadow, /etc/sudoers, SSH keys). This matches Wazuh rule 80713 (file security monitoring)."

        # Abnormal Process Execution (Wazuh rule 80712 equivalent)
        - alert: AbnormalProcessExecution
          expr: |
            sum by (namespace, pod, binary, workload) (
              rate(tetragon_events_total{
                type="PROCESS_EXEC",
                binary=~".*/tmp/.*|.*/dev/shm/.*"
              }[5m])
            ) > 0
          for: 1m
          labels:
            severity: high
            component: security
            mitre_attack: "T1204"
          annotations:
            summary: "Suspicious process execution in {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Process {{ $labels.binary }} in workload {{ $labels.workload }} executed from suspicious location (tmp or shared memory). This matches Wazuh rule 80712 (ANOM_EXEC)."

        # Network Anomaly Detection (Wazuh rule 80710 equivalent)
        - alert: SuspiciousNetworkActivity
          expr: |
            sum by (namespace, pod, binary, workload) (
              rate(tetragon_policy_events_total{
                policy="monitor-network-egress",
                hook="kprobe:tcp_connect"
              }[5m])
            ) > 10
          for: 2m
          labels:
            severity: warning
            component: security
            mitre_attack: "T1071"
          annotations:
            summary: "High volume of network connections in {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Process {{ $labels.binary }} in workload {{ $labels.workload }} made {{ $value }} TCP connections in 5 minutes. This may indicate suspicious network activity. This matches Wazuh rule 80710 (network monitoring)."

        # Multiple Authentication Failures (Wazuh rule 40111 equivalent)
        - alert: RepeatedAuthenticationFailures
          expr: |
            sum by (namespace, pod, binary, workload) (
              rate(tetragon_events_total{
                type="PROCESS_EXEC",
                binary=~".*su|.*sudo|.*ssh"
              }[2m])
            ) > 5
          for: 2m
          labels:
            severity: warning
            component: security
            mitre_attack: "T1110"
          annotations:
            summary: "Repeated authentication attempts in {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "{{ $value }} authentication-related process executions ({{ $labels.binary }}) in workload {{ $labels.workload }} detected in 2 minutes. Possible brute force attempt. This matches Wazuh rule 40111 (authentication_failed frequency)."

    # Kubernetes RBAC and Authorization
    - name: rbac-security
      interval: 30s
      rules:
        - alert: DeniedAPIAccessAttempts
          expr: |
            sum by (verb, resource) (rate(apiserver_audit_event_total{annotations_authorization_k8s_io_decision="forbid"}[5m])) > 5
          for: 5m
          labels:
            severity: warning
            component: security
          annotations:
            summary: "Denied API access attempts on {{ $labels.resource }}"
            description: "Detected {{ $value }} denied API requests per second for {{ $labels.verb }} {{ $labels.resource }}. Possible unauthorized access attempt."

        - alert: ServiceAccountTokenLeaked
          expr: |
            increase(apiserver_audit_event_total{user=~"system:serviceaccount:.*", verb="create", objectRef_resource="secrets"}[10m]) > 5
          for: 5m
          labels:
            severity: critical
            component: security
          annotations:
            summary: "Suspicious service account secret creation"
            description: "Service account {{ $labels.user }} has created {{ $value }} secrets in the last 10 minutes. Possible token leak or compromise."

    # Pod Security Standards
    - name: pod-security
      interval: 30s
      rules:
        - alert: PrivilegedContainerStarted
          expr: |
            kube_pod_container_status_running{container!~".*(cilium|wazuh).*"} == 1
            and on(namespace, pod, container)
            kube_pod_container_info{container_privileged="true"}
          for: 5m
          labels:
            severity: warning
            component: security
          annotations:
            summary: "Privileged container running: {{ $labels.container }}"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} (namespace: {{ $labels.namespace }}) is running in privileged mode."

        - alert: HostNetworkPodRunning
          expr: |
            kube_pod_spec_host_network{pod!~".*(cilium|wazuh|kube-proxy|tetragon).*"} == 1
          for: 10m
          labels:
            severity: warning
            component: security
          annotations:
            summary: "Pod using host network: {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is using host network for more than 10 minutes."

        - alert: HostPathVolumeUsed
          expr: |
            kube_pod_spec_volumes_persistentvolumeclaims_info == 0
            and on(namespace, pod)
            kube_pod_spec_volumes_hostpath_info{pod!~".*(cilium|wazuh|node-exporter|tetragon|openebs).*"}
          for: 10m
          labels:
            severity: warning
            component: security
          annotations:
            summary: "Pod using hostPath volume: {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is using a hostPath volume, which provides access to the host filesystem."

    # Secret Access Monitoring
    - name: secrets-security
      interval: 30s
      rules:
        - alert: SecretAccessSpike
          expr: |
            sum by (namespace) (rate(apiserver_audit_event_total{objectRef_resource="secrets", verb=~"get|list"}[5m])) > 5
          for: 10m
          labels:
            severity: warning
            component: security
          annotations:
            summary: "High secret access rate in namespace {{ $labels.namespace }}"
            description: "Detected {{ $value }} secret access requests per second in namespace {{ $labels.namespace }}. Possible enumeration attack."

        - alert: SecretDeletionAttempt
          expr: |
            sum by (namespace) (
              increase(apiserver_audit_event_total{objectRef_resource="secrets", verb="delete", namespace!~"flux-system|kube-system|cert-manager|velero"}[5m])
            ) > 3
          for: 5m
          labels:
            severity: warning
            component: security
          annotations:
            summary: "Elevated secret deletion in namespace {{ $labels.namespace }}"
            description: "{{ $value }} secret(s) deleted in namespace {{ $labels.namespace }} in the last 5 minutes. Verify if this is authorized."

    # Image Security
    - name: image-security
      interval: 30s
      rules:
        - alert: ImagePullBackOff
          expr: |
            kube_pod_container_status_waiting_reason{reason="ImagePullBackOff"} == 1
          for: 10m
          labels:
            severity: warning
            component: security
          annotations:
            summary: "Container {{ $labels.container }} failing to pull image"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} (namespace: {{ $labels.namespace }}) has been unable to pull its image for 10 minutes. Possible registry authentication issue or malicious image blocking."

        - alert: ContainerUsingLatestTag
          expr: |
            kube_pod_container_info{image=~".*:latest"}
          for: 1h
          labels:
            severity: info
            component: security
          annotations:
            summary: "Container using :latest tag: {{ $labels.container }}"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} (namespace: {{ $labels.namespace }}) is using the :latest image tag. This is not recommended for production."

    # Network Security
    - name: network-security
      interval: 30s
      rules:
        - alert: ServiceExposedWithoutNetworkPolicy
          expr: |
            kube_service_info{type!="ClusterIP"}
            unless on(namespace)
            kube_networkpolicy_labels
          for: 1h
          labels:
            severity: warning
            component: security
          annotations:
            summary: "Service {{ $labels.service }} exposed without NetworkPolicy"
            description: "Service {{ $labels.service }} in namespace {{ $labels.namespace }} is exposed ({{ $labels.type }}) but the namespace has no NetworkPolicies defined."

        - alert: LoadBalancerServiceCreated
          expr: |
            increase(kube_service_created{type="LoadBalancer"}[5m]) > 0
          for: 1m
          labels:
            severity: warning
            component: security
          annotations:
            summary: "New LoadBalancer service created"
            description: "A new LoadBalancer service was created. Verify this is authorized as it exposes services externally."

    # Audit and Compliance
    - name: compliance
      interval: 30s
      rules:
        - alert: PodSecurityStandardViolation
          expr: |
            increase(pod_security_evaluations_total{decision="deny"}[10m]) > 0
          for: 1m
          labels:
            severity: warning
            component: security
          annotations:
            summary: "Pod Security Standard violation detected"
            description: "{{ $value }} pod(s) violated Pod Security Standards in the last 10 minutes. Review security policies."

        - alert: AuditLogErrors
          expr: |
            rate(apiserver_audit_error_total[5m]) > 0.1
          for: 10m
          labels:
            severity: warning
            component: security
          annotations:
            summary: "Kubernetes audit logging errors"
            description: "API server is experiencing audit log errors at {{ $value }} per second. Audit trail may be incomplete."
