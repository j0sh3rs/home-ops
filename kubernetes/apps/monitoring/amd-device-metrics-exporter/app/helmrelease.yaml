---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: amd-device-metrics-exporter
spec:
  interval: 1h
  chart:
    spec:
      chart: device-metrics-exporter-charts
      version: v1.5.0
      sourceRef:
        kind: HelmRepository
        name: amd-device-metrics-exporter
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    platform: k8s
    # Schedule ONLY on discrete-GPU nodes. The bundled gpuagent talks to the
    # GPU via amd-smi, which does NOT enumerate the integrated Raven/Cezanne
    # APUs on the bee-* nodes — so the family=RV selector used previously put
    # the DaemonSet on three nodes where gpuagent.sock never comes up
    # (`connection refused`, metrics endpoint serves only promhttp internals).
    # node.kubernetes.io/gpu-tier=dgpu is set in talconfig.yaml only on the
    # Navi 21 (RX 6900 XT) node, which amd-smi fully supports.
    nodeSelector:
      node.kubernetes.io/gpu-tier: dgpu
    # Image tag tracked by Renovate via the helm chart bump (chart appVersion
    # == image tag). Keep explicit so that any drift between chart and image
    # is visible.
    image:
      repository: docker.io/rocm/device-metrics-exporter
      tag: v1.5.0
      pullPolicy: IfNotPresent
    monitor:
      resources:
        gpu: true
        nic: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 512Mi
    service:
      type: ClusterIP
      ClusterIP:
        port: 5000
    # vmagent picks this up via its `selectAllByDefault: true` setting
    # (see kubernetes/apps/monitoring/victoria-metrics/app/vmagent.yaml).
    # No extra label match required.
    serviceMonitor:
      enabled: true
      interval: "30s"
      honorLabels: true
      honorTimestamps: true
