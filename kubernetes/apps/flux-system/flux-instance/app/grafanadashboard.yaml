---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: flux-k8s-api-performance
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: thanos
  # renovate: datasource=github-releases depName=controlplaneio-fluxcd/flux-operator
  url: https://raw.githubusercontent.com/controlplaneio-fluxcd/flux-operator/v0.50.0/config/monitoring/dashboards/flux-k8s-api-performance.json
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: flux-performance
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: thanos
  # renovate: datasource=github-releases depName=controlplaneio-fluxcd/flux-operator
  url: https://raw.githubusercontent.com/controlplaneio-fluxcd/flux-operator/v0.50.0/config/monitoring/dashboards/flux-performance.json
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: flux-cluster
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: thanos
  # fluxcd/flux2-monitoring-example publishes no tagged releases, so the
  # URL is pinned to a commit SHA. Renovate's git-refs datasource bumps
  # the SHA when upstream pushes to main; review each PR before merge.
  # renovate: datasource=git-refs depName=fluxcd/flux2-monitoring-example packageName=https://github.com/fluxcd/flux2-monitoring-example branch=main
  url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/7ab65dc8b90f7a6751d88f18bbb4e1bee33bf334/monitoring/configs/dashboards/cluster.json
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: flux-control-plane
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: thanos
  # See above — same SHA-pinned upstream.
  # renovate: datasource=git-refs depName=fluxcd/flux2-monitoring-example packageName=https://github.com/fluxcd/flux2-monitoring-example branch=main
  url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/7ab65dc8b90f7a6751d88f18bbb4e1bee33bf334/monitoring/configs/dashboards/control-plane.json
