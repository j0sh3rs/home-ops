---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app crowdsec
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: crowdsec
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      # renovate: datasource=docker depName=crowdsecurity/crowdsec
      tag: v1.7.8
      repository: crowdsecurity/crowdsec
      pullPolicy: Always
    container_runtime: containerd
    # home-ops-b5w deferred: enabling tls triggered a chart bug where
    # Certificate.cert-manager.io "crowdsec-agent" rendered with
    # spec.secretTemplate: null, which cert-manager CRD rejects. Chart 0.23.0
    # issue. Internal .svc.cluster.local traffic is already protected by
    # Cilium eBPF masquerade, so TLS is a defense-in-depth polish — revisit
    # when the chart fixes secretTemplate handling or we pin the upstream
    # certificate with explicit values.
    config:
      config.yaml.local: |
        # home-ops: LAPI uses the shared CNPG postgres17 cluster (DB `crowdsec`)
        # instead of a local SQLite file on a PVC. Rationale:
        #   - eliminates the crowdsec-db PVC entirely (and the openebs-hostpath
        #     subPath-creation quirk that wedged the pod in
        #     CreateContainerConfigError on a freshly-provisioned volume);
        #   - kills SQLite-on-NFS WAL lock contention at the source — that was
        #     the original bouncer-disconnect bug that drove the abandoned
        #     hostpath migration (commit 81cd5383);
        #   - backups ride CNPG's existing Barman→S3, no separate PV snapshot.
        # CrowdSec's entgo ORM auto-migrates the SCHEMA on first connect, but
        # does NOT create the role/database — the crowdsec-init-db Job
        # (extraResources below) provisions those before LAPI starts.
        # ${CROWDSEC_DB_PASSWORD} is expanded by the chart's docker-start
        # script via the lapi.envFrom secret (same envsubst path as
        # ${REGISTRATION_TOKEN}).
        db_config:
          type: postgresql
          host: postgres-rw.databases.svc.cluster.local
          port: 5432
          user: crowdsec
          password: ${CROWDSEC_DB_PASSWORD}
          db_name: crowdsec
          sslmode: require
        api:
          server:
            auto_registration: # Enabled - using token-based authentication
              enabled: true
              token: "${REGISTRATION_TOKEN}" # /!\ Do not modify this variable (auto-generated and handled by the chart)
              allowed_ranges:
                - "127.0.0.1/32"
                - "10.42.0.0/16"
                - "10.43.0.0/16"
                - "192.168.35.0/24"
      # home-ops-euq: local whitelist parser mounted into agent pods at
      # /etc/crowdsec/parsers/s02-enrich/home-ops-whitelist.yaml. Runs after
      # parse + enrich stages, blanks out the Overflow stage for matching IPs.
      # crowdsecurity/whitelists already covers RFC1918 private ranges; this
      # adds pod CIDR, service CIDR, and a home-WAN-IP placeholder to flip.
      parsers:
        s02-enrich:
          home-ops-whitelist.yaml: |
            name: home-ops/local-whitelist
            description: "Whitelist cluster internals and known good operator IPs"
            whitelist:
              reason: "home-ops trusted ranges"
              ip:
                - "127.0.0.1"
              cidr:
                - "10.42.0.0/16"      # Cilium pod CIDR
                - "10.43.0.0/16"      # k8s service CIDR
                - "192.168.35.0/24"   # LAN
                - "100.0.186.56/32"   # home WAN IP
                # GitHub webhook hooks range — flux receiver gets OWASP CRS
                # OOB hits (rce/xss anomaly scores) from legitimate webhook
                # payloads. Source: https://api.github.com/meta > hooks[]
                - "140.82.112.0/20"
                - "143.55.64.0/20"
                - "192.30.252.0/22"
                - "185.199.108.0/22"
      # home-ops-8ew: trigger scenario that bans requests to ha.68cc.io
      # from outside US/CA. crowdsecurity/geoip-enrich populates
      # evt.Enriched.IsoCode from the MaxMind DB shipped with the agent.
      # Traefik-parsed events expose the hostname via Unmarshaled.traefik.
      # ServiceName; using Traefik's ServiceName label rather than host
      # header since the bouncer strips Host on internal routing.
      scenarios:
        local-geo-block-ha.yaml: |
          type: trigger
          name: home-ops/geo-block-ha
          description: "Ban non-US/CA access to Home Assistant (ha.68cc.io)"
          filter: |
            evt.Meta.log_type == 'http_access_log'
            && evt.Unmarshaled.traefik.RequestHost == 'ha.68cc.io'
            && evt.Enriched.IsoCode != ''
            && evt.Enriched.IsoCode not in ['US','CA']
          groupby: "evt.Meta.source_ip"
          blackhole: 30m
          labels:
            service: home-assistant
            type: geographic
            remediation: true
      # home-ops-ahz: Discord webhook notification for high-severity decisions.
      # The http notifier reads ${DISCORD_WEBHOOK_URL} from LAPI pod env via
      # lapi.envFrom -> alertmanager-secret reflected from monitoring ns.
      # profiles.yaml routes ban decisions for the brute-force + CVE + appsec
      # scenarios through the discord_default notifier while preserving the
      # default_ip_remediation behaviour for everything else.
      notifications:
        http.yaml: |
          type: http
          name: discord_default
          log_level: info
          format: |
            {
              "content": "🚨 CrowdSec ban — {{range . -}}{{$alert := .}}scenario=`{{.Scenario}}` source=`{{.Source.IP}}` ({{.Source.Scope}}) reason=`{{.Message}}` decisions={{range .Decisions}} {{.Type}} {{.Duration}}{{end}}{{end}}"
            }
          url: ${DISCORD_WEBHOOK_URL}
          method: POST
          headers:
            Content-Type: application/json
      profiles.yaml: |
        name: security_notify
        filters:
          - Alert.Remediation == true && Alert.GetScenario() in [
              "crowdsecurity/ssh-bf",
              "crowdsecurity/ssh-slow-bf",
              "crowdsecurity/http-cve-probing",
              "crowdsecurity/http-backdoors-attempts",
              "crowdsecurity/http-admin-interface-probing",
              "crowdsecurity/http-path-traversal-probing",
              "crowdsecurity/http-generic-bf",
              "crowdsecurity/appsec-native"
            ]
        notifications:
          - discord_default
        on_success: continue
        ---
        # AppSec (WAF) alerts ship with Alert.Remediation = false because
        # AppSec already returns 403 inline. That meant default_ip_remediation
        # skipped them — WAF hits were one-shot drops with no durable ban,
        # leaving `cscli decisions list --origin crowdsec` empty despite
        # real attacker IPs firing vpatch/CVE rules.
        # models.Alert has no GetType() method, so match scenario name
        # prefixes: vpatch-* (virtual patches), appsec-* (AppSec engine),
        # generic-* (generic waf rules) cover AppSec-origin alerts.
        name: appsec_ban
        filters:
          - |
            Alert.GetScope() == "Ip" && (
              Alert.GetScenario() startsWith "crowdsecurity/vpatch-" ||
              Alert.GetScenario() startsWith "crowdsecurity/appsec-" ||
              Alert.GetScenario() startsWith "crowdsecurity/generic-"
            )
        decisions:
          - type: ban
            duration: 4h
        notifications:
          - discord_default
        on_success: break
        ---
        name: default_ip_remediation
        filters:
          - Alert.Remediation == true && Alert.GetScope() == "Ip"
        decisions:
          - type: ban
            duration: 4h
        on_success: break
    lapi:
      enabled: true
      replicas: 1
      strategy:
        type: Recreate
      # home-ops-ahz: inject DISCORD_WEBHOOK_URL into the LAPI pod env so the
      # http notifier plugin can expand ${DISCORD_WEBHOOK_URL} at load time.
      # Source secret is alertmanager-secret in monitoring ns, mirrored into
      # security ns via Reflector annotations on the source.
      # crowdsec-lapi-secrets also carries CROWDSEC_DB_PASSWORD, expanded into
      # db_config.password in config.yaml.local (postgres backend).
      envFrom:
        - secretRef:
            name: alertmanager-secret
        - secretRef:
            name: crowdsec-lapi-secrets
      persistentVolume:
        # data PVC removed: LAPI state now lives in the shared CNPG postgres17
        # cluster (db_config in config.yaml.local). No local SQLite file → no
        # PVC, no openebs-hostpath subPath quirk, no WAL-lock contention.
        data:
          enabled: false
        # config PVC retained: holds generated local_api_credentials.yaml +
        # online_api_credentials.yaml. Small, read-mostly, survives reschedule.
        config:
          enabled: true
          storageClassName: nfs-client
          size: 250Mi
      service:
        type: ClusterIP
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      env:
        - name: ENROLL_KEY
          valueFrom:
            secretKeyRef:
              name: crowdsec-lapi-secrets
              key: enroll-key
        - name: ENROLL_INSTANCE_NAME
          value: "home-cluster"
        - name: ENROLL_TAGS
          value: "kubernetes homelab"
        - name: TZ
          value: "America/New_York"
        # Auto-register the traefik bouncer on startup. The chart's entrypoint
        # loops over env vars matching BOUNCER_KEY_* and runs
        # `cscli bouncers add <name> -k <key>` (name = everything after the
        # 2nd underscore → "traefik"). The bouncer API key is validated
        # against the LAPI DATABASE, not a config file — so a fresh DB
        # (postgres migration, or the earlier hostpath wipe) starts with an
        # EMPTY bouncer list and the traefik plugin gets 403
        # (CrowdSecBouncerNotConnected) until re-registered. register_bouncer
        # is idempotent (skips if the name already exists), so this is safe on
        # every restart. Key must match traefik-secrets/CROWDSEC_BOUNCER_KEY
        # in the network namespace (same pre-shared value).
        - name: BOUNCER_KEY_traefik
          valueFrom:
            secretKeyRef:
              name: crowdsec-bouncer-secrets
              key: traefik-bouncer-key
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 150m
          memory: 256Mi
    agent:
      # Only tail log sources for which we have a matching parser/collection
      # installed. Pruned 2026-05-04 after audit — previous setup tailed
      # victoria-logs, coredns, postgres17, dolt, and services/* catch-all,
      # but no collection parsed those programs. The agent pulled log
      # lines it could not use, wasting IO + parser CPU cycles.
      #
      # Active matches:
      #   traefik-*        -> crowdsecurity/traefik collection
      #   grafana-*        -> LePresidente/grafana collection
      #   home-assistant-* -> crowdsecurity/home-assistant collection
      #
      # Re-enable others if/when a matching collection is installed.
      acquisition:
        - namespace: "network"
          podName: "traefik-*"
          program: "traefik"
          poll_without_inotify: true
        - namespace: "monitoring"
          podName: "grafana-deployment-*"
          program: "grafana"
          poll_without_inotify: true
        - namespace: "services"
          podName: "home-assistant-*"
          program: "home-assistant"
          poll_without_inotify: true
      # additionalAcquisition:
      #   - source: victorialogs
      #     mode: tail
      #     url: http://victoria-logs-server.monitoring.svc.cluster.local:9428/
      #     query: k8s.container.name:traefik
      #     labels:
      #       type: traefik
      env:
        # Agent collections — chosen to match what we actually scrape.
        # Log-processing only (AppSec WAF collections belong under appsec.env
        # below, NOT here). References: CrowdSec Hub + docs audit 2026-05-04.
        #
        # Core HTTP coverage (all via the Traefik access-log acquisition):
        #   traefik                  : log format + base ingress scenarios
        #   base-http-scenarios      : scanner/probe detection (not a WAF)
        #   http-cve                 : known-CVE URI probes (e.g. CVE-2021-41773)
        #   http-dos                 : L7 DoS rate scenarios
        #   http-generic-bf          : generic auth bruteforce (required by
        #                              security_notify profile filter;
        #                              previously missing, so that rule
        #                              silently never matched)
        #
        # App-specific:
        #   LePresidente/grafana     : grafana auth bruteforce
        #   crowdsecurity/unifi      : UniFi syslog + portscan (pulls iptables,
        #                              sshd, dropbear-logs transitively)
        #   crowdsecurity/home-assistant : HA auth bruteforce
        #
        # Whitelisting (explicit, though whitelist-good-actors also pulls in
        # cdn-whitelist, seo-bots-whitelist, rdns postoverflows):
        #   whitelist-good-actors    : benign-bot allowlist
        #
        # NOT installed here intentionally:
        #   appsec-crs / appsec-crs-inband — these are WAF collections; they
        #     only apply inside the appsec process. Listing them on the agent
        #     wasted ~2MB of parsed rules with no effect.
        #   http-bf-wordpress_bf — no WordPress in this cluster.
        #   postgresql/mysql — cnpg + dolt don't use syslog format that the
        #     collection parses.
        - name: COLLECTIONS
          value: "crowdsecurity/traefik crowdsecurity/base-http-scenarios crowdsecurity/http-cve crowdsecurity/http-dos LePresidente/grafana crowdsecurity/unifi crowdsecurity/home-assistant crowdsecurity/whitelist-good-actors"
        # Standalone scenarios (not packaged into collections above).
        # http-generic-bf covers generic auth bruteforce against any HTTP
        # app; referenced by the security_notify profile.
        - name: SCENARIOS
          value: "crowdsecurity/http-generic-bf"
        # Parsers to install
        - name: PARSERS
          value: "crowdsecurity/cri-logs"
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 150m
          memory: 128Mi
      persistentVolume:
        config:
          enabled: true
          storageClassName: nfs-client
          size: 100Mi
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
    secrets:
      externalSecret:
        name: crowdsec-lapi-secrets
        registrationTokenKey: registrationToken
    appsec:
      acquisitions:
        # Multi-config: virtual patching runs in-band (blocks immediately),
        # OWASP CRS runs out-of-band (async analysis + bans on repeat via
        # the crowdsec-appsec-outofband scenario).
        # Ref: https://docs.crowdsec.net/docs/appsec/vpatch_and_crs/
        - appsec_configs:
            - crowdsecurity/appsec-default
            - crowdsecurity/crs
          labels:
            type: appsec
          listen_addr: 0.0.0.0:7422
          path: /
          source: appsec
      enabled: true
      env:
        # AppSec (WAF) collections — two-layer coverage per official guide
        # https://docs.crowdsec.net/docs/appsec/vpatch_and_crs/
        #
        # Layer 1 (inband, blocks immediately, near-zero false positives):
        #   appsec-virtual-patching  : known-CVE signatures, ~15 rules/month
        #   appsec-generic-rules     : generic SQLi/XSS/LFI patterns
        #
        # Layer 2 (out-of-band, evaluated async, bans repeat offenders via
        #   crowdsec-appsec-outofband scenario after 5+ matches):
        #   appsec-crs               : OWASP Core Rule Set — broad coverage
        #                              of the OWASP Top Ten with reasonable
        #                              FP rate since it doesn't auto-block.
        #
        # We previously used appsec-crs-inband which blocks *every* CRS
        # match. That's too aggressive for a homelab (high FP rate on
        # legitimate but unusual user agents / request patterns). Swapping
        # to the OOB variant keeps CRS detection without blocking valid
        # traffic — offenders get banned after repeated matches instead.
        - name: COLLECTIONS
          value: "crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules crowdsecurity/appsec-crs"
