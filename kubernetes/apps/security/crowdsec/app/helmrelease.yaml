---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app crowdsec
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: crowdsec
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      # renovate: datasource=docker depName=crowdsecurity/crowdsec
      tag: v1.7.7
      repository: crowdsecurity/crowdsec
      pullPolicy: Always
    container_runtime: containerd
    # home-ops-b5w: mutual TLS between agent/appsec/bouncer and LAPI. Chart
    # auto-provisions a self-signed ClusterIssuer (crowdsec-root-issuer) since
    # no issuerRef is supplied; internal service DNS names aren't valid LE
    # inputs. Bouncer secret is reflected into the `network` namespace so the
    # Traefik middleware can mount the CA cert from /etc/traefik/secrets.
    tls:
      enabled: true
      insecureSkipVerify: false
      agent:
        tlsClientAuth: true
      appsec:
        tlsClientAuth: true
      certManager:
        enabled: true
      bouncer:
        reflector:
          namespaces:
            - network
    config:
      config.yaml.local: |
        api:
          server:
            auto_registration: # Enabled - using token-based authentication
              enabled: true
              token: "${REGISTRATION_TOKEN}" # /!\ Do not modify this variable (auto-generated and handled by the chart)
              allowed_ranges:
                - "127.0.0.1/32"
                - "10.42.0.0/16"
                - "10.43.0.0/16"
                - "192.168.35.0/24"
      # home-ops-euq: local whitelist parser mounted into agent pods at
      # /etc/crowdsec/parsers/s02-enrich/home-ops-whitelist.yaml. Runs after
      # parse + enrich stages, blanks out the Overflow stage for matching IPs.
      # crowdsecurity/whitelists already covers RFC1918 private ranges; this
      # adds pod CIDR, service CIDR, and a home-WAN-IP placeholder to flip.
      parsers:
        s02-enrich:
          home-ops-whitelist.yaml: |
            name: home-ops/local-whitelist
            description: "Whitelist cluster internals and known good operator IPs"
            whitelist:
              reason: "home-ops trusted ranges"
              ip:
                - "127.0.0.1"
                # - "203.0.113.4"  # TODO: set to home WAN IP post-commit
              cidr:
                - "10.42.0.0/16"      # Cilium pod CIDR
                - "10.43.0.0/16"      # k8s service CIDR
                - "192.168.35.0/24"   # LAN
      # home-ops-8ew: trigger scenario that bans requests to ha.68cc.io
      # from outside US/CA. crowdsecurity/geoip-enrich populates
      # evt.Enriched.IsoCode from the MaxMind DB shipped with the agent.
      # Traefik-parsed events expose the hostname via Unmarshaled.traefik.
      # ServiceName; using Traefik's ServiceName label rather than host
      # header since the bouncer strips Host on internal routing.
      scenarios:
        local-geo-block-ha.yaml: |
          type: trigger
          name: home-ops/geo-block-ha
          description: "Ban non-US/CA access to Home Assistant (ha.68cc.io)"
          filter: |
            evt.Meta.log_type == 'http_access_log'
            && evt.Unmarshaled.traefik.RequestHost == 'ha.68cc.io'
            && evt.Enriched.IsoCode != ''
            && evt.Enriched.IsoCode not in ['US','CA']
          groupby: "evt.Meta.source_ip"
          blackhole: 30m
          labels:
            service: home-assistant
            type: geographic
            remediation: true
      # home-ops-ahz: Discord webhook notification for high-severity decisions.
      # The http notifier reads ${DISCORD_WEBHOOK_URL} from LAPI pod env via
      # lapi.envFrom -> alertmanager-secret reflected from monitoring ns.
      # profiles.yaml routes ban decisions for the brute-force + CVE + appsec
      # scenarios through the discord_default notifier while preserving the
      # default_ip_remediation behaviour for everything else.
      notifications:
        http.yaml: |
          type: http
          name: discord_default
          log_level: info
          format: |
            {
              "content": "🚨 CrowdSec ban — {{range . -}}{{$alert := .}}scenario=`{{.Scenario}}` source=`{{.Source.IP}}` ({{.Source.Scope}}) reason=`{{.Message}}` decisions={{range .Decisions}} {{.Type}} {{.Duration}}{{end}}{{end}}"
            }
          url: ${DISCORD_WEBHOOK_URL}
          method: POST
          headers:
            Content-Type: application/json
      profiles.yaml: |
        name: security_notify
        filters:
          - Alert.Remediation == true && Alert.GetScenario() in [
              "crowdsecurity/ssh-bf",
              "crowdsecurity/ssh-slow-bf",
              "crowdsecurity/http-cve-probing",
              "crowdsecurity/http-backdoors-attempts",
              "crowdsecurity/http-admin-interface-probing",
              "crowdsecurity/http-path-traversal-probing",
              "crowdsecurity/http-generic-bf",
              "crowdsecurity/appsec-native"
            ]
        notifications:
          - discord_default
        on_success: continue
        ---
        name: default_ip_remediation
        filters:
          - Alert.Remediation == true && Alert.GetScope() == "Ip"
        decisions:
          - type: ban
            duration: 4h
        on_success: break
    lapi:
      enabled: true
      replicas: 1
      strategy:
        type: Recreate
      # home-ops-ahz: inject DISCORD_WEBHOOK_URL into the LAPI pod env so the
      # http notifier plugin can expand ${DISCORD_WEBHOOK_URL} at load time.
      # Source secret is alertmanager-secret in monitoring ns, mirrored into
      # security ns via Reflector annotations on the source.
      envFrom:
        - secretRef:
            name: alertmanager-secret
      persistentVolume:
        data:
          enabled: true
          storageClassName: nfs-client
          size: 10Gi
        config:
          enabled: true
          storageClassName: nfs-client
          size: 250Mi
      service:
        type: ClusterIP
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      env:
        - name: ENROLL_KEY
          valueFrom:
            secretKeyRef:
              name: crowdsec-lapi-secrets
              key: enroll-key
        - name: ENROLL_INSTANCE_NAME
          value: "home-cluster"
        - name: ENROLL_TAGS
          value: "kubernetes homelab"
        - name: TZ
          value: "America/New_York"
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 150m
          memory: 256Mi
    agent:
      acquisition:
        - namespace: "network"
          podName: "traefik-*"
          program: "traefik"
          poll_without_inotify: true
        - namespace: "monitoring"
          podName: "grafana-deployment-*"
          program: "grafana"
          poll_without_inotify: true
        # Expanded coverage (home-ops-ei9). Each acquisition feeds the CRI-logs
        # parser; `program` label routes downstream to matching collections.
        - namespace: "monitoring"
          podName: "victoria-logs-*"
          program: "victoria-logs"
          poll_without_inotify: true
        - namespace: "kube-system"
          podName: "coredns-*"
          program: "coredns"
          poll_without_inotify: true
        - namespace: "databases"
          podName: "postgres17-*"
          program: "postgresql"
          poll_without_inotify: true
        - namespace: "databases"
          podName: "dolt-*"
          program: "dolt"
          poll_without_inotify: true
        - namespace: "services"
          podName: "*"
          program: "service"
          poll_without_inotify: true
      # additionalAcquisition:
      #   - source: victorialogs
      #     mode: tail
      #     url: http://victoria-logs-server.monitoring.svc.cluster.local:9428/
      #     query: k8s.container.name:traefik
      #     labels:
      #       type: traefik
      env:
        # home-ops-6ev: added home-assistant (ha.68cc.io backend) and http-dos
        # (generic L7 DoS scenarios for any published app). Considered `postgres`
        # and `whitelist-ingress-k8s` — neither exists upstream; default
        # crowdsecurity/whitelists already covers RFC1918 private ranges.
        - name: COLLECTIONS
          value: "crowdsecurity/traefik crowdsecurity/appsec-crs crowdsecurity/http-cve crowdsecurity/appsec-crs-inband crowdsecurity/base-http-scenarios LePresidente/grafana crowdsecurity/unifi crowdsecurity/home-assistant crowdsecurity/http-dos"
        # Parsers to install
        - name: PARSERS
          value: "crowdsecurity/cri-logs"
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 150m
          memory: 128Mi
      persistentVolume:
        config:
          enabled: true
          storageClassName: nfs-client
          size: 100Mi
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
    secrets:
      externalSecret:
        name: crowdsec-lapi-secrets
        registrationTokenKey: registrationToken
    appsec:
      acquisitions:
        - appsec_config: crowdsecurity/appsec-default
          labels:
            type: appsec
          listen_addr: 0.0.0.0:7422
          path: /
          source: appsec
      enabled: true
      env:
        # home-ops-gd7: appsec-crs-outofband does not exist upstream — hub
        # only publishes the inband variant. For FP observation, use the
        # existing inband CRS and rely on the Traefik bouncer's
        # crowdsecAppsecFailureBlock=false (current config) to keep OOB
        # semantics at the bouncer layer. Revisit via home-ops-bu8.
        - name: COLLECTIONS
          value: "crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules crowdsecurity/appsec-crs-inband"
