---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: crowdsec-lapi-metrics
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  folder: Security
  contentCacheDuration: 24h
  resyncPeriod: 24h
  datasources:
    - datasourceName: vmsingle
      inputName: DS_PROMETHEUS
  # crowdsecurity/grafana-dashboards publishes no tagged releases. URLs below
  # are pinned to a commit SHA; Renovate's git-refs datasource bumps the SHA
  # when upstream pushes to master. Review each PR before merge.
  # renovate: datasource=git-refs depName=crowdsecurity/grafana-dashboards packageName=https://github.com/crowdsecurity/grafana-dashboards branch=master
  url: https://raw.githubusercontent.com/crowdsecurity/grafana-dashboards/0d34f686930aab1f11562bdf664ffad60c567e39/dashboards_v5/LAPI%20Metrics.json
---
