---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oauth2-proxy
  annotations:
    # external-dns creates / updates the Cloudflare record for
    # auth.68cc.io → traefik-external VIP. Phase 6 handles the
    # Auth0 → cluster DNS cutover.
    external-dns.alpha.kubernetes.io/target: 192.168.35.15
spec:
  hostnames:
    - auth.68cc.io
  parentRefs:
    - name: traefik-external-gateway
      namespace: network
  rules:
    - backendRefs:
        - name: oauth2-proxy
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
