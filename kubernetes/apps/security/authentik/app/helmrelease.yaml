---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app authentik
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: authentik
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      deploymentAnnotations:
        reloader.stakater.com/auto: "true"
      # envFrom replaces deprecated root-level envFrom (chart >= 2026.5).
      # Applies to both server and worker. AUTHENTIK_BOOTSTRAP_PASSWORD and
      # AUTHENTIK_BOOTSTRAP_TOKEN are passed as env vars via this secret.
      envFrom:
        - secretRef:
            name: authentik-secrets

    authentik:
      secret_key: "${AUTHENTIK_SECRET_KEY}"
      log_level: info
      postgresql:
        host: postgres17-rw.databases.svc.cluster.local
        name: authentik
        user: authentik
        password: "${AUTHENTIK_POSTGRES_PASSWORD}"
      redis:
        host: dragonflydb.databases.svc.cluster.local
        port: 6379
        password: "${DRAGONFLYDB_PASSWORD}"
        db: 6

    server:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 2
          memory: 1Gi
      initContainers:
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18
          envFrom:
            - secretRef:
                name: authentik-secrets

    worker:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 1
          memory: 512Mi

    # Bundled PostgreSQL subchart disabled — use CNPG postgres17
    postgresql:
      enabled: false
