---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: authentik-alerts
  namespace: security
  labels:
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    - name: authentik-health
      interval: 30s
      rules:
        - alert: AuthentikServerDown
          expr: |
            kube_deployment_status_replicas_available{
              namespace="security",
              deployment=~"authentik-server.*"
            } == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Authentik server has no available replicas"
            description: >-
              Authentik server deployment has 0 available replicas for 2m.
              Auth will be unavailable for all protected routes.

        - alert: AuthentikWorkerDown
          expr: |
            kube_deployment_status_replicas_available{
              namespace="security",
              deployment=~"authentik-worker.*"
            } == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Authentik worker has no available replicas"
            description: >-
              Authentik worker has 0 available replicas for 5m.
              Background tasks (email, blueprints, outpost sync) will fail.

        - alert: AuthentikOutpostDisconnected
          expr: |
            authentik_outposts_connected{namespace="security"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Authentik embedded outpost disconnected"
            description: >-
              No outposts connected to Authentik for 2m.
              ForwardAuth will fail for all protected routes.

    - name: authentik-auth
      interval: 60s
      rules:
        - alert: AuthentikHighLoginFailureRate
          expr: |
            rate(
              authentik_login_attempts_total{
                namespace="security",
                successful="false"
              }[5m]
            ) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High Authentik login failure rate"
            description: >-
              Login failure rate exceeds 30/min for 5m.
              May indicate brute-force attack or misconfigured client.

        - alert: AuthentikSystemTaskFailing
          expr: |
            sum(
              authentik_system_tasks{
                namespace="security",
                status="TaskResultStatus.ERROR"
              }
            ) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Authentik system tasks failing"
            description: >-
              One or more Authentik system tasks in ERROR state for 10m.
              Check Admin UI → System → System Tasks.
