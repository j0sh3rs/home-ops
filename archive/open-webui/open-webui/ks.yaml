---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app open-webui
  namespace: &namespace ai
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 1h
  dependsOn:
    # open-webui now talks to LiteLLM (which fronts llama-swap + cloud
    # providers) rather than llama-swap directly. LiteLLM has its own
    # dependency chain on the cnpg cluster + dragonflydb cache.
    - name: litellm
      namespace: *namespace
  path: ./kubernetes/apps/ai/open-webui/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
